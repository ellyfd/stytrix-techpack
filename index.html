/* ─── rebuildCardFromL2: given a card + new L2 index (+ optional L3 index),
   fetches l2_l3_ie for that L1 and rebuilds l3Variants / methodVariants /
   l3s on the card. Used by onSwitchL2 and onSwitchL3. ─── */
function rebuildCardFromL2(card, newL2Idx, newL3Idx, fabric, setCards, newMethodIdx = 0) {
  const variant = card.l2Variants?.[newL2Idx];
  if (!variant) return;
  const isReal = (s) => s && !String(s).startsWith("**");
  const fabricKey = (fabric || "Knit").toLowerCase() === "woven" ? "woven" : "knit";
  const path = `./l2_l3_ie/${card.l1_code}.json`;
  fetch(path).then(r => r.ok ? r.json() : Promise.reject(r.status)).then(ie => {
    const l2Arr = ie[fabricKey] || [];
    const chosenL2 = l2Arr.find(x => x.l2 === variant.xlsx_name)
      || l2Arr.find(x => isReal(x.l2)) || l2Arr[0];

    // L3 variants for this L2
    const shapesAll = chosenL2?.shapes || [];
    const shapeFreqs = shapesAll.map(sh =>
      (sh.methods || []).reduce((n, m) => n + (m.steps || []).length, 0));
    const shapeFreqSum = shapeFreqs.reduce((s, n) => s + n, 0);
    const l3VariantsRaw = shapesAll.map((sh, i) => ({
      l3: sh.l3,
      _methods: sh.methods || [],
      freq: shapeFreqs[i],
      freq_pct: shapeFreqSum > 0 && shapeFreqs[i] > 0
        ? +(shapeFreqs[i] / shapeFreqSum * 100).toFixed(1) : null
    }));
    const defaultL3Idx = (() => {
      const idx = l3VariantsRaw.findIndex(s => isReal(s.l3));
      return idx >= 0 ? idx : 0;
    })();
    const l3Idx = (newL3Idx != null && l3VariantsRaw[newL3Idx]) ? newL3Idx : defaultL3Idx;
    const shape = l3VariantsRaw[l3Idx] || null;

    // L4 method variants
    const methodsAll = shape?._methods || [];
    const realMethods = methodsAll.filter(m => isReal(m.l4));
    const methods = realMethods.length ? realMethods : methodsAll;
    const methodFreqSum = methods.reduce((s, m) => s + (m.steps || []).length, 0);
    const tryFilter = (rows, mainOnly) => {
      const seen = new Set(); const list = [];
      for (const row of rows || []) {
        const [nm, gr, sc, ms] = row;
        if (mainOnly && ms && ms !== "主") continue;
        const k = `${nm}|${gr}`;
        if (seen.has(k)) continue;
        seen.add(k);
        list.push({ name: nm, ie: Number(sc) || 0, auto: false, pick: 0, opts: [{n:"無資料", p:100}] });
      }
      return list;
    };
    const methodVariants = methods.map(m => {
      const mainPath = tryFilter(m.steps, true);
      const steps = mainPath.length ? mainPath : tryFilter(m.steps, false);
      const totalSec = steps.reduce((s, x) => s + x.ie, 0);
      const raw = (m.steps || []).length;
      return {
        l4: m.l4, steps, totalSec: +totalSec.toFixed(0),
        freq: raw,
        freq_pct: methodFreqSum > 0 && raw > 0 ? +(raw / methodFreqSum * 100).toFixed(1) : null
      };
    });
    const methodIdx = methodVariants[newMethodIdx] ? newMethodIdx : 0;
    const cur = methodVariants[methodIdx] || { l4: null, steps: [], totalSec: 0 };
    const l2Base = chosenL2?.l2
      ? `${chosenL2.l2}${shape?.l3 ? " · " + shape.l3 : ""}`
      : null;
    const l4Short = cur.l4 ? (cur.l4.length > 40 ? cur.l4.slice(0, 40) + "…" : cur.l4) : null;

    // Strip runtime-only _methods before persisting to state
    const l3Variants = l3VariantsRaw.map(({_methods, ...rest}) => rest);

    setCards(prev => prev.map(pc => pc.id === card.id ? {
      ...pc,
      l2Idx: newL2Idx,
      l3Idx,
      l3Variants,
      methodIdx,
      methodVariants,
      l3s: cur.steps,
      ie: cur.totalSec,
      l2Base,
      l2: l2Base ? `${l2Base}${l4Short ? " · " + l4Short : ""}` : pc.l2
    } : pc));
  }).catch(err => console.error('載入 l2_l3_ie 失敗:', err));
}

/* ─── L1 下拉:依 l1_part_presence (GT|IT 桶) 的歷史出現率排序
   取 bucket 規則同 runConstruction:先 by_gt_it → 退回 by_gt。 ─── */
function sortedL1sForBucket(partPresence, gt, it) {
  const bucketKey = gt && it ? `${gt}|${it}` : null;
  const bucket = (partPresence && bucketKey && partPresence.by_gt_it?.[bucketKey])
    || (partPresence && gt && partPresence.by_gt?.[gt])
    || null;
  const pctByCode = {};
  if (bucket && Array.isArray(bucket.parts)) {
    for (const p of bucket.parts) {
      if (p.l1_code) pctByCode[p.l1_code] = { pct: p.presence_pct ?? null, tier: p.tier_en || p.tier || null };
    }
  }
  const codes = Object.keys(L1_CODE_TO_NAME);
  return codes.map(code => ({
    code,
    name: L1_CODE_TO_NAME[code] || code,
    pct: pctByCode[code]?.pct ?? null,
    tier: pctByCode[code]?.tier ?? null,
  })).sort((a, b) => {
    const ap = a.pct == null ? -1 : a.pct;
    const bp = b.pct == null ? -1 : b.pct;
    if (bp !== ap) return bp - ap;
    return a.name.localeCompare(b.name, 'zh-Hant');
  });
}

const V42_DEPT_ALIAS = {
  Active: "General", RTW: "General", Fleece: "General",
  Sleepwear: "Sleepwear", Swimwear: "Swimwear",
};
const V42_GENDER_ALIAS = {
  MENS: "MENS", WOMENS: "WOMENS", MATERNITY: "WOMENS",
  BOYS: "BOYS", GIRLS: "KIDS", "BABY/TODDLER": "KIDS",
};
const V42_GT_ALIAS = {
  PANTS: "BOTTOM", SHORTS: "BOTTOM",
  TOP: "TOP", DRESS: "DRESS", SKIRT: "SKIRT",
  SET: "SET", OUTERWEAR: "OUTERWEAR",
  BODYSUIT: "TOP", ROMPER_JUMPSUIT: "DRESS", SWIM_PIECE: "TOP",
};

/* ─── ISO 代碼 → {iso_zh, machine} 顯示對照(從 v4 / v3 entries 動態建出來)
   v4.2 沒有 iso_zh / machine,需要用這個表補充顯示資訊 ─── */
function buildIsoRef(lookupV4) {
  const ref = {};
  const entries = lookupV4?.entries || [];
  for (const e of entries) {
    if (e.iso && !ref[e.iso]) {
      ref[e.iso] = { iso_zh: e.iso_zh || null, machine: e.machine || null };
    }
  }
  return ref;
}

/* ─── 通用模型:回傳目前 bucket 下該 L1 可選的 ISO 列表
   先查 v4.2(Dept × Gender × GT × L1_name,含性別),再 fallback 到 v4
   (Fabric × Dept × GT × L1_code,沒有性別但段項齊全)。
   格式:[{ iso, iso_zh, machine, pct, isPrimary, source: "v4.2"|"v4" }] ─── */
function isoOptionsFor(lookupV42, lookupV4, filters, l1Code) {
  if (!l1Code) return [];
  const { fabric, dept, gender, gt, it } = filters || {};
  const l1Name = L1_CODE_TO_NAME[l1Code];
  const isoRef = buildIsoRef(lookupV4);

  // ── v4.2 查詢 ──
  const v42Entries = lookupV42?.entries || [];
  const deptKey = V42_DEPT_ALIAS[dept] || "General";
  const genderKey = V42_GENDER_ALIAS[gender] || "UNISEX";
  const gtKey42 = V42_GT_ALIAS[gt] || gt;
  const findV42 = (pred) => v42Entries.find(e => e.l1 === l1Name && pred(e));
  let v42Entry = null;
  if (l1Name) {
    v42Entry = findV42(e => e.department === deptKey && e.gender === genderKey && e.gt === gtKey42)
      || findV42(e => e.department === deptKey && e.gender === "UNISEX"   && e.gt === gtKey42)
      || findV42(e => e.department === "General" && e.gender === genderKey && e.gt === gtKey42)
      || findV42(e => e.department === "General" && e.gt === gtKey42);
  }
  if (v42Entry && v42Entry.iso) {
    const dist = v42Entry.iso_distribution || {};
    const total = Object.values(dist).reduce((s, n) => s + n, 0) || 1;
    const pctFor = (iso) => +((dist[iso] || 0) / total * 100).toFixed(1);
    const v42Primary = {
      iso: v42Entry.iso,
      iso_zh: isoRef[v42Entry.iso]?.iso_zh || null,
      machine: isoRef[v42Entry.iso]?.machine || null,
      pct: v42Entry.iso_pct ?? pctFor(v42Entry.iso),
      isPrimary: true, source: "v4.2",
    };
    const v42Alts = Object.keys(dist)
      .filter(iso => iso !== v42Entry.iso)
      .map(iso => ({
        iso,
        iso_zh: isoRef[iso]?.iso_zh || null,
        machine: isoRef[iso]?.machine || null,
        pct: pctFor(iso), isPrimary: false, source: "v4.2",
      }))
      .sort((a, b) => (b.pct ?? 0) - (a.pct ?? 0));
    return [v42Primary, ...v42Alts];
  }

  // ── v4 fallback(無性別、但 L1 覆蓋廣) ──
  const v4Entries = lookupV4?.entries || [];
  const fabricV4 = (fabric || "Knit").toLowerCase() === "woven" ? "Woven" : "Knit";
  const V4_DEPTS = ["Active", "RTW", "Swimwear", "Sleepwear"];
  const deptV4 = V4_DEPTS.find(d => d.toUpperCase() === String(dept || "").toUpperCase()) || null;
  const GT_V4_ALIAS = { SWIM_PIECE: ["TOP", "PANTS"] };
  const gtCandidates = GT_V4_ALIAS[gt] || [gt];
  const CONF_RANK = { strong: 4, likely: 3, mixed: 2, no_dominant: 1, no_data: 0 };
  const rank = (e) => ((e.iso ? 1000 : 0) + (CONF_RANK[e.confidence] || 0) * 10 + (e.expect === "yes" ? 1 : 0));
  const pickBest = (list) => list.reduce((best, e) => (best == null || rank(e) > rank(best)) ? e : best, null);
  const tiers = [
    (e) => e.fabric === fabricV4 && e.department === deptV4 && gtCandidates.includes(e.gt) && e.l1_code === l1Code,
    (e) => e.fabric === fabricV4 && gtCandidates.includes(e.gt) && e.l1_code === l1Code,
    (e) => e.fabric === fabricV4 && e.department === deptV4 && e.l1_code === l1Code,
    (e) => e.fabric === fabricV4 && e.l1_code === l1Code,
  ];
  let v4Entry = null;
  for (const pred of tiers) {
    const best = pickBest(v4Entries.filter(pred));
    if (best && best.iso) { v4Entry = best; break; }
  }
  if (!v4Entry || !v4Entry.iso) return [];
  const votes = v4Entry.pptx_2025_votes || {};
  const totalVotes = Object.values(votes).reduce((s, n) => s + n, 0) || 0;
  const v4Primary = {
    iso: v4Entry.iso, iso_zh: v4Entry.iso_zh || null, machine: v4Entry.machine || null,
    pct: totalVotes > 0 && votes[v4Entry.iso] ? +(votes[v4Entry.iso] / totalVotes * 100).toFixed(1) : null,
    isPrimary: true, source: "v4",
  };
  const v4Alts = Object.keys(votes)
    .filter(iso => iso !== v4Entry.iso)
    .map(iso => ({
      iso, iso_zh: isoRef[iso]?.iso_zh || null, machine: isoRef[iso]?.machine || null,
      pct: totalVotes > 0 ? +(votes[iso] / totalVotes * 100).toFixed(1) : null,
      isPrimary: false, source: "v4",
    }))
    .sort((a, b) => (b.pct ?? 0) - (a.pct ?? 0));
  return [v4Primary, ...v4Alts];
}

/* ─── 聚陽模型:從 visualGuide 組該 L1 的 L2 變體清單 ─── */
function buildL2VariantsForL1(visualGuide, l1Code) {
  const section = visualGuide?.l1?.[l1Code];
  const l2Map = section?.l2 || {};
  const raw = Object.entries(l2Map).map(([code, info]) => ({
    code,
    xlsx_name: info.name || code,
    display_name: info.display_name || info.name || code,
    feature: info.feature || null,
    tier: info.tier || "unknown",
    freq: info.freq || 0,
  })).filter(v => !String(v.xlsx_name).startsWith("**"));
  raw.sort((a, b) => (b.freq || 0) - (a.freq || 0));
  // 轉成該 L1 內部的歷史佔比,讓 UI 顯示跟 L1 的 "歷史 X%" 一致
  const total = raw.reduce((s, v) => s + (v.freq || 0), 0);
  return raw.map(v => ({
    ...v,
    freq_pct: total > 0 && v.freq > 0 ? +(v.freq / total * 100).toFixed(1) : null,
  }));
}

/* 依 GT 列出「會隨長度而變」的 POM 代碼集。未選 Item Type 時,這些 POM 的
   Base M 與全碼表格子一律留空,避免 BIKER(5"內長) 還顯示 28" inseam、
   或用不到膝圍/小腿圍。 */
const IT_LENGTH_DEP_POMS = {
  LEGGINGS: new Set(["O4", "N5", "N7"]),
  SHORTS:   new Set(["O4", "N5"]),
  DRESS:    new Set(["J9", "J10", "J8", "J7", "I6", "I5"]),
  SKIRT:    new Set(["I6", "J9", "J10"]),
};
/* 從 "~28\"" 之類的 hint 字串抽出英吋數值。沒有數字(如 "緊身"、"百褶")回傳 null。 */
const parseHintInches = (hint) => {
  if (!hint) return null;
  const m = String(hint).match(/(\d+(?:\.\d+)?)/);
  return m ? Number(m[1]) : null;
};

/* ─── Helpers ─── */
/* 英吋顯示:slash 分數格式(與公差欄一致),例 "3/4"、"16 1/2"、"1/8"。
   四捨五入到 1/8",與原本的 unicode frmt 同等精度,避免語意改變。 */
const frmt = (v) => {
  if (v === 0) return "—";
  const neg = v < 0;
  const abs = Math.abs(v);
  const whole = Math.floor(abs);
  const frac = abs - whole;
  const sign = neg ? "-" : "";
  let f = "";
  if (frac >= 0.875) return sign + (whole + 1);
  else if (frac >= 0.625) f = "3/4";
  else if (frac >= 0.375) f = "1/2";
  else if (frac >= 0.125) f = "1/4";
  else if (frac > 0.05) f = "1/8";
  if (f && whole > 0) return `${sign}${whole} ${f}`;
  if (f) return `${sign}${f}`;
  return `${sign}${whole}`;
};

/* 解析使用者輸入的英吋字串：支援 "16", "16 1/2", "1/8", "16½", "16¾" 等 */
const parseInch = (s) => {
  if (s == null) return null;
  if (typeof s === "number") return s;
  let t = String(s).trim().replace(/["'\s]+$/, "").trim();
  if (!t) return null;
  t = t.replace(/⅛/g, " 1/8").replace(/¼/g, " 1/4").replace(/½/g, " 1/2").replace(/¾/g, " 3/4").replace(/⅜/g, " 3/8").replace(/⅝/g, " 5/8").replace(/⅞/g, " 7/8");
  const neg = t.startsWith("-");
  if (neg) t = t.slice(1).trim();
  const parts = t.split(/\s+/).filter(Boolean);
  let total = 0;
  for (const p of parts) {
    if (p.includes("/")) {
      const [n, d] = p.split("/").map(x => Number(x));
      if (!d || Number.isNaN(n)) return null;
      total += n / d;
    } else {
      const v = Number(p);
      if (Number.isNaN(v)) return null;
      total += v;
    }
  }
  return neg ? -total : total;
};

/* ─── POM 排序：身體部位從上到下、從前到後 ───
   以 prefix 為主序（依解剖順序：腰→臀→浪→襠→腿→…），bucket.pom_sort_order
   只做「同 prefix 內」的二次排序。這樣歷史資料若把某類放錯位（例 K 前後浪
   被塞到最後）也會被正規化。
   前綴對應部位：
   A 帽 → B 領 → C 肩 → D 袖籠/肩帶 → E 袖 → F 胸 → G 育克
   → H 腰 → I 下擺/側縫 → J 身長 → K 前後檔 → L 臀
   → M 襠 → N 大腿/膝/小腿/腿口 → O 內長/裙長
   → Q 繩帶 → R 省/褶 → S 鈕扣 → T 下擺/貼邊 → Z 裝飾
   → P 口袋（放最後，通常量完其他再標口袋）
*/
const POM_PREFIX_ORDER = {
  A: 1, B: 2, C: 3, D: 4, E: 5, F: 6, G: 7,
  H: 8, I: 9, J: 10, L: 11, K: 12, M: 13, N: 14, O: 15,
  Q: 16, R: 17, S: 18, T: 19, Z: 20, P: 21,
  U: 22, V: 23, W: 24, X: 25, Y: 26,
};
const sortPomCodes = (codes, bucketSortOrder) => {
  const bucketIdx = {};
  (bucketSortOrder || []).forEach((c, i) => { bucketIdx[c] = i; });
  return [...codes].sort((a, b) => {
    const pa = POM_PREFIX_ORDER[a[0]] || 99;
    const pb = POM_PREFIX_ORDER[b[0]] || 99;
    if (pa !== pb) return pa - pb;
    // 同 prefix：優先用 bucket 歷史順序，否則數字 + 字典序
    const ba = bucketIdx[a] !== undefined ? bucketIdx[a] : 9999;
    const bb = bucketIdx[b] !== undefined ? bucketIdx[b] : 9999;
    if (ba !== bb) return ba - bb;
    const na = parseInt(a.slice(1), 10) || 0;
    const nb = parseInt(b.slice(1), 10) || 0;
    if (na !== nb) return na - nb;
    return a.localeCompare(b);
  });
};

/* ─── Sel（v10 enterprise utility） ─── */
function Sel({ label, value, onChange, options, disabled, badgeMap, labelMap, locked, onToggleLock }) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  const filled = !!value;
  // 隱藏沒有資料的選項:badgeMap 有設且 key 對應的 count 為 0 / undefined → 不顯示。
  // badgeMap 是空物件(像 brandBadgeMap)或沒傳 → 不過濾,維持原本的 hardcoded 列表。
  const hasBadgeData = badgeMap && Object.keys(badgeMap).length > 0;
  const visibleOptions = hasBadgeData
    ? options.filter(o => (badgeMap[o] || 0) > 0)
    : options;

  // 點外面或按 Escape 關閉
  useEffect(() => {
    if (!open) return;
    const onDoc = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    const onKey = (e) => { if (e.key === "Escape") setOpen(false); };
    document.addEventListener("mousedown", onDoc);
    document.addEventListener("keydown", onKey);
    return () => {
      document.removeEventListener("mousedown", onDoc);
      document.removeEventListener("keydown", onKey);
    };
  }, [open]);

  const displayText = value ? ((labelMap && labelMap[value]) || value) : "—";
  const displayBadge = value && badgeMap && badgeMap[value];
  const borderColor = disabled ? "#eee" : (filled ? (locked ? "#065f46" : "#1a1a1a") : "#ddd");

  const selectOpt = (v) => { onChange(v); setOpen(false); };

  return (
    <div ref={ref} style={{ position: "relative" }}>
      <div style={{ fontSize: "11px", color: "#888", marginBottom: "6px", fontWeight: 500 }}>
        {label}
      </div>

      <div style={{ position: "relative" }}>
        {/* Trigger：看起來跟原本 underline select 幾乎一樣 */}
        <button onClick={() => !disabled && setOpen(o => !o)}
          disabled={disabled}
          aria-expanded={open}
          aria-haspopup="listbox"
          style={{
            width: "100%", padding: "6px 0", fontSize: "14px", textAlign: "left",
            background: "transparent", color: filled ? "#1a1a1a" : "#bbb",
            fontWeight: filled ? 600 : 400,
            border: "none", borderBottom: `1.5px solid ${borderColor}`,
            fontFamily: "inherit", cursor: disabled ? "not-allowed" : "pointer",
            borderRadius: 0, transition: "border-color 0.15s",
            display: "flex", justifyContent: "space-between", alignItems: "center",
          }}>
          <span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
            {displayText}{displayBadge ? ` (${displayBadge})` : ""}
          </span>
          <span aria-hidden="true" style={{ fontSize: "10px", color: "#bbb", marginLeft: "6px", transform: open ? "rotate(180deg)" : "rotate(0)", transition: "transform 0.15s" }}>▾</span>
        </button>

        {/* 選項清單：附著在觸發按鈕正下方，不擠壓下方內容 */}
        {open && !disabled && (
          <div role="listbox" aria-label={label}
            style={{
              position: "absolute", top: "100%", left: 0, right: 0, zIndex: 30,
              marginTop: "4px",
              border: "1px solid #e8e5e1", borderRadius: "8px",
              background: "#fff", maxHeight: "260px", overflowY: "auto",
              boxShadow: "0 4px 14px rgba(0,0,0,0.06)",
              animation: "fadeIn 0.12s ease",
            }}>
            <div role="option" aria-selected={!value} aria-label={`${label}：不選擇`}
              onClick={() => selectOpt("")}
              style={{ padding: "8px 12px", fontSize: "13px", color: "#bbb", cursor: "pointer", borderBottom: "1px solid #f5f5f5" }}
              onMouseEnter={e => e.currentTarget.style.background = "#faf9f7"}
              onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
              —
            </div>
            {visibleOptions.map(o => {
              const b = badgeMap && badgeMap[o];
              const d = (labelMap && labelMap[o]) || o;
              const sel = o === value;
              return (
                <div key={o} role="option" aria-selected={sel} aria-label={b ? `${d}，${b} 筆` : d}
                  onClick={() => selectOpt(o)}
                  style={{
                    padding: "8px 12px", fontSize: "13px",
                    color: sel ? "#065f46" : "#1a1a1a",
                    fontWeight: sel ? 700 : 400,

                    gap: "10px",

                  onMouseLeave={e => { if (!sel) e.currentTarget.style.background = "transparent"; }}>
                  <span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{d}</span>
                  {b && <span style={{ fontSize: "11px", color: "#999", fontWeight: 400, fontFamily: "'JetBrains Mono',monospace" }}>{b}</span>}

            })}

          </div>

            </svg>
          </button>
        </div>
      )}
    </div>
  );
}

/* ─── Admin override helpers ─── */
// Accepts canonical {code: {en, zh}} 或 candidate wrapper {mapping: {code: {en, zh_pptx, zh_old, matched, ...}}}
function normalizePomNames(input) {
  if (!input || typeof input !== 'object') return { error: 'JSON 必須是物件' };
  let raw;
  if (input.mapping && typeof input.mapping === 'object') {
    raw = {};
    for (const [code, val] of Object.entries(input.mapping)) {
      if (!val || typeof val !== 'object') continue;
      const zh = (val.matched && val.zh_pptx) ? val.zh_pptx : (val.zh_old || val.zh || '');
      const en = val.en || '';
      raw[code] = { en, zh };
    }
  } else {
    raw = input;
  }
  const keys = Object.keys(raw);
  if (keys.length < 50) return { error: `項目太少 (${keys.length})，預期 ≥50 個 POM 代碼` };
  let bad = 0; const sample = [];
  for (const k of keys) {
    if (!/^[A-Z]\d{1,3}$/.test(k)) { bad++; if (sample.length < 3) sample.push(k); continue; }
    const v = raw[k];
    if (!v || typeof v !== 'object' || typeof v.en !== 'string' || typeof v.zh !== 'string') {
      bad++; if (sample.length < 3) sample.push(k);
    }
  }
  if (bad > keys.length * 0.1) {
    return { error: `太多無效項目 (${bad}/${keys.length})${sample.length ? '，例：' + sample.join(', ') : ''}` };
  }
  return { data: raw, count: keys.length, invalidCount: bad };
}

function fmtTime(iso) {
  if (!iso) return '';
  try {
    const d = new Date(iso);
    return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  } catch { return iso; }
}

  pomRulesOverride, onUploadPomRules, onClearPomRules, currentBucketKey,
  partPresenceOverride, onUploadPartPresence, onClearPartPresence,
  onPushToGithub,
}) {
  const [error, setError] = useState(null);

  const [uploading, setUploading] = useState(null); // null | 'pom' | 'presence'
  // POM Rules 區塊獨立狀態(訊息格式不同,不共用 error/success)
  const [rulesError, setRulesError] = useState(null);
  const [rulesSuccess, setRulesSuccess] = useState(null);
  const [rulesUploading, setRulesUploading] = useState(false);
  // Push to GitHub 區塊
  const [adminToken, setAdminToken] = useState(() => {
    try { return localStorage.getItem('stytrix.admin.token') || ''; } catch { return ''; }
  });
  const [showToken, setShowToken] = useState(false);
  const [pushMessage, setPushMessage] = useState('');
  const [pushing, setPushing] = useState(false);
  const [pushError, setPushError] = useState(null);
  const [pushResult, setPushResult] = useState(null);
  const saveToken = (t) => {
    setAdminToken(t);
    try { t ? localStorage.setItem('stytrix.admin.token', t) : localStorage.removeItem('stytrix.admin.token'); } catch {}
  };
  const handlePush = async () => {
    if (!onPushToGithub) { setPushError('尚未設定推送 handler'); return; }
    setPushError(null); setPushResult(null); setPushing(true);
    try {
      const data = await onPushToGithub({ token: adminToken, message: pushMessage });
      setPushResult(data.commit);
      setPushMessage('');
    } catch (e) {
      setPushError(typeof e === 'string' ? e : (e?.message || String(e)));
    } finally { setPushing(false); }
  };

  const handleFile = async (file) => {
    if (!file) return;
    setError(null); setSuccess(null); setUploading('pom');
    try {
      const result = await onUploadPomNames(file);
      setSuccess(`POM 翻譯表：已套用 ${result.count} 個代碼${result.invalidCount > 0 ? `（跳過 ${result.invalidCount} 個無效）` : ''}`);
    } catch (e) {
      setError('POM 翻譯表：' + (typeof e === 'string' ? e : (e?.message || String(e))));
    } finally {
      setUploading(null);
    }
  };

  const handlePartPresenceFile = async (file) => {
    if (!file) return;
    setError(null); setSuccess(null); setUploading('presence');
    try {
      const result = await onUploadPartPresence(file);
      setSuccess(`部位出現率表：已套用 ${result.bucketsCount} 組分類 · ${result.partsCount} 筆部位紀錄${result.badParts > 0 ? `（跳過 ${result.badParts} 筆缺欄位）` : ''}`);
    } catch (e) {
      setError('部位出現率表：' + (typeof e === 'string' ? e : (e?.message || String(e))));
    } finally {
      setUploading(null);
    }
  };

  const handleRulesFiles = async (files) => {
    if (!files || !files.length) return;
    setRulesError(null); setRulesSuccess(null); setRulesUploading(true);
    try {
      const result = await onUploadPomRules(files);
      const parts = [];
      if (result.indexCount) parts.push(`${result.indexCount} 個 _index`);
      if (result.bucketCount) parts.push(`${result.bucketCount} 個 bucket`);

      if (result.skippedNonJson) msg += `(跳過 ${result.skippedNonJson} 個非 .json)`;
      setRulesSuccess(msg);
    } catch (e) {
      setRulesError(typeof e === 'string' ? e : (e?.message || String(e)));
    } finally {
      setRulesUploading(false);
    }
  };

  if (!open) return null;

                將推送 <strong>{totalFiles}</strong> 個檔案:
                {hasIndex && <> · 1 × <code>_index.json</code></>}
                {bucketCount > 0 && <> · {bucketCount} × bucket</>}
                {hasNames && <> · 1 × <code>pom_names.json</code></>}

              </div>

              <button
                onClick={handlePush}
                disabled={pushing || totalFiles === 0 || !adminToken}
                style={{
                  width: '100%', padding: '10px 14px',
                  background: (pushing || totalFiles === 0 || !adminToken) ? '#d1d5db' : '#9a3412',
                  color: '#fff', border: 'none', borderRadius: '6px',
                  cursor: (pushing || totalFiles === 0 || !adminToken) ? 'not-allowed' : 'pointer',
                  fontSize: '13px', fontWeight: 700, fontFamily: 'inherit',
                }}
              >
                {pushing ? '推送中…(可能需 10~30 秒)' : '⚠ 推送到 GitHub main'}
              </button>

              {pushError && <div style={{ marginTop: '10px', padding: '8px 10px', background: '#fef2f2', color: '#b91c1c', fontSize: '11px', borderRadius: '6px' }}>⚠ {pushError}</div>}
              {pushResult && (
                <div style={{ marginTop: '10px', padding: '8px 10px', background: '#ecfdf5', color: '#065f46', fontSize: '11px', borderRadius: '6px', lineHeight: 1.5 }}>
                  ✓ 已推送 {pushResult.fileCount} 個檔案 · commit <code>{pushResult.sha?.slice(0, 7)}</code>
                  {pushResult.url && <> · <a href={pushResult.url} target="_blank" rel="noopener" style={{ color: '#065f46', textDecoration: 'underline' }}>看 commit</a></>}
                  <br />Vercel 通常 30 秒內 deploy 完,重新整理即可看到新資料。
                </div>
              )}
            </div>
          );
        })()}

        {error && <div style={{ marginTop: '10px', padding: '8px 10px', background: '#fef2f2', color: '#b91c1c', fontSize: '11px', borderRadius: '6px' }}>⚠ {error}</div>}
        {success && <div style={{ marginTop: '10px', padding: '8px 10px', background: '#ecfdf5', color: '#065f46', fontSize: '11px', borderRadius: '6px' }}>✓ {success}</div>}

        <div style={{ marginTop: '12px', border: '1px dashed #e8e5e1', borderRadius: '10px', padding: '14px', background: '#fafafa' }}>
          <div style={{ fontSize: '13px', fontWeight: 700, color: '#767676' }}>L2 判別表</div>
          <div style={{ fontSize: '11px', color: '#999', marginTop: '4px' }}>規劃中</div>
        </div>
      </div>
    </div>
  );
}

function App() {
  /* ── 共用 filter state + 鎖 + localStorage persistence ── */
  const loadSaved = () => {
    try {
      const locks = JSON.parse(localStorage.getItem("stytrix_locks") || "{}");
      const values = JSON.parse(localStorage.getItem("stytrix_values") || "{}");
      const restored = {};
      Object.keys(locks).forEach(k => { if (locks[k] && values[k]) restored[k] = values[k]; });
      return { locks, values: restored };
    } catch { return { locks: {}, values: {} }; }
  };
  const _saved = loadSaved();
  const [brand, setBrand] = useState(_saved.values.brand || "");
  const [fabric, setFabric] = useState(_saved.values.fabric || "");
  const [dept, setDept] = useState(_saved.values.dept || "");
  const [gender, setGender] = useState(_saved.values.gender || "");
  const [gt, setGt] = useState(_saved.values.gt || "");
  const [it, setIt] = useState(_saved.values.it || "");
  const [locks, setLocks] = useState(_saved.locks);
  const [filterExpanded, setFilterExpanded] = useState(false); // 手機版：選完 ≥2 filter 後收合成 pill
  const toggleLock = (key) => setLocks(prev => ({ ...prev, [key]: !prev[key] }));
  const toggleAllLocks = () => {
    const keys = ["brand", "fabric", "gender", "dept", "gt", "it"];
    const anyLocked = keys.some(k => locks[k]);
    setLocks(anyLocked ? {} : Object.fromEntries(keys.map(k => [k, true])));
  };
  useEffect(() => {
    localStorage.setItem("stytrix_locks", JSON.stringify(locks));
    const vals = { brand, fabric, dept, gender, gt, it };
    const toSave = {};
    Object.keys(locks).forEach(k => { if (locks[k] && vals[k]) toSave[k] = vals[k]; });
    localStorage.setItem("stytrix_values", JSON.stringify(toSave));
  }, [locks, brand, fabric, dept, gender, gt, it]);

  /* ── 切換 tab ── */
  const [activeTab, setActiveTab] = useState("construction"); // "construction" | "measurement" | "grading"

  /* ── Sketch 上傳 ── */
  const [sketchSrc, setSketchSrc] = useState(null);
  const [pomRules, setPomRules] = useState(null);
  const [pomNamesOverride, setPomNamesOverride] = useState(null); // {filename, uploadedAt, count} | null
  const [partPresenceOverride, setPartPresenceOverride] = useState(null); // {filename, uploadedAt, bucketsCount, partsCount} | null
  // POM Rules 覆蓋：index 單一槽位 + buckets map（一個 bucketKey 對應一個覆蓋）
  // shape: { index: {filename, uploadedAt, count} | null, buckets: { [bucketKey]: {filename, uploadedAt, count} } }
  const [pomRulesOverride, setPomRulesOverride] = useState({ index: null, buckets: {} });
  const [adminOpen, setAdminOpen] = useState(false);
  // 模式切換：makalot=聚陽模型（作工五階層 + POM tier + 全碼）/ universal=通用模型（AI→ISO + 基礎大尺寸）
  const [appMode, setAppMode] = useState(() => {
    try {
      const v = localStorage.getItem('stytrix.appMode');
      return v === 'universal' ? 'universal' : 'makalot';
    } catch { return 'makalot'; }
  });
  useEffect(() => {
    try { localStorage.setItem('stytrix.appMode', appMode); } catch {}
  }, [appMode]);
  // 兩套作工內容完全不同,切換模型時互相保留各自的「作工」狀態。
  // 未 generate 過的那一側會回到空白狀態(cStep=0)。
  const constructionStoresRef = useRef({ makalot: null, universal: null });
  const prevAppModeRef = useRef(appMode);
  // 通用模型 — 基礎大尺寸：每欄位一組 candidate POM codes，按順序挑第一個
  // 在 currentBucket 裡有資料（median_values.M 或 measurement_rules）的碼，
  // 直接沿用聚陽 bucket 的中位數/公差/POM 翻譯，只是顯示比較少項。
  const UNIVERSAL_TOP_SPEC = [
    { zh: "肩寬", en: "Shoulder Width",        candidates: ["C1", "C2"] },
    { zh: "胸圍", en: "Chest",                 candidates: ["F10", "F11", "F17"] },
    { zh: "下擺", en: "Hem / Bottom Opening",  candidates: ["I13", "I5", "I7", "I8", "I2"] },
    { zh: "袖長", en: "Sleeve Length",         candidates: ["E1", "E3"] },
    { zh: "身長", en: "Body Length",           candidates: ["J10", "J9", "J19", "J20", "J8", "J7"] },
  ];
  const UNIVERSAL_BOTTOM_SPEC = [
    { zh: "腰圍", en: "Waist",                 candidates: ["H8", "H2", "H3", "H18", "H9"] },
    { zh: "臀圍", en: "Hip",                   candidates: ["L8", "L5", "L6"] },
    { zh: "前襠", en: "Front Rise",            candidates: ["K1"] },
    { zh: "後襠", en: "Back Rise",             candidates: ["K2"] },
    { zh: "內長", en: "Inseam",                candidates: ["O4"] },
    { zh: "褲口", en: "Leg Opening",           candidates: ["N9"] },
  ];
  const universalGarmentFamily = (() => {
    const bottoms = new Set(["PANTS", "SHORTS", "SKIRT", "LEGGINGS"]);
    return bottoms.has(gt) ? "bottom" : "top";
  })();
  const universalSpec = universalGarmentFamily === "bottom" ? UNIVERSAL_BOTTOM_SPEC : UNIVERSAL_TOP_SPEC;
  // 依目前 bucket 解析通用模型的基礎 POM codes(按 candidate 優先序挑第一個在 bucket 有資料的)已移到
  // currentBucket state 宣告之後,避免 TDZ ReferenceError。
  useEffect(() => {
    fetch('./pom_rules/_index.json')
      .then(r => r.ok ? r.json() : Promise.reject(r.status))
      .then(data => { setPomRules(data); window.POM_RULES = data; })
      .catch(err => console.error('載入 pom_rules/_index.json 失敗:', err));
    // POM 翻譯表：先看 localStorage 覆蓋，沒有才抓內建
    let usedOverride = false;
    try {
      const stored = localStorage.getItem('stytrix.override.pomNames');
      if (stored) {
        const parsed = JSON.parse(stored);
        if (parsed && parsed.data && typeof parsed.data === 'object') {
          setPomNames(parsed.data);
          window.POM_NAMES = parsed.data;
          setPomNamesOverride({
            filename: parsed.filename || '(unnamed)',
            uploadedAt: parsed.uploadedAt || null,
            count: Object.keys(parsed.data).length,
          });
          usedOverride = true;
        }
      }
    } catch (e) { console.warn('讀取 pomNames 覆蓋失敗:', e); }
    if (!usedOverride) {
      fetch('./pom_rules/pom_names.json')
        .then(r => r.ok ? r.json() : Promise.reject(r.status))
        .then(data => { setPomNames(data); window.POM_NAMES = data; })
        .catch(err => console.error('載入 pom_rules/pom_names.json 失敗:', err));
    }
  }, []);

  /* ── Admin override handlers ── */
  const applyPomNamesOverride = (file) => new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (ev) => {
      let parsed;
      try { parsed = JSON.parse(ev.target.result); }
      catch (e) { return reject('JSON 解析失敗：' + e.message); }
      const result = normalizePomNames(parsed);
      if (result.error) return reject(result.error);
      const stored = { filename: file.name, uploadedAt: new Date().toISOString(), data: result.data };
      try { localStorage.setItem('stytrix.override.pomNames', JSON.stringify(stored)); }
      catch (e) { return reject('localStorage 寫入失敗（可能超出配額）：' + e.message); }
      setPomNames(result.data);
      window.POM_NAMES = result.data;
      setPomNamesOverride({ filename: file.name, uploadedAt: stored.uploadedAt, count: result.count });
      resolve({ count: result.count, invalidCount: result.invalidCount });
    };
    reader.onerror = () => reject('讀檔失敗');
    reader.readAsText(file);
  });

  const clearPomNamesOverride = () => {
    try { localStorage.removeItem('stytrix.override.pomNames'); } catch {}
    setPomNamesOverride(null);
    fetch('./pom_rules/pom_names.json')
      .then(r => r.ok ? r.json() : Promise.reject(r.status))
      .then(data => { setPomNames(data); window.POM_NAMES = data; })
      .catch(err => console.error('重新載入 pom_names.json 失敗:', err));
  };

  /* 把 localStorage 裡的 bucket overrides 合成的 synthetic index entry
     merge 進 pomRules,讓全新分類 (不在內建 _index.json 裡的 bucket)
     也能自動出現在 filter 下拉選單。file 欄位留 null,實際資料走 override。 */
  const mergeBucketOverridesIntoIndex = (basePomRules) => {
    if (!basePomRules) return basePomRules;
    try {
      const stored = localStorage.getItem('stytrix.override.pomRules');
      if (!stored) return basePomRules;
      const parsed = JSON.parse(stored);
      const overrides = parsed?.buckets || {};
      const existing = new Set((basePomRules.buckets || []).map(b => b.bucket));
      const extras = [];
      for (const [key, entry] of Object.entries(overrides)) {
        if (existing.has(key)) continue;
        const d = entry?.data;
        if (!d?.department || !d?.garment_type || !d?.gender) continue;
        extras.push({ bucket: key, department: d.department, garment_type: d.garment_type, gender: d.gender, file: null });
      }
      if (!extras.length) return basePomRules;
      return { ...basePomRules, buckets: [...basePomRules.buckets, ...extras] };
    } catch { return basePomRules; }
  };

  /* POM Rules 覆蓋 — 支援一次上傳多個檔 (可選資料夾):
     - _index.json (含 buckets 陣列) → 換掉 bucket 清單
     - bucket 檔 (含 bucket + measurement_rules) → 換掉對應 bucketKey 的規則
     - pom_names.json 被路由到 POM 翻譯表（normalizePomNames）
     結構:{ index: {meta, data}|null, buckets: { [bucketKey]: {meta, data} } } */
  const readFileAsText = (file) => new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (ev) => resolve(ev.target.result);
    reader.onerror = () => reject(new Error(`讀取 ${file.name} 失敗`));
    reader.readAsText(file);
  });

  const applyPomRulesOverride = async (files) => {
    const list = files instanceof File ? [files] : Array.from(files || []);
    if (!list.length) throw new Error('沒有檔案');
    let existing = { index: null, buckets: {} };
    const jsonFiles = list.filter(f => /\.json$/i.test(f.name));
    const skipped = list.length - jsonFiles.length;
    const indexResults = [];
    const bucketResults = [];
    let namesResult = null;
    const invalid = [];
    const now = new Date().toISOString();

    await Promise.all(jsonFiles.map(async (file) => {
      try {
        const text = await readFileAsText(file);
        const parsed = JSON.parse(text);
        if (Array.isArray(parsed.buckets)) {
          existing.index = { filename: file.name, uploadedAt: now, count: parsed.buckets.length, data: parsed };
          indexResults.push({ filename: file.name, count: parsed.buckets.length });
        } else if (parsed.bucket && parsed.measurement_rules) {
          const mr = parsed.measurement_rules || {};
          const count = Object.keys(mr.must || {}).length + Object.keys(mr.recommend || {}).length + Object.keys(mr.optional || {}).length;
          existing.buckets[parsed.bucket] = { filename: file.name, uploadedAt: now, count, data: parsed };
          bucketResults.push({ filename: file.name, bucketName: parsed.bucket, count });
        } else {
          const nm = normalizePomNames(parsed);
          if (!nm.error && nm.data) {
            namesResult = { filename: file.name, data: nm.data, count: nm.count, invalidCount: nm.invalidCount };
          } else {
            invalid.push({ filename: file.name, reason: '非 _index / bucket / pom_names 格式' });
          }
        }
      } catch (e) {
        invalid.push({ filename: file.name, reason: e.message || String(e) });
      }
    }));

    if (!indexResults.length && !bucketResults.length && !namesResult) {
      throw new Error(`全部失敗 — ${invalid.length ? invalid.map(x => `${x.filename}: ${x.reason}`).slice(0, 3).join('; ') : '無有效 JSON'}`);
    }

    if (namesResult) {
      const nmStored = { filename: namesResult.filename, uploadedAt: now, data: namesResult.data };
      try { localStorage.setItem('stytrix.override.pomNames', JSON.stringify(nmStored)); }
      catch (e) { throw new Error('localStorage 寫入失敗 (pom_names):' + e.message); }
      setPomNames(namesResult.data); window.POM_NAMES = namesResult.data;
      setPomNamesOverride({ filename: namesResult.filename, uploadedAt: now, count: namesResult.count });
    }

    try { localStorage.setItem('stytrix.override.pomRules', JSON.stringify(existing)); }
    catch (e) { throw new Error('localStorage 寫入失敗(可能超出配額):' + e.message); }

    if (indexResults.length) {
      const merged = mergeBucketOverridesIntoIndex(existing.index.data);
      setPomRules(merged); window.POM_RULES = merged;
    } else if (bucketResults.length) {
      setPomRules(prev => {
        const merged = mergeBucketOverridesIntoIndex(prev);
        window.POM_RULES = merged;
        return merged;
      });
    }
    setPomRulesOverride({
      index: existing.index ? { filename: existing.index.filename, uploadedAt: existing.index.uploadedAt, count: existing.index.count } : null,
      buckets: Object.fromEntries(Object.entries(existing.buckets).map(([k, v]) => [k, { filename: v.filename, uploadedAt: v.uploadedAt, count: v.count }])),
    });
    const matched = bucketResults.find(b => b.bucketName === bucketKey);
    if (matched) {
      const d = existing.buckets[matched.bucketName].data;
      setCurrentBucket(d); window.CURRENT_BUCKET = d;
    } else if (bucketResults.length) {
      const last = bucketResults[bucketResults.length - 1];
      const d = existing.buckets[last.bucketName].data;
      setCurrentBucket(d); window.CURRENT_BUCKET = d;
      if (d.department) setDept(d.department);
      if (d.garment_type) setGt(d.garment_type);
      if (d.gender) setGender(d.gender);
    }
    return { indexCount: indexResults.length, bucketCount: bucketResults.length, namesCount: namesResult ? 1 : 0, invalidCount: invalid.length, skippedNonJson: skipped, invalid };
  };

  const clearPomRulesOverride = () => {
    try { localStorage.removeItem('stytrix.override.pomRules'); } catch {}
    setPomRulesOverride({ index: null, buckets: {} });
    fetch('./pom_rules/_index.json')
      .then(r => r.ok ? r.json() : Promise.reject(r.status))
      .then(data => { setPomRules(data); window.POM_RULES = data; })
      .catch(err => console.error('重新載入 _index.json 失敗:', err));
    if (bucketMeta) {
      fetch(`./pom_rules/${bucketMeta.file}`)
        .then(r => r.ok ? r.json() : Promise.reject(r.status))
        .then(data => { setCurrentBucket(data); window.CURRENT_BUCKET = data; })
        .catch(err => console.error('重新載入 bucket 失敗:', err));
    }
  };

  /* 部位出現率表（l1_part_presence）上傳覆蓋：同一個瀏覽器用 localStorage 覆寫 */
  const applyPartPresenceOverride = (file) => new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (ev) => {
      let parsed;
      try { parsed = JSON.parse(ev.target.result); }
      catch (e) { return reject('JSON 解析失敗：' + e.message); }
      if (!parsed || typeof parsed !== 'object' || !parsed.by_gt_it || typeof parsed.by_gt_it !== 'object') {
        return reject('格式不符：缺少 by_gt_it 欄位');
      }
      const buckets = Object.keys(parsed.by_gt_it);
      if (!buckets.length) return reject('格式不符：by_gt_it 為空');
      let partsCount = 0, badParts = 0;
      for (const key of buckets) {
        const b = parsed.by_gt_it[key];
        if (!Array.isArray(b?.parts)) return reject(`格式不符：${key} 缺少 parts array`);
        for (const p of b.parts) {
          if (!p?.l1_code || !p?.tier_en) { badParts++; continue; }
          partsCount++;
        }
      }
      const stored = { filename: file.name, uploadedAt: new Date().toISOString(), data: parsed };
      try { localStorage.setItem('stytrix.override.partPresence', JSON.stringify(stored)); }
      catch (e) { return reject('localStorage 寫入失敗（可能超出配額）：' + e.message); }
      setPartPresence(parsed);
      setPartPresenceOverride({
        filename: file.name, uploadedAt: stored.uploadedAt,
        bucketsCount: buckets.length, partsCount,
      });
      resolve({ bucketsCount: buckets.length, partsCount, badParts });
    };
    reader.onerror = () => reject('讀檔失敗');
    reader.readAsText(file);
  });

  const clearPartPresenceOverride = () => {
    try { localStorage.removeItem('stytrix.override.partPresence'); } catch {}
    setPartPresenceOverride(null);
    fetch('./l1_part_presence_v1.json')
      .then(r => r.ok ? r.json() : Promise.reject(r.status))
      .then(setPartPresence)
      .catch(err => console.error('重新載入 l1_part_presence 失敗:', err));
  };

  /* 把目前所有 localStorage 覆蓋(POM Rules + POM 翻譯表)打包推到
     GitHub main,觸發 Vercel 重新 deploy。成功後本機 overrides 會
     被清空,因為 main 已是新真相,不再需要 preview 層覆蓋。 */
  const pushOverridesToGithub = async ({ token, message }) => {
    if (!token) throw new Error('請先填 Admin Token');
    const files = [];

    // POM Rules index + buckets
    let rulesStored = null;
    try {
      const raw = localStorage.getItem('stytrix.override.pomRules');
      if (raw) rulesStored = JSON.parse(raw);
    } catch (e) { throw new Error('讀 pomRules 覆蓋失敗:' + e.message); }

    if (rulesStored?.index?.data) {
      files.push({ path: 'pom_rules/_index.json', content: JSON.stringify(rulesStored.index.data, null, 2) });
    }
    // canonical filename resolution:內建 _index.buckets 有 file 欄位 → 用它;
    // 否則用使用者上傳的檔名(若 .json 結尾)作為 fallback。
    const canonicalByBucket = {};
    if (rulesStored?.index?.data?.buckets) {
      for (const b of rulesStored.index.data.buckets) {
        if (b.bucket && b.file) canonicalByBucket[b.bucket] = b.file;
      }
    }
    if (!Object.keys(canonicalByBucket).length && pomRules?.buckets) {
      for (const b of pomRules.buckets) {
        if (b.bucket && b.file) canonicalByBucket[b.bucket] = b.file;
      }
    }
    for (const [bkey, entry] of Object.entries(rulesStored?.buckets || {})) {
      if (!entry?.data) continue;
      let fname = canonicalByBucket[bkey] || entry.filename;
      if (!fname || !/\.json$/i.test(fname)) {
        // derive:RTW_TOP|WOMENS → womens_rtw_top.json
        const [left, gender] = bkey.split('|');
        const parts = left?.split('_') || [];
        fname = `${(gender || 'unknown').toLowerCase()}_${parts.join('_').toLowerCase()}.json`;
      }
      files.push({ path: `pom_rules/${fname}`, content: JSON.stringify(entry.data, null, 2) });
    }

    // POM 翻譯表
    try {
      const raw = localStorage.getItem('stytrix.override.pomNames');
      if (raw) {
        const p = JSON.parse(raw);
        if (p?.data) {
          files.push({ path: 'pom_rules/pom_names.json', content: JSON.stringify(p.data, null, 2) });
        }
      }
    } catch {}

    if (!files.length) throw new Error('目前沒有任何本機覆蓋可推送');

    const res = await fetch('/api/push-pom-rules', {
      method: 'POST',
      headers: { 'content-type': 'application/json', 'x-admin-token': token },
      body: JSON.stringify({ files, message: message || null }),
    });
    let data;
    try { data = await res.json(); } catch { data = {}; }
    if (!res.ok) throw new Error(data.error || `API 錯誤 ${res.status}`);

    // 成功:清空本機覆蓋(main 已是新真相),重抓 built-in
    try { localStorage.removeItem('stytrix.override.pomRules'); } catch {}
    try { localStorage.removeItem('stytrix.override.pomNames'); } catch {}
    setPomRulesOverride({ index: null, buckets: {} });
    setPomNamesOverride(null);
    // 稍微等一下讓 Vercel 的 deploy 能跑到,不然馬上 fetch 還會拿到舊版
    // 這裡先重抓,使用者若看到舊資料過 30s 再重新整理即可
    fetch('./pom_rules/_index.json?t=' + Date.now())
      .then(r => r.ok ? r.json() : Promise.reject(r.status))
      .then(d => { setPomRules(d); window.POM_RULES = d; })
      .catch(() => {});
    fetch('./pom_rules/pom_names.json?t=' + Date.now())
      .then(r => r.ok ? r.json() : Promise.reject(r.status))
      .then(d => { setPomNames(d); window.POM_NAMES = d; })
      .catch(() => {});
    return data;
  };

  const [pomNames, setPomNames] = useState({});
  // 使用者對 pomNames 中文欄位的手動編輯(雙擊儲存格修改),存 localStorage
  const [pomZhEdits, setPomZhEdits] = useState(() => {
    try { return JSON.parse(localStorage.getItem('stytrix.override.pomZhEdits') || '{}'); } catch { return {}; }
  });
  const [editingZhCode, setEditingZhCode] = useState(null);
  const zhFor = (code) => pomZhEdits[code] ?? pomNames[code]?.zh ?? '';
  const saveZh = (code, value) => {
    const trimmed = (value || '').trim();
    const baseline = pomNames[code]?.zh || '';
    setPomZhEdits(prev => {
      const next = { ...prev };
      if (!trimmed || trimmed === baseline) delete next[code];
      else next[code] = trimmed;
      try { localStorage.setItem('stytrix.override.pomZhEdits', JSON.stringify(next)); } catch {}
      return next;
    });
  };
  const [currentBucket, setCurrentBucket] = useState(null);
  const [bucketLoading, setBucketLoading] = useState(false);
  // 依目前 bucket 解析通用模型的基礎 POM codes(按 candidate 優先序挑第一個在 bucket 有資料的)。
  // 聚陽 / 通用共用同一套 measurement/grading 版面,差異只在這組 code 集合。
  const universalBasicCodes = useMemo(() => {
    if (!currentBucket) return new Set();
    const mv = currentBucket.median_values || {};
    const mr = currentBucket.measurement_rules || {};
    const out = new Set();
    for (const s of universalSpec) {
      const code = s.candidates.find(c => (mv[c]?.size_medians?.M != null)
        || mr.must?.[c] || mr.recommend?.[c] || mr.optional?.[c]);
      if (code) out.add(code);
    }
    return out;
  }, [currentBucket, universalSpec]);
  const bucketKey = (dept && gt && gender) ? `${dept}_${gt}|${gender}` : null;
  const bucketMeta = useMemo(() => {
    if (!bucketKey || !pomRules) return null;
    return pomRules.buckets.find(b => b.bucket === bucketKey) || null;
  }, [bucketKey, pomRules]);
  useEffect(() => {
    // 先看 localStorage 是否有針對此 bucketKey 的覆蓋 —
    // 這樣即使使用者上傳的 bucket 不在內建 _index.json 裡,也能直接套用。
    try {
      const stored = localStorage.getItem('stytrix.override.pomRules');
      if (stored && bucketKey) {
        const parsed = JSON.parse(stored);
        const bucketEntry = parsed?.buckets?.[bucketKey];
        if (bucketEntry?.data) {
          setCurrentBucket(bucketEntry.data); window.CURRENT_BUCKET = bucketEntry.data;
          return;
        }
      }
    } catch (e) { console.warn('讀取 bucket 覆蓋失敗:', e); }
    if (!bucketMeta) { setCurrentBucket(null); return; }
    setBucketLoading(true);
    fetch(`./pom_rules/${bucketMeta.file}`)
      .then(r => r.ok ? r.json() : Promise.reject(r.status))
      .then(data => { setCurrentBucket(data); window.CURRENT_BUCKET = data; })
      .catch(err => { console.error('載入 bucket 失敗:', err); setCurrentBucket(null); })
      .finally(() => setBucketLoading(false));
  }, [bucketMeta]);
  const handleSketchUpload = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => setSketchSrc(ev.target.result);
    reader.readAsDataURL(file);
  };
  const handleSketchDrop = (e) => {
    e.preventDefault();
    const file = e.dataTransfer?.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => setSketchSrc(ev.target.result);
    reader.readAsDataURL(file);
  };

  /* ── 作工建議 tab state ── */
  const [cStep, setCStep] = useState(0);       // 0=idle, 1=analyzing, 2=done
  const [cAnalyzing, setCAnalyzing] = useState(false);
  const [cStage, setCStage] = useState(0);
  const [removed, setRemoved] = useState(new Set());
  const [openId, setOpenId] = useState(null);
  // 品牌套組（商標 Labels）AI 無法從 sketch 判定是否需要，預設不勾，由使用者自行加上
  // addonSteps = 已勾選的工段 index set；addonOn 由 size > 0 推導
  const [addonSteps, setAddonSteps] = useState(new Set());
  const [showAddonSteps, setShowAddonSteps] = useState(false);
  const addonOn = addonSteps.size > 0;
  // 手動新增部位的表單 state
  const [adding, setAdding] = useState(false);
  const [newL1, setNewL1] = useState("");
  const [newL2Idx, setNewL2Idx] = useState(0);
  const [newL3Idx, setNewL3Idx] = useState(0);
  const [newL4Idx, setNewL4Idx] = useState(0);
  const [newIsoIdx, setNewIsoIdx] = useState(0);
  // 聚陽新增表單需要抓 l2_l3_ie/<L1>.json 取得 L3 shapes / L4 methods;按需快取
  const [newIeData, setNewIeData] = useState(null);   // 目前已載入的 L1 的 ie 資料 {l1_code, knit, woven}
  const newIeCacheRef = useRef({});                   // { L1_code: ieData }
  const [hintDismissed, setHintDismissed] = useState(() => {
    try { return localStorage.getItem("stytrix.hint.card.dismissed") === "1"; } catch { return false; }
  });
  const [onboardingOpen, setOnboardingOpen] = useState(() => {
    try { return localStorage.getItem("stytrix.onboarding.done") !== "1"; } catch { return false; }
  });
  const dismissOnboarding = () => {
    try { localStorage.setItem("stytrix.onboarding.done", "1"); } catch {}
    setOnboardingOpen(false);
  };
  const [undoToast, setUndoToast] = useState(null); // { message, onUndo, expires }
  const undoTimerRef = useRef(null);
  const showUndo = (message, onUndo) => {
    if (undoTimerRef.current) clearTimeout(undoTimerRef.current);
    setUndoToast({ message, onUndo, at: Date.now() });
    undoTimerRef.current = setTimeout(() => setUndoToast(null), 5000);
  };
  const runUndo = () => {
    if (!undoToast) return;
    if (undoTimerRef.current) clearTimeout(undoTimerRef.current);
    undoToast.onUndo();
    setUndoToast(null);
  };
  const [cards, setCards] = useState([]);
  const [isoRec, setIsoRec] = useState(null);
  const [partPresence, setPartPresence] = useState(null);
  const [visualGuide, setVisualGuide] = useState(null);
  // 通用模型 Path 2 — 雙表查詢:
  //   v4.2 (primary, Department × Gender × GT × L1_name → ISO,zone-specific,含性別)
  //   v4   (fallback, Fabric × Department × GT × L1_code → ISO,段項齊全、有 iso_zh/machine)
  // v4.2 僅 5 個 L1(腰頭/褲口/褲合身/口袋/繩類)但有 Gender;v4 有 38 L1 但沒 Gender,
  // 也提供 iso_zh 與 machine 中英雙語顯示用的對照。
  const [isoLookupV42, setIsoLookupV42] = useState(null);
  const [isoLookupV4, setIsoLookupV4] = useState(null);
  const [analyzeErr, setAnalyzeErr] = useState(null);
  // { model, pass1: {input, output, cache_read, cache_write}, pass2: {...}, cost_est } | null
  const [analyzeUsage, setAnalyzeUsage] = useState(null);

  // 切換 appMode 時:把當前作工狀態存到舊模式的 slot,從新模式 slot 還原。
  // 新模式若沒存過,回到空白(cStep=0 / cards=[] / …),使用者需重新 Re-analyze。
  useEffect(() => {
    const prev = prevAppModeRef.current;
    if (prev === appMode) return;
    constructionStoresRef.current[prev] = {
      cStep, cStage, cards, removed, openId, addonSteps, analyzeErr, analyzeUsage,
    };
    const snap = constructionStoresRef.current[appMode];
    if (snap) {
      setCStep(snap.cStep);
      setCStage(snap.cStage);
      setCards(snap.cards);
      setRemoved(snap.removed);
      setOpenId(snap.openId);
      setAddonSteps(snap.addonSteps || new Set());
      setAnalyzeErr(snap.analyzeErr);
      setAnalyzeUsage(snap.analyzeUsage);
    } else {
      setCStep(0);
      setCStage(0);
      setCards([]);
      setRemoved(new Set());
      setOpenId(null);
      setAddonSteps(new Set());
      setAnalyzeErr(null);
      setAnalyzeUsage(null);
    }
    prevAppModeRef.current = appMode;
  }, [appMode]); // eslint-disable-line react-hooks/exhaustive-deps

  // 大 JSON 懶載：只在用戶上傳 sketch 後才抓。首屏省 ~900KB，
  // 純用尺寸表的流程完全不下載這三個檔。
  useEffect(() => {
    if (!sketchSrc) return;
    if (!isoRec) {
      fetch('./l1_iso_recommendations_v1.json')
        .then(r => r.ok ? r.json() : Promise.reject(r.status))
        .then(setIsoRec)
        .catch(err => console.error('載入 l1_iso_recommendations 失敗:', err));
    }
    if (!partPresence) {
      fetch('./l1_part_presence_v1.json')
        .then(r => r.ok ? r.json() : Promise.reject(r.status))
        .then(setPartPresence)
        .catch(err => console.error('載入 l1_part_presence 失敗:', err));
    }
    if (!visualGuide) {
      fetch('./data/l2_visual_guide.json')
        .then(r => r.ok ? r.json() : Promise.reject(r.status))
        .then(setVisualGuide)
        .catch(err => console.error('載入 l2_visual_guide 失敗:', err));
    }

  /* ── 尺寸表 tab state ── */

  const ptCount = useMemo(() => {

  const C_STAGES = appMode === "universal" ? [
    "① L1 部位判讀...",

    "① 載入 bucket 規則表(measurement_rules / median_values)...",

  const exportTechpack = () => {
    const snapshot = {
      version: "1.0",
      exportedAt: new Date().toISOString(),
      filters: { brand, fabric, gender, dept, garment_type: gt, item_type: it || null },
      construction: cDone ? {
        total_ie_seconds: Math.round(totalIE),

        struct_count: structCount,
        addon: addonOn ? {
          brand, name: ADDON.name,
          ie_seconds: Math.round(addonSelectedIE),
          steps: Array.from(addonSteps).sort((a, b) => a - b).map(i => ({
            name: ADDON.steps[i].l3,
            ie_seconds: Math.round(ADDON.steps[i].ie * 60),
          })),
        } : null,
        removed_ids: Array.from(removed),
        cards: vis.map(c => ({
          id: c.id,
          l1_code: c.code,
          l1_name: c.l1,
          l2: c.l2 || null,
          l2_code: c.l2Code || null,
          source: c.source,
          ie_seconds: Math.round(c.ie),
          method: c.methodName || null,
          l3_steps: (c.l3s || []).map(l3 => ({
            name: l3.pick != null && l3.opts ? (l3.opts[l3.pick]?.n ?? null) : null,
            ie_seconds: Math.round(l3.ie || 0),
          })),
        })),
      } : null,
      measurement: (mDone && currentBucket) ? {
        bucket: currentBucket.bucket,
        n_designs: currentBucket.n,
        sizes: currentBucket.size_range || [],
        poms: (() => {
          const mr = currentBucket.measurement_rules || {};
          const mv = currentBucket.median_values || {};
          const gr = currentBucket.grading_rules || {};
          const sizes = currentBucket.size_range || [];
          const out = [];
          ["must", "recommend", "optional"].forEach(tier => {
            Object.keys(mr[tier] || {}).forEach(code => {
              if (excluded.has(code)) return;
              const pn = pomNames[code] || {};
              const m = mr[tier][code];
              const mvRow = mv[code] || {};
              const baseM = mvRow.size_medians?.M;
              const ov = baseOverrides[code];
              const ovParsed = ov != null && ov !== "" ? parseInch(ov) : null;
              const effBase = ovParsed != null ? ovParsed : baseM;
              const sizeVals = {};
              sizes.forEach(s => {
                const origM = mvRow.size_medians?.M;
                const origS = mvRow.size_medians?.[s];
                if (origS == null) return;
                if (effBase == null || origM == null) { sizeVals[s] = origS; return; }
                sizeVals[s] = origS + (effBase - origM);
              });
              out.push({
                code,
                name_en: pn.en || code,
                name_zh: pn.zh || null,
                tier,
                tolerance: tolStr(m),
                base_m: effBase != null ? Number(effBase.toFixed(4)) : null,
                overridden: ovParsed != null && baseM != null && Math.abs(ovParsed - baseM) > 1e-9,
                grading_increment: gr[code]?.typical_increment ?? null,
                size_values: sizeVals,
              });
            });
          });
          return out;
        })(),
      } : null,
    };
    const json = JSON.stringify(snapshot, null, 2);
    const blob = new Blob([json], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    const stamp = new Date().toISOString().slice(0, 10);
    const slug = [brand, gt, it].filter(Boolean).join("_") || "techpack";
    a.href = url;
    a.download = `techpack_${slug}_${stamp}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  const resetAddForm = () => {
    setAdding(false);
    setNewL1(""); setNewL2Idx(0); setNewL3Idx(0); setNewL4Idx(0); setNewIsoIdx(0);
    setNewIeData(null);
  };

  // 切換 appMode、重新 analyze 時關表單 & 清狀態
  useEffect(() => { resetAddForm(); }, [appMode]);

  // 選 L1 後,聚陽模型需抓 l2_l3_ie/<code>.json 以列出 L3/L4
  useEffect(() => {
    if (!adding || appMode !== "makalot" || !newL1) { setNewIeData(null); return; }
    const cached = newIeCacheRef.current[newL1];
    if (cached) { setNewIeData(cached); return; }
    let cancelled = false;
    fetch(`./l2_l3_ie/${newL1}.json`).then(r => r.ok ? r.json() : null).then(d => {
      if (cancelled || !d) return;
      newIeCacheRef.current[newL1] = d;

  const addManualUniversalCard = () => {

    const picked = opts[newIsoIdx] || opts[0];

    const nextId = Math.max(0, ...cards.map(c => c.id || 0)) + 1;
    const l1Name = L1_CODE_TO_NAME[l1Code] || l1Code;
    const label = `ISO ${picked.iso}${picked.iso_zh ? " · " + picked.iso_zh : ""}${picked.machine ? " · " + picked.machine : ""}`;
    const alternatives = opts.filter((_, i) => i !== opts.indexOf(picked))
      .map(o => ({ iso: o.iso, iso_zh: o.iso_zh, machine: o.machine, pct: o.pct }));
    const card = {
      id: nextId, code: l1Code, l1: l1Name, l1_code: l1Code,
      source: "manual", ie: 0,
      l2: label, l2Base: null,
      l2Variants: [], l3Variants: [], methodVariants: [], l3s: [],
      universal: {
        iso: picked.iso, iso_zh: picked.iso_zh, machine: picked.machine,

      },

  const addManualMakalotCard = () => {
    const l1Code = newL1;
    if (!l1Code || !visualGuide) return;
    const l2Variants = buildL2VariantsForL1(visualGuide, l1Code);
    if (!l2Variants[newL2Idx]) return;
    const nextId = Math.max(0, ...cards.map(c => c.id || 0)) + 1;
    const l1Name = L1_CODE_TO_NAME[l1Code] || l1Code;
    const skeleton = {
      id: nextId, code: l1Code, l1: l1Name, l1_code: l1Code,
      source: "manual", ie: 0,
      l2: l1Name, l2Base: null,
      l2Variants, l2Idx: newL2Idx,
      l3Variants: [], l3Idx: 0,
      methodVariants: [], methodIdx: 0,
      l3s: [],
      presenceTier: null, presencePct: null,
