/* ─── rebuildCardFromL2: given a card + new L2 index (+ optional L3 index),
   fetches l2_l3_ie for that L1 and rebuilds l3Variants / methodVariants /
   l3s on the card. Used by onSwitchL2 and onSwitchL3. ─── */
function rebuildCardFromL2(card, newL2Idx, newL3Idx, fabric, setCards, newMethodIdx = 0) {
  const variant = card.l2Variants?.[newL2Idx];
  if (!variant) return;
  const isReal = (s) => s && !String(s).startsWith("**");
  const fabricKey = (fabric || "Knit").toLowerCase() === "woven" ? "woven" : "knit";
  const path = `./l2_l3_ie/${card.l1_code}.json`;
  fetch(path).then(r => r.ok ? r.json() : Promise.reject(r.status)).then(ie => {
    const l2Arr = ie[fabricKey] || [];
    const chosenL2 = l2Arr.find(x => x.l2 === variant.xlsx_name)
      || l2Arr.find(x => isReal(x.l2)) || l2Arr[0];

    // L3 variants for this L2
    const shapesAll = chosenL2?.shapes || [];
    const shapeFreqs = shapesAll.map(sh =>
      (sh.methods || []).reduce((n, m) => n + (m.steps || []).length, 0));
    const shapeFreqSum = shapeFreqs.reduce((s, n) => s + n, 0);
    const l3VariantsRaw = shapesAll.map((sh, i) => ({
      l3: sh.l3,
      _methods: sh.methods || [],
      freq: shapeFreqs[i],
      freq_pct: shapeFreqSum > 0 && shapeFreqs[i] > 0
        ? +(shapeFreqs[i] / shapeFreqSum * 100).toFixed(1) : null
    }));
    const defaultL3Idx = (() => {
      const idx = l3VariantsRaw.findIndex(s => isReal(s.l3));
      return idx >= 0 ? idx : 0;
    })();
    const l3Idx = (newL3Idx != null && l3VariantsRaw[newL3Idx]) ? newL3Idx : defaultL3Idx;
    const shape = l3VariantsRaw[l3Idx] || null;

    // L4 method variants
    const methodsAll = shape?._methods || [];
    const realMethods = methodsAll.filter(m => isReal(m.l4));
    const methods = realMethods.length ? realMethods : methodsAll;
    const methodFreqSum = methods.reduce((s, m) => s + (m.steps || []).length, 0);
    const tryFilter = (rows, mainOnly) => {
      const seen = new Set(); const list = [];
      for (const row of rows || []) {
        const [nm, gr, sc, ms] = row;
        if (mainOnly && ms && ms !== "主") continue;
        const k = `${nm}|${gr}`;
        if (seen.has(k)) continue;
        seen.add(k);
        list.push({ name: nm, ie: Number(sc) || 0, auto: false, pick: 0, opts: [{n:"無資料", p:100}] });
      }
      return list;
    };
    const methodVariants = methods.map(m => {
      const mainPath = tryFilter(m.steps, true);
      const steps = mainPath.length ? mainPath : tryFilter(m.steps, false);
      const totalSec = steps.reduce((s, x) => s + x.ie, 0);
      const raw = (m.steps || []).length;
      return {
        l4: m.l4, steps, totalSec: +totalSec.toFixed(0),
        freq: raw,
        freq_pct: methodFreqSum > 0 && raw > 0 ? +(raw / methodFreqSum * 100).toFixed(1) : null
      };
    });
    const methodIdx = methodVariants[newMethodIdx] ? newMethodIdx : 0;
    const cur = methodVariants[methodIdx] || { l4: null, steps: [], totalSec: 0 };
    const l2Base = chosenL2?.l2
      ? `${chosenL2.l2}${shape?.l3 ? " · " + shape.l3 : ""}`
      : null;
    const l4Short = cur.l4 ? (cur.l4.length > 40 ? cur.l4.slice(0, 40) + "…" : cur.l4) : null;

    // Strip runtime-only _methods before persisting to state
    const l3Variants = l3VariantsRaw.map(({_methods, ...rest}) => rest);

    setCards(prev => prev.map(pc => pc.id === card.id ? {
      ...pc,
      l2Idx: newL2Idx,
      l3Idx,
      l3Variants,
      methodIdx,
      methodVariants,
      l3s: cur.steps,
      ie: cur.totalSec,
      l2Base,
      l2: l2Base ? `${l2Base}${l4Short ? " · " + l4Short : ""}` : pc.l2
    } : pc));
  }).catch(err => console.error('載入 l2_l3_ie 失敗:', err));
}

/* ─── L1 下拉:依 l1_part_presence (GT|IT 桶) 的歷史出現率排序
   取 bucket 規則同 runConstruction:先 by_gt_it → 退回 by_gt。 ─── */
function sortedL1sForBucket(partPresence, gt, it) {
  const bucketKey = gt && it ? `${gt}|${it}` : null;
  const bucket = (partPresence && bucketKey && partPresence.by_gt_it?.[bucketKey])
    || (partPresence && gt && partPresence.by_gt?.[gt])
    || null;
  const pctByCode = {};
  if (bucket && Array.isArray(bucket.parts)) {
    for (const p of bucket.parts) {
      if (p.l1_code) pctByCode[p.l1_code] = { pct: p.presence_pct ?? null, tier: p.tier_en || p.tier || null };
    }
  }
  const codes = Object.keys(L1_CODE_TO_NAME);
  return codes.map(code => ({
    code,
    name: L1_CODE_TO_NAME[code] || code,
    pct: pctByCode[code]?.pct ?? null,
    tier: pctByCode[code]?.tier ?? null,
  })).sort((a, b) => {
    const ap = a.pct == null ? -1 : a.pct;
    const bp = b.pct == null ? -1 : b.pct;
    if (bp !== ap) return bp - ap;
    return a.name.localeCompare(b.name, 'zh-Hant');
  });
}

/* ─── app 的 dept / gender / gt 值正規化到 v4.3 桶用的 key ───
   v4.3 GT 對齊 App UI 下拉選單(PANTS/LEGGINGS/SHORTS/TOP/… 保持細粒度),
   所以 V43_GT_ALIAS 縮到只剩兩個 UI 有但 v4.3 沒 bucket 的例外。
   v4.3 Dept 為 General / Sleepwear / Swimwear(Sleepwear entry 極少但存在,
   isoOptionsFor 的第 3 層 fallback 會自動退到 General)。
   v4.3 Gender 集合為 KIDS / MENS / UNISEX / WOMENS。 */
const V43_DEPT_ALIAS = {
  Active: "General", RTW: "General", Fleece: "General",
  Sleepwear: "Sleepwear", Swimwear: "Swimwear",
};
const V43_GENDER_ALIAS = {
  MENS: "MENS", WOMENS: "WOMENS", MATERNITY: "WOMENS",
  BOYS: "KIDS", GIRLS: "KIDS", "BABY/TODDLER": "KIDS",
};
const V43_GT_ALIAS = {
  BODYSUIT: "TOP",   // 連身式上衣,v4.3 沒獨立 bucket
  SWIM_PIECE: "TOP", // 泳裝單件,Department=Swimwear 已區分,GT 先 map 到 TOP
};

/* ─── ISO 代碼 → {iso_zh, machine} 顯示對照(從 v4 entries 動態建出來)
   v4.3 沒有 iso_zh / machine,需要用這個表補充顯示資訊 ─── */
function buildIsoRef(lookupV4) {
  const ref = {};
  const entries = lookupV4?.entries || [];
  for (const e of entries) {
    if (e.iso && !ref[e.iso]) {
      ref[e.iso] = { iso_zh: e.iso_zh || null, machine: e.machine || null };
    }
  }
  return ref;
}

/* ─── 通用模型:回傳目前 bucket 下該 L1 可選的 ISO 列表
   先查 v4.3(Department × Gender × GT × L1,fine GT 對齊 UI,含性別,230 entries,
   L1 用 38 碼標準中文名),查無對應再 fallback 到 v4
   (Fabric × Department × GT × L1_code,沒有性別但覆蓋完整、提供 iso_zh/machine)。
   格式:[{ iso, iso_zh, machine, pct, isPrimary, source: "v4.3"|"v4" }] ─── */
function isoOptionsFor(lookupV43, lookupV4, filters, l1Code) {
  if (!l1Code) return [];
  const { fabric, dept, gender, gt, it } = filters || {};
  const l1Name = L1_CODE_TO_NAME[l1Code];
  const isoRef = buildIsoRef(lookupV4);

  // ── v4.3 查詢(fine GT,對齊 UI 下拉選單,只需處理少數例外) ──
  const v43Entries = lookupV43?.entries || [];
  const deptKey = V43_DEPT_ALIAS[dept] || "General";
  const genderKey = V43_GENDER_ALIAS[gender] || "UNISEX";
  const gtKey43 = V43_GT_ALIAS[gt] || gt;
  const findV43 = (pred) => v43Entries.find(e => e.l1 === l1Name && pred(e));
  let v43Entry = null;
  if (l1Name) {
    // 4 層 fallback:精準 → 同 dept + UNISEX → General + gender → General(任何 gender)
    v43Entry = findV43(e => e.department === deptKey && e.gender === genderKey && e.gt === gtKey43)
      || findV43(e => e.department === deptKey && e.gender === "UNISEX" && e.gt === gtKey43)
      || findV43(e => e.department === "General" && e.gender === genderKey && e.gt === gtKey43)
      || findV43(e => e.department === "General" && e.gt === gtKey43);
  }
  if (v43Entry && v43Entry.iso) {
    const dist = v43Entry.iso_distribution || {};
    const total = Object.values(dist).reduce((s, n) => s + n, 0) || 1;
    const pctFor = (iso) => +((dist[iso] || 0) / total * 100).toFixed(1);
    const v43Primary = {
      iso: v43Entry.iso,
      iso_zh: isoRef[v43Entry.iso]?.iso_zh || null,
      machine: isoRef[v43Entry.iso]?.machine || null,
      pct: v43Entry.iso_pct ?? pctFor(v43Entry.iso),
      isPrimary: true, source: "v4.3",
    };
    const v43Alts = Object.keys(dist)
      .filter(iso => iso !== v43Entry.iso)
      .map(iso => ({
        iso,
        iso_zh: isoRef[iso]?.iso_zh || null,
        machine: isoRef[iso]?.machine || null,
        pct: pctFor(iso), isPrimary: false, source: "v4.3",
      }))
      .sort((a, b) => (b.pct ?? 0) - (a.pct ?? 0));
    return [v43Primary, ...v43Alts];
  }

  // ── v4 fallback(無性別、但 L1 覆蓋廣) ──
  const v4Entries = lookupV4?.entries || [];
  const fabricV4 = (fabric || "Knit").toLowerCase() === "woven" ? "Woven" : "Knit";
  const V4_DEPTS = ["Active", "RTW", "Swimwear", "Sleepwear"];
  const deptV4 = V4_DEPTS.find(d => d.toUpperCase() === String(dept || "").toUpperCase()) || null;
  const GT_V4_ALIAS = { SWIM_PIECE: ["TOP", "PANTS"] };
  const gtCandidates = GT_V4_ALIAS[gt] || [gt];
  const CONF_RANK = { strong: 4, likely: 3, mixed: 2, no_dominant: 1, no_data: 0 };
  const rank = (e) => ((e.iso ? 1000 : 0) + (CONF_RANK[e.confidence] || 0) * 10 + (e.expect === "yes" ? 1 : 0));
  const pickBest = (list) => list.reduce((best, e) => (best == null || rank(e) > rank(best)) ? e : best, null);
  const tiers = [
    (e) => e.fabric === fabricV4 && e.department === deptV4 && gtCandidates.includes(e.gt) && e.l1_code === l1Code,
    (e) => e.fabric === fabricV4 && gtCandidates.includes(e.gt) && e.l1_code === l1Code,
    (e) => e.fabric === fabricV4 && e.department === deptV4 && e.l1_code === l1Code,
    (e) => e.fabric === fabricV4 && e.l1_code === l1Code,
  ];
  let v4Entry = null;
  for (const pred of tiers) {
    const best = pickBest(v4Entries.filter(pred));
    if (best && best.iso) { v4Entry = best; break; }
  }
  if (!v4Entry || !v4Entry.iso) return [];
  const votes = v4Entry.pptx_2025_votes || {};
  const totalVotes = Object.values(votes).reduce((s, n) => s + n, 0) || 0;
  const v4Primary = {
    iso: v4Entry.iso, iso_zh: v4Entry.iso_zh || null, machine: v4Entry.machine || null,
    pct: totalVotes > 0 && votes[v4Entry.iso] ? +(votes[v4Entry.iso] / totalVotes * 100).toFixed(1) : null,
    isPrimary: true, source: "v4",
  };
  const v4Alts = Object.keys(votes)
    .filter(iso => iso !== v4Entry.iso)
    .map(iso => ({
      iso, iso_zh: isoRef[iso]?.iso_zh || null, machine: isoRef[iso]?.machine || null,
      pct: totalVotes > 0 ? +(votes[iso] / totalVotes * 100).toFixed(1) : null,
      isPrimary: false, source: "v4",
    }))
    .sort((a, b) => (b.pct ?? 0) - (a.pct ?? 0));
  return [v4Primary, ...v4Alts];
}

/* ─── 聚陽模型:從 visualGuide 組該 L1 的 L2 變體清單 ─── */
function buildL2VariantsForL1(visualGuide, l1Code) {
  const section = visualGuide?.l1?.[l1Code];
  const l2Map = section?.l2 || {};
  const raw = Object.entries(l2Map).map(([code, info]) => ({
    code,
    xlsx_name: info.name || code,
    display_name: info.display_name || info.name || code,
    feature: info.feature || null,
    tier: info.tier || "unknown",
    freq: info.freq || 0,
  })).filter(v => !String(v.xlsx_name).startsWith("**"));
  raw.sort((a, b) => (b.freq || 0) - (a.freq || 0));
  // 轉成該 L1 內部的歷史佔比,讓 UI 顯示跟 L1 的 "歷史 X%" 一致
  const total = raw.reduce((s, v) => s + (v.freq || 0), 0);
  return raw.map(v => ({
    ...v,
    freq_pct: total > 0 && v.freq > 0 ? +(v.freq / total * 100).toFixed(1) : null,
  }));
}

/* 從 "~28\"" 之類的 hint 字串抽出英吋數值。沒有數字(如 "緊身"、"百褶")回傳 null。 */

/* ─── Helpers ─── */
/* 英吋顯示:slash 分數格式(與公差欄一致),例 "3/4"、"16 1/2"、"1/8"。
   四捨五入到 1/8",與原本的 unicode frmt 同等精度,避免語意改變。 */
const frmt = (v) => {
  if (v === 0) return "—";
  const neg = v < 0;
  const abs = Math.abs(v);
  const whole = Math.floor(abs);
  const frac = abs - whole;
  const sign = neg ? "-" : "";
  let f = "";
  if (frac >= 0.875) return sign + (whole + 1);
  else if (frac >= 0.625) f = "3/4";
  else if (frac >= 0.375) f = "1/2";
  else if (frac >= 0.125) f = "1/4";
  else if (frac > 0.05) f = "1/8";
  if (f && whole > 0) return `${sign}${whole} ${f}`;
  if (f) return `${sign}${f}`;
  return `${sign}${whole}`;
};

/* 解析使用者輸入的英吋字串：支援 "16", "16 1/2", "1/8", "16½", "16¾" 等 */
const parseInch = (s) => {
  if (s == null) return null;
  if (typeof s === "number") return s;
  let t = String(s).trim().replace(/["'\s]+$/, "").trim();
  if (!t) return null;
  t = t.replace(/⅛/g, " 1/8").replace(/¼/g, " 1/4").replace(/½/g, " 1/2").replace(/¾/g, " 3/4").replace(/⅜/g, " 3/8").replace(/⅝/g, " 5/8").replace(/⅞/g, " 7/8");
  const neg = t.startsWith("-");
  if (neg) t = t.slice(1).trim();
  const parts = t.split(/\s+/).filter(Boolean);
  let total = 0;
  for (const p of parts) {
    if (p.includes("/")) {
      const [n, d] = p.split("/").map(x => Number(x));
      if (!d || Number.isNaN(n)) return null;
      total += n / d;
    } else {
      const v = Number(p);
      if (Number.isNaN(v)) return null;
      total += v;
    }
  }
  return neg ? -total : total;
};

/* ─── POM 排序：身體部位從上到下、從前到後 ───
   以 prefix 為主序（依解剖順序：腰→臀→浪→襠→腿→…），bucket.pom_sort_order
   只做「同 prefix 內」的二次排序。這樣歷史資料若把某類放錯位（例 K 前後浪
   被塞到最後）也會被正規化。
   前綴對應部位：
   A 帽 → B 領 → C 肩 → D 袖籠/肩帶 → E 袖 → F 胸 → G 育克
   → H 腰 → I 下擺/側縫 → J 身長 → K 前後檔 → L 臀
   → M 襠 → N 大腿/膝/小腿/腿口 → O 內長/裙長
   → Q 繩帶 → R 省/褶 → S 鈕扣 → T 下擺/貼邊 → Z 裝飾
   → P 口袋（放最後，通常量完其他再標口袋）
*/
const POM_PREFIX_ORDER = {
  A: 1, B: 2, C: 3, D: 4, E: 5, F: 6, G: 7,
  H: 8, I: 9, J: 10, L: 11, K: 12, M: 13, N: 14, O: 15,
  Q: 16, R: 17, S: 18, T: 19, Z: 20, P: 21,
  U: 22, V: 23, W: 24, X: 25, Y: 26,
};
const sortPomCodes = (codes, bucketSortOrder) => {
  const bucketIdx = {};
  (bucketSortOrder || []).forEach((c, i) => { bucketIdx[c] = i; });
  return [...codes].sort((a, b) => {
    const pa = POM_PREFIX_ORDER[a[0]] || 99;
    const pb = POM_PREFIX_ORDER[b[0]] || 99;
    if (pa !== pb) return pa - pb;
    // 同 prefix：優先用 bucket 歷史順序，否則數字 + 字典序
    const ba = bucketIdx[a] !== undefined ? bucketIdx[a] : 9999;
    const bb = bucketIdx[b] !== undefined ? bucketIdx[b] : 9999;
    if (ba !== bb) return ba - bb;
    const na = parseInt(a.slice(1), 10) || 0;
    const nb = parseInt(b.slice(1), 10) || 0;
    if (na !== nb) return na - nb;
    return a.localeCompare(b);
  });
};

/* ─── Sel（v10 enterprise utility） ─── */
function Sel({ label, value, onChange, options, disabled, badgeMap, labelMap, locked, onToggleLock }) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  const filled = !!value;
  // 隱藏沒有資料的選項:badgeMap 有設且 key 對應的 count 為 0 / undefined → 不顯示。
  // badgeMap 是空物件(像 brandBadgeMap)或沒傳 → 不過濾,維持原本的 hardcoded 列表。
  const hasBadgeData = badgeMap && Object.keys(badgeMap).length > 0;
  const visibleOptions = hasBadgeData
    ? options.filter(o => (badgeMap[o] || 0) > 0)
    : options;

  // 點外面或按 Escape 關閉
  useEffect(() => {
    if (!open) return;
    const onDoc = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    const onKey = (e) => { if (e.key === "Escape") setOpen(false); };
    document.addEventListener("mousedown", onDoc);
    document.addEventListener("keydown", onKey);
    return () => {
      document.removeEventListener("mousedown", onDoc);
      document.removeEventListener("keydown", onKey);
    };
  }, [open]);

  const displayText = value ? ((labelMap && labelMap[value]) || value) : "—";
  const displayBadge = value && badgeMap && badgeMap[value];
  const borderColor = disabled ? "#eee" : (filled ? (locked ? "#065f46" : "#1a1a1a") : "#ddd");

  const selectOpt = (v) => { onChange(v); setOpen(false); };

  return (
    <div ref={ref} style={{ position: "relative" }}>
      <div style={{ fontSize: "11px", color: "#888", marginBottom: "6px", fontWeight: 500 }}>
        {label}
      </div>

      <div style={{ position: "relative" }}>
        {/* Trigger：看起來跟原本 underline select 幾乎一樣 */}
        <button onClick={() => !disabled && setOpen(o => !o)}
          disabled={disabled}
          aria-expanded={open}
          aria-haspopup="listbox"
          style={{
            width: "100%", padding: "6px 0", fontSize: "14px", textAlign: "left",
            background: "transparent", color: filled ? "#1a1a1a" : "#bbb",
            fontWeight: filled ? 600 : 400,
            border: "none", borderBottom: `1.5px solid ${borderColor}`,
            fontFamily: "inherit", cursor: disabled ? "not-allowed" : "pointer",
            borderRadius: 0, transition: "border-color 0.15s",
            display: "flex", justifyContent: "space-between", alignItems: "center",
          }}>
          <span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
            {displayText}{displayBadge ? ` (${displayBadge})` : ""}
          </span>
          <span aria-hidden="true" style={{ fontSize: "10px", color: "#bbb", marginLeft: "6px", transform: open ? "rotate(180deg)" : "rotate(0)", transition: "transform 0.15s" }}>▾</span>
        </button>

        {/* 選項清單：附著在觸發按鈕正下方，不擠壓下方內容 */}
        {open && !disabled && (
          <div role="listbox" aria-label={label}
            style={{
              position: "absolute", top: "100%", left: 0, right: 0, zIndex: 30,
              marginTop: "4px",
              border: "1px solid #e8e5e1", borderRadius: "6px",
              background: "#fff", maxHeight: "260px", overflowY: "auto",
              boxShadow: "0 4px 14px rgba(0,0,0,0.06)",
              animation: "fadeIn 0.12s ease",
            }}>
            <div role="option" aria-selected={!value} aria-label={`${label}：不選擇`}
              onClick={() => selectOpt("")}
              style={{ padding: "8px 12px", fontSize: "13px", color: "#bbb", cursor: "pointer", borderBottom: "1px solid #f5f5f5" }}
              onMouseEnter={e => e.currentTarget.style.background = "#faf9f7"}
              onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
              —
            </div>
            {visibleOptions.map(o => {
              const b = badgeMap && badgeMap[o];
              const d = (labelMap && labelMap[o]) || o;
              const sel = o === value;
              return (
                <div key={o} role="option" aria-selected={sel} aria-label={b ? `${d}，${b} 筆` : d}
                  onClick={() => selectOpt(o)}
                  style={{
                    padding: "8px 12px", fontSize: "13px",
                    color: sel ? "#065f46" : "#1a1a1a",
                    fontWeight: sel ? 700 : 400,
                    background: sel ? "#ecfdf5" : "transparent",
                    cursor: "pointer",
                    display: "flex", justifyContent: "space-between", alignItems: "center",
                    gap: "10px",
                  }}
                  onMouseEnter={e => { if (!sel) e.currentTarget.style.background = "#faf9f7"; }}
                  onMouseLeave={e => { if (!sel) e.currentTarget.style.background = "transparent"; }}>
                  <span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{d}</span>
                  {b && <span style={{ fontSize: "11px", color: "#888", fontWeight: 400, fontFamily: "'JetBrains Mono',monospace" }}>{b}</span>}
                </div>
              );
            })}
            {visibleOptions.length === 0 && (
              <div style={{ padding: "10px 12px", fontSize: "12px", color: "#bbb" }}>無可選項目</div>
            )}
          </div>
        )}
      </div>

      {onToggleLock && (
        <div style={{ display: "flex", justifyContent: "flex-end", marginTop: "4px", minHeight: "14px" }}>
          <button onClick={onToggleLock}
            title={locked ? "已鎖 — refresh 不會重設" : "按一下鎖住，refresh 不會重設"}
            aria-label={locked ? `解除鎖定 ${label}，refresh 後將重設` : `鎖定 ${label}，refresh 時保留此值`}
            aria-pressed={locked}
            style={{
              background: "none", border: "none", cursor: "pointer",
              padding: "0 2px", lineHeight: 0,
              color: locked ? "#065f46" : "#ddd",
              opacity: locked ? 1 : 0.55, transition: "opacity 0.15s",
              display: "inline-flex", alignItems: "center",
            }}
            onMouseEnter={e => e.currentTarget.style.opacity = "1"}
            onMouseLeave={e => e.currentTarget.style.opacity = locked ? "1" : "0.55"}>
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              {locked ? <path d="M7 11V7a5 5 0 0 1 10 0v4"/> : <path d="M7 11V7a5 5 0 0 1 9.9-1"/>}
            </svg>
          </button>
        </div>
      )}
    </div>
  );
}

                        } else {
                          const body = raw.replace(/^matched:\s*/i, "");

                      <div key={v.code} onClick={() => onSwitchL2 && onSwitchL2(card.id, idx)}

          {appMode !== "universal" && card.methodVariants && card.methodVariants.length > 1 && (

                <div style={{ marginTop: "8px", display: "flex", flexDirection: "column", gap: "4px" }}>

            </div>

          {appMode !== "universal" && (
            <>
              <div style={{ fontSize: "11px", color: "#888", padding: "8px 0 4px 10px" }}>

/* ─── POM Row for MISSY ─── */

          {pom.subRows && <span style={{ fontSize: "10px", color: "#555", background: "#f5f4f0", padding: "2px 6px", borderRadius: "6px" }}>{pom.subRows.length} sub</span>}
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: "8px", flexShrink: 0 }}>
          <span style={{ fontSize: "10px", color: tc.c, background: tc.bg, padding: "2px 7px", borderRadius: "6px", fontWeight: 600 }}>{tc.icon} {tc.label}</span>

/* 新增 POM 下拉:被 hide 的 bucket POMs 優先 + 多選 + 自訂欄位 */
function AddPomMenu({ open, onClose, hiddenCodes, excludedCodes, pomNames, zhFor, enFor, onAddBucket, onAddCustom }) {
  const [search, setSearch] = React.useState("");
  const [picked, setPicked] = React.useState(() => new Set());
  const [customCode, setCustomCode] = React.useState("");
  const [customZh, setCustomZh] = React.useState("");
  React.useEffect(() => {
    if (!open) { setSearch(""); setPicked(new Set()); setCustomCode(""); setCustomZh(""); }
  }, [open]);
  if (!open) return null;
  const norm = (s) => (s || "").toLowerCase();
  const q = norm(search);
  const matches = (c) => {
    if (!q) return true;
    const zh = norm(zhFor(c));
    const en = norm(enFor(c));
    return norm(c).includes(q) || zh.includes(q) || en.includes(q);
  };
  const hidden = hiddenCodes.filter(matches);
  const exc = excludedCodes.filter(matches);
  const togglePick = (c) => setPicked(prev => {
    const n = new Set(prev); n.has(c) ? n.delete(c) : n.add(c); return n;
  });
  const apply = () => {
    if (picked.size > 0) onAddBucket([...picked]);
    const codeTrim = (customCode || "").trim();
    if (codeTrim) onAddCustom(codeTrim, (customZh || "").trim());
    onClose();
  };
  const renderRow = (c, label) => (
    <label key={c} style={{ display: "flex", alignItems: "center", gap: "8px", padding: "7px 10px", borderRadius: "6px", cursor: "pointer", background: picked.has(c) ? "#f5f3ff" : "transparent" }}
      onMouseEnter={e => { if (!picked.has(c)) e.currentTarget.style.background = "#faf9f7"; }}
      onMouseLeave={e => { if (!picked.has(c)) e.currentTarget.style.background = "transparent"; }}>
      <input type="checkbox" checked={picked.has(c)} onChange={() => togglePick(c)} style={{ width: "14px", height: "14px", cursor: "pointer" }} />
      <span style={{ fontFamily: "'JetBrains Mono',monospace", fontWeight: 700, fontSize: "12px", color: "#555", minWidth: "42px" }}>{c}</span>
      <span style={{ fontSize: "13px", color: "#1a1a1a", flex: 1 }}>{zhFor(c) || <span style={{ color: "#bbb" }}>(無中文)</span>}</span>
      <span style={{ fontSize: "11px", color: "#888" }}>{enFor(c)}</span>
      {label && <span style={{ fontSize: "10px", color: "#7e22ce", background: "#f5f3ff", padding: "1px 5px", borderRadius: "6px", fontWeight: 600 }}>{label}</span>}
    </label>
  );
  return (
    <>
      <div onClick={onClose} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.15)", zIndex: 90 }} />
      <div style={{
        position: "fixed", top: "10%", left: "50%", transform: "translateX(-50%)",
        width: "min(560px, 92vw)", maxHeight: "80vh",
        background: T.c.bg, borderRadius: T.r.xl, boxShadow: T.shadow.md,
        zIndex: 100, display: "flex", flexDirection: "column", overflow: "hidden",
      }}>
        <div style={{ padding: T.pad.modalHead, borderBottom: `1px solid ${T.c.border}`, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <div style={{ fontSize: T.fs.xl, fontWeight: 700, color: T.c.text }}>新增 POM</div>
          <button onClick={onClose} aria-label="關閉" style={{ background: "none", border: "none", fontSize: "18px", color: "#888", cursor: "pointer", padding: "0 4px", lineHeight: 1 }}>×</button>
        </div>
        <div style={{ padding: "10px 14px", borderBottom: "1px solid #f0eeeb" }}>
          <input type="text" value={search} onChange={e => setSearch(e.target.value)} placeholder="搜尋 POM (code / 中文 / 英文)"
            style={{ width: "100%", padding: "8px 10px", fontSize: "13px", fontFamily: "inherit", border: "1px solid #e8e5e1", borderRadius: "6px", background: "#faf9f7" }} />
        </div>
        <div style={{ flex: 1, overflowY: "auto", padding: "8px 10px" }}>
          {hidden.length === 0 && exc.length === 0 && !q && (
            <div style={{ padding: "20px", textAlign: "center", fontSize: "12px", color: "#888" }}>所有 POM 都已在清單中</div>
          )}
          {hidden.length > 0 && (
            <>
              <div style={{ fontSize: "11px", color: "#7e22ce", fontWeight: 700, padding: "6px 10px", letterSpacing: "0.03em" }}>已隱藏 · {hidden.length} 項</div>
              {hidden.map(c => renderRow(c, "隱藏"))}
            </>
          )}
          {exc.length > 0 && (
            <>
              <div style={{ fontSize: "11px", color: "#b45309", fontWeight: 700, padding: "8px 10px 6px", letterSpacing: "0.03em" }}>已排除 · {exc.length} 項</div>
              {exc.map(c => renderRow(c, "已排除"))}
            </>
          )}
        </div>
        <div style={{ padding: "10px 14px", borderTop: "1px solid #e8e5e1", background: "#faf9f7" }}>
          <div style={{ fontSize: "11px", color: "#888", fontWeight: 700, marginBottom: "6px" }}>自訂 POM(不在清單裡)</div>
          <div style={{ display: "flex", gap: "6px" }}>
            <input type="text" value={customCode} onChange={e => setCustomCode(e.target.value)} placeholder="Code (如 X99)"
              style={{ width: "100px", padding: "7px 9px", fontSize: "12px", fontFamily: "'JetBrains Mono',monospace", border: "1px solid #e8e5e1", borderRadius: "6px", background: "#fff" }} />
            <input type="text" value={customZh} onChange={e => setCustomZh(e.target.value)} placeholder="中文名稱(選填)"
              style={{ flex: 1, padding: "7px 9px", fontSize: "12px", fontFamily: "inherit", border: "1px solid #e8e5e1", borderRadius: "6px", background: "#fff" }} />
          </div>
        </div>
        <div style={{ padding: "10px 14px", borderTop: `1px solid ${T.c.border}`, display: "flex", justifyContent: "flex-end", gap: "8px" }}>
          <button onClick={onClose} style={btnStyle({ variant: 'secondary' })}>取消</button>
          <button onClick={apply} disabled={picked.size === 0 && !customCode.trim()}
            style={btnStyle({ variant: 'primary', disabled: picked.size === 0 && !customCode.trim() })}>
            加入 {picked.size > 0 ? `(${picked.size + (customCode.trim() ? 1 : 0)})` : (customCode.trim() ? "(1)" : "")}
          </button>
        </div>
      </div>
    </>
  );
}

  // tolerance 可能是 object {standard, display} 或 number

  const tolDisplay = (tol && typeof tol === "object")
    ? (tol.display || frmt(tol.standard))
    : (tol != null ? frmt(tol) : null);
  // median 主值：size_medians.M（若有）或第一個 size
  const medianM = median?.size_medians?.M ?? (sizes.length ? median.size_medians[sizes[Math.floor(sizes.length/2)]] : null);
  return (
    <div style={{

      }}>

          <input type="checkbox" checked={included} onChange={e => { e.stopPropagation(); onToggleInclude(); }}
            style={{ width: "16px", height: "16px", accentColor: tc.c, cursor: "pointer", flexShrink: 0 }} />
          <span style={{ fontSize: "13px", fontWeight: 700, fontFamily: "'JetBrains Mono',monospace", color: tc.c, width: "42px", flexShrink: 0 }}>{code}</span>
          <div style={{ minWidth: 0, flex: 1 }}>
            <div style={{ fontSize: "14px", fontWeight: 600, color: "#1a1a1a", lineHeight: 1.2 }}>{nameEn}</div>
            {nameZh && <div style={{ fontSize: "11px", color: "#888", marginTop: "2px" }}>{nameZh}</div>}
          </div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: "8px", flexShrink: 0 }}>
          <span style={{ fontSize: "10px", color: tc.c, background: tc.bg, padding: "2px 7px", borderRadius: "6px", fontWeight: 600 }}>{tc.icon} {tc.label}</span>
          <span title={`${measurement?.count || 0} designs`} style={{ fontSize: "10px", color: "#555", fontFamily: "'JetBrains Mono',monospace" }}>{Math.round((measurement?.rate || 0) * 100)}%</span>
          {tolDisplay && <span style={{ fontSize: "10px", color: "#555", background: "#f3f4f6", padding: "2px 6px", borderRadius: "6px", fontWeight: 600, fontFamily: "'JetBrains Mono',monospace" }}>±{tolDisplay}"</span>}
          <span style={{ fontSize: "14px", fontWeight: 700, fontFamily: "'JetBrains Mono',monospace", color: "#1a1a1a" }}>{medianM != null ? frmt(medianM) + '"' : "—"}</span>
          <div style={{ fontSize: "13px", color: "#bbb", transform: isOpen ? "rotate(180deg)" : "rotate(0deg)", transition: "transform 0.25s" }}>▾</div>
        </div>
      </div>
      <div style={{ maxHeight: isOpen ? "700px" : "0", overflow: "hidden", transition: "max-height 0.35s ease" }}>
        <div style={{ padding: "0 14px 14px" }}>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: "10px", padding: "10px 0", borderBottom: "1px solid #f0eeeb" }}>
            <div><div style={{ fontSize: "10px", color: "#888" }}>Tolerance</div><div style={{ fontSize: "12px", fontWeight: 700, fontFamily: "'JetBrains Mono',monospace" }}>{tolDisplay ? "±" + tolDisplay + '"' : "—"}</div></div>
            <div><div style={{ fontSize: "10px", color: "#888" }}>Grading</div><div style={{ fontSize: "12px", fontWeight: 700, fontFamily: "'JetBrains Mono',monospace" }}>{grading?.typical_increment != null ? (grading.typical_increment >= 0 ? "+" : "") + frmt(grading.typical_increment) + '"' : "—"}</div></div>
            <div><div style={{ fontSize: "10px", color: "#888" }}>Rate</div><div style={{ fontSize: "12px", fontWeight: 700, fontFamily: "'JetBrains Mono',monospace" }}>{measurement?.rate != null ? Math.round(measurement.rate * 100) + "%" : "—"}</div></div>
            <div><div style={{ fontSize: "10px", color: "#888" }}>Count</div><div style={{ fontSize: "12px", fontWeight: 700, fontFamily: "'JetBrains Mono',monospace" }}>{measurement?.count || grading?.n_pairs || 0}</div></div>
          </div>
          {sizes.length > 0 && (
            <div style={{ marginTop: "10px" }}>
              <div style={{ display: "grid", gridTemplateColumns: `72px repeat(${sizes.length}, 1fr)`, gap: "1px" }}>
                <div style={{ padding: "5px 4px", fontWeight: 600, color: "#888", fontSize: "10px" }}>SIZE</div>
                {sizes.map(s => (
                  <div key={s} style={{ padding: "5px 2px", textAlign: "center", fontWeight: 700, color: s === "M" ? "#065f46" : "#1a1a1a", background: s === "M" ? "#ecfdf5" : "#faf9f7", borderRadius: "6px", fontSize: "11px", fontFamily: "'JetBrains Mono',monospace" }}>{s}{s === "M" && <span style={{ display: "block", fontSize: "10px", color: "#065f46" }}>BASE</span>}</div>
                ))}
                <div style={{ padding: "6px 4px", fontWeight: 600, fontSize: "10px" }}>Median</div>
                {sizes.map(s => (
                  <div key={s} style={{ padding: "3px 1px", textAlign: "center" }}>
                    <div style={{ fontSize: "12px", fontWeight: 700, fontFamily: "'JetBrains Mono',monospace", color: s === "M" ? "#065f46" : "#1a1a1a", padding: "3px 1px", borderRadius: "6px", border: s === "M" ? "2px solid #065f46" : "1.5px solid #e8e5e1", background: s === "M" ? "#ecfdf5" : "#fff" }}>{frmt(median.size_medians[s])}"</div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════

/* AdminModal:POM 翻譯表編輯器(data/pom_dictionary.json)
   - 上方「GitHub 推送 Token」:shared 密碼,存 localStorage['stytrix.admin.token']
   - 中間表格:code / en / zh 三欄,可搜尋 / 編輯 / 刪列 / 新增列
   - 工具:匯入 Excel(code/en/zh 三欄)、匯出 Excel
   - 下方:commit message + 推送到 GitHub
   - pomNames 是目前線上版 dict(read-only seed),draft 是草稿 */
function AdminModal({ open, onClose, pomNames, onPushDict }) {
  const [draft, setDraft] = React.useState({});
  const [search, setSearch] = React.useState('');
  const [token, setToken] = React.useState(() => {
    try { return localStorage.getItem('stytrix.admin.token') || ''; } catch { return ''; }
  });
  const [showToken, setShowToken] = React.useState(false);
  const [commitMsg, setCommitMsg] = React.useState('');
  const [pushState, setPushState] = React.useState({ status: 'idle', msg: '' });

  // 開啟時用當前 pomNames 初始化 draft
  React.useEffect(() => {
    if (open) {
      setDraft({ ...(pomNames || {}) });
      setSearch('');
      setCommitMsg('');
      setPushState({ status: 'idle', msg: '' });
    }
  }, [open, pomNames]);

  if (!open) return null;

  const saveToken = (t) => {
    setToken(t);
    try { t ? localStorage.setItem('stytrix.admin.token', t) : localStorage.removeItem('stytrix.admin.token'); } catch {}
  };

  // Draft helpers
  const updateRow = (code, field, value) => {
    setDraft(prev => ({ ...prev, [code]: { ...(prev[code] || { en: '', zh: '' }), [field]: value } }));
  };
  const renameCode = (oldCode, newCode) => {
    const nc = (newCode || '').toUpperCase().trim();
    if (!nc || nc === oldCode) return;
    setDraft(prev => {
      if (prev[nc]) return prev; // 已存在,拒絕覆蓋
      const { [oldCode]: row, ...rest } = prev;
      return { ...rest, [nc]: row };
    });
  };
  const deleteRow = (code) => {
    if (!window.confirm(`刪除 ${code} (${draft[code]?.en || ''} / ${draft[code]?.zh || ''})?`)) return;
    setDraft(prev => { const { [code]: _, ...rest } = prev; return rest; });
  };
  const addRow = () => {
    const code = (window.prompt('新 POM code(大寫字母 + 數字,e.g. H99):') || '').toUpperCase().trim();
    if (!code) return;
    if (!/^[A-Z]{1,3}\d{0,3}$/.test(code)) { alert('code 格式不對,需 1-3 大寫字母 + 0-3 數字'); return; }
    if (draft[code]) { alert(`${code} 已存在`); return; }
    setDraft(prev => ({ ...prev, [code]: { en: '', zh: '' } }));
    setSearch(code);
  };

  // Excel I/O
  const importExcel = (file) => {
    if (typeof XLSX === 'undefined') { alert('SheetJS 未載入'); return; }
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const wb = XLSX.read(e.target.result, { type: 'array' });
        const sheet = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
        if (!rows.length) { alert('Excel 無資料'); return; }
        const header = rows[0].map(x => String(x).toLowerCase().trim());
        const iCode = header.indexOf('code');
        const iEn = header.indexOf('en');
        const iZh = header.indexOf('zh');
        if (iCode < 0 || iEn < 0 || iZh < 0) {
          alert('Excel 需有 code / en / zh 三欄(第一列表頭)'); return;
        }
        const next = { ...draft };
        let added = 0, updated = 0, skipped = 0;
        for (let r = 1; r < rows.length; r++) {
          const row = rows[r];
          const code = String(row[iCode] || '').toUpperCase().trim();
          if (!code) continue;
          if (!/^[A-Z]{1,3}\d{0,3}$/.test(code)) { skipped++; continue; }
          const en = String(row[iEn] || '').trim();
          const zh = String(row[iZh] || '').trim();
          if (next[code]) updated++; else added++;
          next[code] = { en, zh };
        }
        setDraft(next);
        alert(`匯入完成:新增 ${added},更新 ${updated},略過 ${skipped}(格式錯誤)`);
      } catch (err) {
        alert('匯入失敗:' + (err?.message || err));
      }
    };
    reader.readAsArrayBuffer(file);
  };
  const exportExcel = () => {
    if (typeof XLSX === 'undefined') { alert('SheetJS 未載入'); return; }
    const rows = [['code', 'en', 'zh']];
    Object.keys(draft).sort().forEach(code => {
      rows.push([code, draft[code]?.en || '', draft[code]?.zh || '']);
    });
    const ws = XLSX.utils.aoa_to_sheet(rows);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'pom_dictionary');
    const d = new Date();
    const stamp = `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
    XLSX.writeFile(wb, `pom_dictionary_${stamp}.xlsx`);
  };

  // Push handler
  const pushNow = async () => {
    if (!token) { alert('請先填 Admin Token'); return; }
    setPushState({ status: 'pushing', msg: '推送中…' });
    try {
      const result = await onPushDict(draft, { token, message: commitMsg });
      if (result.unchanged) {
        setPushState({ status: 'success', msg: '沒有變更,未建立新 commit' });
      } else {
        setPushState({
          status: 'success',
          msg: `已推送(${result.entries} 筆 / commit ${(result.commit || '').slice(0, 7)})`,
          commitUrl: result.commit_url,
        });
      }
    } catch (err) {
      setPushState({ status: 'error', msg: err?.message || String(err) });
    }
  };

  // Derived
  const allCodes = Object.keys(draft).sort();
  const filter = search.trim().toLowerCase();
  const visible = filter
    ? allCodes.filter(c =>
        c.toLowerCase().includes(filter)
        || (draft[c]?.en || '').toLowerCase().includes(filter)
        || (draft[c]?.zh || '').includes(filter))
    : allCodes;
  const pomCount = allCodes.length;
  const origCount = Object.keys(pomNames || {}).length;
  const changed = JSON.stringify(draft) !== JSON.stringify(pomNames || {});

  return (
    <div onClick={onClose} role="dialog" aria-modal="true" aria-label="管理面板" style={{
      position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.45)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      zIndex: 100, padding: '20px',
    }}>
      <div onClick={e => e.stopPropagation()} style={{
        background: T.c.bg, borderRadius: T.r.xl, padding: '20px',
        maxWidth: '880px', width: '100%', maxHeight: '90vh', display: 'flex', flexDirection: 'column',
        boxShadow: T.shadow.md,
      }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: '10px' }}>
          <h2 style={{ margin: 0, fontSize: '17px', fontWeight: 700 }}>管理 · POM 翻譯表編輯</h2>
          <button onClick={onClose} aria-label="關閉管理面板" style={{
            background: 'none', border: 'none', cursor: 'pointer',
            fontSize: '22px', color: '#999', padding: '0 4px', lineHeight: 1, fontFamily: 'inherit',
          }}>×</button>
        </div>

        {/* Admin Token(上方) */}
        <div style={{ display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '10px', padding: '10px 12px', background: '#fffbeb', border: '1px solid #fde68a', borderRadius: '8px' }}>
          <span style={{ fontSize: '11px', color: '#92400e', fontWeight: 600, whiteSpace: 'nowrap' }}>🔑 Admin Token</span>
          <input type={showToken ? 'text' : 'password'} value={token} onChange={e => saveToken(e.target.value)}
            placeholder="Vercel env ADMIN_TOKEN 對應的共享密碼"
            style={{ flex: 1, minWidth: 0, padding: '6px 10px', fontSize: '12px', fontFamily: "'JetBrains Mono',monospace",
              border: '1px solid #fcd34d', borderRadius: '6px', background: '#fff' }} />
          <button onClick={() => setShowToken(!showToken)} type="button"
            style={{ fontSize: '11px', padding: '5px 10px', border: '1px solid #fcd34d', background: '#fff', borderRadius: '6px', cursor: 'pointer', fontFamily: 'inherit' }}>
            {showToken ? '隱藏' : '顯示'}
          </button>
          <span style={{ fontSize: '10px', color: '#92400e' }} title="存在 localStorage.stytrix.admin.token,跟 Vercel 的 ADMIN_TOKEN 環境變數比對">?</span>
        </div>

        {/* 工具列:搜尋 / 匯入 / 匯出 / 新增 */}
        <div style={{ display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '8px', flexWrap: 'wrap' }}>
          <input value={search} onChange={e => setSearch(e.target.value)} placeholder="搜尋 code / en / zh…"
            style={{ flex: '1 1 180px', minWidth: '140px', padding: '7px 10px', fontSize: '12px',
              border: '1px solid #e5e5e5', borderRadius: '6px', background: '#fff' }} />
          <label style={{
            padding: '6px 12px', fontSize: '12px', fontWeight: 600, cursor: 'pointer',
            border: '1px solid #bfdbfe', background: '#eff6ff', color: '#1d4ed8', borderRadius: '6px',
          }}>
            📥 匯入 Excel
            <input type="file" accept=".xlsx,.xls" style={{ display: 'none' }}
              onChange={(e) => { const f = e.target.files?.[0]; if (f) { importExcel(f); e.target.value = ''; } }} />
          </label>
          <button onClick={exportExcel}
            style={{ padding: '6px 12px', fontSize: '12px', fontWeight: 600, cursor: 'pointer',
              border: '1px solid #e5e5e5', background: '#fff', color: '#555', borderRadius: '6px', fontFamily: 'inherit' }}>
            📤 匯出 Excel
          </button>
          <button onClick={addRow}
            style={{ padding: '6px 12px', fontSize: '12px', fontWeight: 600, cursor: 'pointer',
              border: '1px dashed #a3a3a3', background: '#fff', color: '#525252', borderRadius: '6px', fontFamily: 'inherit' }}>
            + 新增列
          </button>
          <div style={{ marginLeft: 'auto', fontSize: '11px', color: '#888', fontFamily: "'JetBrains Mono',monospace" }}>
            {visible.length}/{pomCount} 筆{changed ? <span style={{ marginLeft: '6px', color: '#b45309', fontWeight: 600 }}>● 未儲存</span> : ''}
          </div>
        </div>

        {/* 表格區 */}
        <div style={{ flex: 1, overflow: 'auto', border: '1px solid #e8e5e1', borderRadius: '8px', background: '#fff', minHeight: '200px' }}>
          <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: '12px' }}>
            <thead style={{ position: 'sticky', top: 0, background: '#faf9f7', zIndex: 1 }}>
              <tr style={{ borderBottom: '1.5px solid #e8e5e1' }}>
                <th style={{ padding: '8px 10px', textAlign: 'left', fontWeight: 600, fontSize: '11px', color: '#525252', width: '70px' }}>Code</th>
                <th style={{ padding: '8px 10px', textAlign: 'left', fontWeight: 600, fontSize: '11px', color: '#525252' }}>English</th>
                <th style={{ padding: '8px 10px', textAlign: 'left', fontWeight: 600, fontSize: '11px', color: '#525252', width: '160px' }}>中文</th>
                <th style={{ padding: '8px 6px', width: '32px' }}></th>
              </tr>
            </thead>
            <tbody>
              {visible.length === 0 && (
                <tr><td colSpan={4} style={{ padding: '24px', textAlign: 'center', color: '#888', fontSize: '12px' }}>
                  {filter ? '沒有符合搜尋的項目' : '(空)'}
                </td></tr>
              )}
              {visible.map(code => {
                const row = draft[code] || { en: '', zh: '' };
                return (
                  <tr key={code} style={{ borderBottom: '1px solid #f0eeeb' }}>
                    <td style={{ padding: '4px 8px' }}>
                      <input value={code} onChange={(e) => renameCode(code, e.target.value)}
                        style={{ width: '60px', padding: '4px 6px', fontSize: '12px', fontWeight: 700,
                          fontFamily: "'JetBrains Mono',monospace", color: '#0891b2',
                          border: '1px solid transparent', borderRadius: '4px', background: 'transparent' }}
                        onFocus={(e) => e.target.style.border = '1px solid #bae6fd'}
                        onBlur={(e) => e.target.style.border = '1px solid transparent'} />
                    </td>
                    <td style={{ padding: '4px 8px' }}>
                      <input value={row.en} onChange={(e) => updateRow(code, 'en', e.target.value)}
                        style={{ width: '100%', padding: '4px 6px', fontSize: '12px',
                          border: '1px solid transparent', borderRadius: '4px', background: 'transparent', fontFamily: 'inherit' }}
                        onFocus={(e) => e.target.style.border = '1px solid #d4d4d4'}
                        onBlur={(e) => e.target.style.border = '1px solid transparent'} />
                    </td>
                    <td style={{ padding: '4px 8px' }}>
                      <input value={row.zh} onChange={(e) => updateRow(code, 'zh', e.target.value)}
                        style={{ width: '100%', padding: '4px 6px', fontSize: '12px',
                          border: '1px solid transparent', borderRadius: '4px', background: 'transparent', fontFamily: 'inherit' }}
                        onFocus={(e) => e.target.style.border = '1px solid #d4d4d4'}
                        onBlur={(e) => e.target.style.border = '1px solid transparent'} />
                    </td>
                    <td style={{ padding: '4px 4px', textAlign: 'center' }}>
                      <button onClick={() => deleteRow(code)} title="刪除"
                        style={{ border: 'none', background: 'transparent', cursor: 'pointer',
                          color: '#dc2626', fontSize: '14px', padding: '2px 4px', fontFamily: 'inherit' }}>×</button>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>

        {/* 推送區 */}
        <div style={{ marginTop: '12px', padding: '10px 12px', background: '#f9fafb', border: '1px solid #e5e5e5', borderRadius: '8px' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '8px' }}>
            <input value={commitMsg} onChange={e => setCommitMsg(e.target.value)}
              placeholder={`commit message(空白 → 自動「Update data/pom_dictionary.json via admin (${pomCount} entries)」)`}
              style={{ flex: 1, padding: '7px 10px', fontSize: '12px',
                border: '1px solid #e5e5e5', borderRadius: '6px', background: '#fff' }} />
            <button onClick={pushNow}
              disabled={!token || pushState.status === 'pushing'}
              style={{
                padding: '7px 16px', fontSize: '12px', fontWeight: 700,
                border: 'none', borderRadius: '6px', fontFamily: 'inherit',
                cursor: (!token || pushState.status === 'pushing') ? 'not-allowed' : 'pointer',
                background: (!token || pushState.status === 'pushing') ? '#d4d4d4' : '#1a1a1a',
                color: '#fff', whiteSpace: 'nowrap',
              }}>
              {pushState.status === 'pushing' ? '推送中…' : '🚀 推送到 GitHub'}
            </button>
          </div>
          {pushState.msg && (
            <div style={{
              fontSize: '11px', padding: '6px 10px', borderRadius: '6px',
              background: pushState.status === 'error' ? '#fef2f2' : pushState.status === 'success' ? '#f0fdf4' : '#eff6ff',
              color: pushState.status === 'error' ? '#991b1b' : pushState.status === 'success' ? '#166534' : '#1e40af',
              border: `1px solid ${pushState.status === 'error' ? '#fecaca' : pushState.status === 'success' ? '#bbf7d0' : '#bfdbfe'}`,
            }}>
              {pushState.msg}
              {pushState.commitUrl && (
                <> · <a href={pushState.commitUrl} target="_blank" rel="noopener noreferrer" style={{ color: '#166534' }}>查看 commit</a></>
              )}
            </div>
          )}
          <div style={{ fontSize: '10px', color: '#888', marginTop: '6px' }}>
            目前線上版 {origCount} 筆 → 草稿 {pomCount} 筆
            {changed && <span style={{ marginLeft: '6px', color: '#b45309' }}>(有改動)</span>}
          </div>
        </div>
      </div>
    </div>
  );
}

function OnboardingModal({ open, onDismiss }) {
  if (!open) return null;
  const steps = [
    { n: 1, title: "選 Filter", body: "從 Brand / Fabric / Gender / Dept / Garment Type 篩選歷史資料。Item Type 是選填。" },
    { n: 2, title: "上傳草圖並 Analyze", body: "拖放或點擊上傳草圖 → 按 Analyze，AI 辨識工法部位並自動推薦 ISO 縫法。" },
    { n: 3, title: "三步驟流程", body: "① 作工建議 → ② 基碼確認 → ③ 全碼。tab 會依完成度亮起綠色 ✓。" },
  ];
  return (
    <div onClick={onDismiss} role="dialog" aria-modal="true" aria-labelledby="onboarding-title" style={{
      position: "fixed", inset: 0, background: "rgba(0,0,0,0.45)",
      display: "flex", alignItems: "center", justifyContent: "center",
      zIndex: 150, padding: "20px", animation: "fadeIn 0.15s ease",
    }}>
      <div onClick={e => e.stopPropagation()} style={{
        background: T.c.bg, borderRadius: T.r.xl, padding: "26px 28px",
        maxWidth: "440px", width: "100%",
        boxShadow: T.shadow.md,
      }}>
        <div style={{ fontSize: "11px", color: "#065f46", fontWeight: 700, letterSpacing: "0.1em", marginBottom: "4px" }}>
          STYTRIX · TECHPACK
        </div>
        <h2 id="onboarding-title" style={{ margin: "0 0 18px 0", fontSize: "18px", fontWeight: 700, color: "#1a1a1a" }}>
          歡迎！3 步驟完成一份 techpack
        </h2>
        <div style={{ display: "flex", flexDirection: "column", gap: "14px", marginBottom: "22px" }}>
          {steps.map(s => (
            <div key={s.n} style={{ display: "flex", gap: "12px", alignItems: "flex-start" }}>
              <span aria-hidden="true" style={{
                flexShrink: 0, width: "26px", height: "26px", borderRadius: "50%",
                background: "#065f46", color: "#fff",
                display: "inline-flex", alignItems: "center", justifyContent: "center",
                fontSize: "12px", fontWeight: 700,
              }}>{s.n}</span>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: "13px", fontWeight: 700, color: "#1a1a1a", marginBottom: "2px" }}>
                  {s.title}
                </div>
                <div style={{ fontSize: "12px", color: "#555", lineHeight: 1.55 }}>
                  {s.body}
                </div>
              </div>
            </div>
          ))}
        </div>
        <div style={{ fontSize: "11px", color: "#555", marginBottom: "16px", lineHeight: 1.55 }}>
          每個 filter 旁的 🔒 讓 refresh 保留選擇。
        </div>
        <button onClick={onDismiss} style={{
          width: "100%", padding: "11px",
          background: "#1a1a1a", color: "#fff",
          border: "none", borderRadius: "6px",
          fontSize: "13px", fontWeight: 600, cursor: "pointer",
          fontFamily: "inherit",
        }}>開始使用</button>
      </div>
    </div>
  );
}

function App() {
  /* ── 共用 filter state + 鎖 + localStorage persistence ── */
  const loadSaved = () => {
    try {
      const locks = JSON.parse(localStorage.getItem("stytrix_locks") || "{}");
      const values = JSON.parse(localStorage.getItem("stytrix_values") || "{}");
      const restored = {};
      Object.keys(locks).forEach(k => { if (locks[k] && values[k]) restored[k] = values[k]; });
      return { locks, values: restored };
    } catch { return { locks: {}, values: {} }; }
  };
  const _saved = loadSaved();
  const [brand, setBrand] = useState(_saved.values.brand || "");
  const [fabric, setFabric] = useState(_saved.values.fabric || "");
  const [dept, setDept] = useState(_saved.values.dept || "");
  const [gender, setGender] = useState(_saved.values.gender || "");
  const [gt, setGt] = useState(_saved.values.gt || "");
  const [it, setIt] = useState(_saved.values.it || "");
  const [locks, setLocks] = useState(_saved.locks);
  const [filterExpanded, setFilterExpanded] = useState(false); // 手機版：選完 ≥2 filter 後收合成 pill
  const toggleLock = (key) => setLocks(prev => ({ ...prev, [key]: !prev[key] }));
  const toggleAllLocks = () => {
    const keys = ["brand", "fabric", "gender", "dept", "gt", "it"];
    const anyLocked = keys.some(k => locks[k]);
    setLocks(anyLocked ? {} : Object.fromEntries(keys.map(k => [k, true])));
  };
  useEffect(() => {
    localStorage.setItem("stytrix_locks", JSON.stringify(locks));
    const vals = { brand, fabric, dept, gender, gt, it };
    const toSave = {};
    Object.keys(locks).forEach(k => { if (locks[k] && vals[k]) toSave[k] = vals[k]; });
    localStorage.setItem("stytrix_values", JSON.stringify(toSave));
  }, [locks, brand, fabric, dept, gender, gt, it]);

  /* ── 切換 tab ── */
  const [activeTab, setActiveTab] = useState("construction"); // "construction" | "measurement" | "grading"

  /* ── Sketch 上傳 ── */
  const [sketchSrc, setSketchSrc] = useState(null);
  const [pomRules, setPomRules] = useState(null);
  const [adminOpen, setAdminOpen] = useState(false);
  // 模式切換：makalot=聚陽模型（作工五階層 + POM tier + 全碼）/ universal=通用模型（AI→ISO + 基礎大尺寸）
  const [appMode, setAppMode] = useState(() => {
    try {
      const v = localStorage.getItem('stytrix.appMode');
      return v === 'universal' ? 'universal' : 'makalot';
    } catch { return 'makalot'; }
  });
  useEffect(() => {
    try { localStorage.setItem('stytrix.appMode', appMode); } catch {}
  }, [appMode]);
  // 兩套作工內容完全不同,切換模型時互相保留各自的「作工」狀態。
  // 未 generate 過的那一側會回到空白狀態(cStep=0)。
  const constructionStoresRef = useRef({ makalot: null, universal: null });
  const prevAppModeRef = useRef(appMode);
  // 通用模型 — 基礎大尺寸：每欄位一組 candidate POM codes，按順序挑第一個
  // 在 currentBucket 裡有資料（median_values.M 或 measurement_rules）的碼，
  // 直接沿用聚陽 bucket 的中位數/公差/POM 翻譯，只是顯示比較少項。
  const UNIVERSAL_TOP_SPEC = [
    { zh: "肩寬", en: "Shoulder Width",        candidates: ["C1", "C2"] },
    { zh: "胸圍", en: "Chest",                 candidates: ["F10", "F11", "F17"] },
    { zh: "下擺", en: "Hem / Bottom Opening",  candidates: ["I13", "I5", "I7", "I8", "I2"] },
    { zh: "袖長", en: "Sleeve Length",         candidates: ["E1", "E3"] },
    { zh: "身長", en: "Body Length",           candidates: ["J10", "J9", "J19", "J20", "J8", "J7"] },
  ];
  const UNIVERSAL_BOTTOM_SPEC = [
    { zh: "腰圍", en: "Waist",                 candidates: ["H8", "H2", "H3", "H18", "H9"] },
    { zh: "臀圍", en: "Hip",                   candidates: ["L8", "L5", "L6"] },
    { zh: "前襠", en: "Front Rise",            candidates: ["K1"] },
    { zh: "後襠", en: "Back Rise",             candidates: ["K2"] },
    { zh: "內長", en: "Inseam",                candidates: ["O4"] },
    { zh: "褲口", en: "Leg Opening",           candidates: ["N9"] },
  ];
  const universalGarmentFamily = (() => {
    const bottoms = new Set(["PANTS", "SHORTS", "SKIRT", "LEGGINGS"]);
    return bottoms.has(gt) ? "bottom" : "top";
  })();
  const universalSpec = universalGarmentFamily === "bottom" ? UNIVERSAL_BOTTOM_SPEC : UNIVERSAL_TOP_SPEC;
  // 依目前 bucket 解析通用模型的基礎 POM codes(按 candidate 優先序挑第一個在 bucket 有資料的)已移到
  // currentBucket state 宣告之後,避免 TDZ ReferenceError。
  useEffect(() => {
    fetch('./pom_rules/_index.json')
      .then(r => r.ok ? r.json() : Promise.reject(r.status))
      .then(data => { setPomRules(data); window.POM_RULES = data; })
      .catch(err => console.error('載入 pom_rules/_index.json 失敗:', err));
    fetch('./data/grading_patterns.json')
      .then(r => r.ok ? r.json() : Promise.reject(r.status))
      .then(setGradingPatterns)
      .catch(err => console.error('載入 grading_patterns 失敗:', err));
    fetch('./data/bodytype_variance.json')
      .then(r => r.ok ? r.json() : Promise.reject(r.status))
      .then(setBodytypeVariance)
      .catch(err => console.error('載入 bodytype_variance 失敗:', err));
    fetch('./data/pom_dictionary.json')
      .then(r => r.ok ? r.json() : Promise.reject(r.status))
      .then(data => { setPomNames(data); window.POM_NAMES = data; })
      .catch(err => console.error('載入 pom_dictionary 失敗:', err));
  }, []);

  const [pomNames, setPomNames] = useState({});
  // 使用者對 pomNames 中文欄位的手動編輯(雙擊儲存格修改),存 localStorage
  const [pomZhEdits, setPomZhEdits] = useState(() => {
    try { return JSON.parse(localStorage.getItem('stytrix.override.pomZhEdits') || '{}'); } catch { return {}; }
  });
  const [editingZhCode, setEditingZhCode] = useState(null);
  const zhFor = (code) => pomZhEdits[code] ?? pomNames[code]?.zh ?? '';
  const saveZh = (code, value) => {
    const trimmed = (value || '').trim();
    const baseline = pomNames[code]?.zh || '';
    setPomZhEdits(prev => {
      const next = { ...prev };
      if (!trimmed || trimmed === baseline) delete next[code];
      else next[code] = trimmed;
      try { localStorage.setItem('stytrix.override.pomZhEdits', JSON.stringify(next)); } catch {}
      return next;
    });
  };
  // 使用者對英文名字的手動編輯(雙擊儲存格修改),存 localStorage
  const [pomEnEdits, setPomEnEdits] = useState(() => {
    try { return JSON.parse(localStorage.getItem('stytrix.override.pomEnEdits') || '{}'); } catch { return {}; }
  });
  const [editingEnCode, setEditingEnCode] = useState(null);
  const enFor = (code) => pomEnEdits[code] ?? pomNames[code]?.en ?? code;
  const saveEn = (code, value) => {
    const trimmed = (value || '').trim();
    const baseline = pomNames[code]?.en || code;
    setPomEnEdits(prev => {
      const next = { ...prev };
      if (!trimmed || trimmed === baseline) delete next[code];
      else next[code] = trimmed;
      try { localStorage.setItem('stytrix.override.pomEnEdits', JSON.stringify(next)); } catch {}
      return next;
    });
  };
  const [currentBucket, setCurrentBucket] = useState(null);
  const [bucketLoading, setBucketLoading] = useState(false);
  // 依目前 bucket 解析通用模型的基礎 POM codes(按 candidate 優先序挑第一個在 bucket 有資料的)。
  // 聚陽 / 通用共用同一套 measurement/grading 版面,差異只在這組 code 集合。
  const universalBasicCodes = useMemo(() => {
    if (!currentBucket) return new Set();
    const mv = currentBucket.median_values || {};
    const mr = currentBucket.measurement_rules || {};
    const out = new Set();
    for (const s of universalSpec) {
      const code = s.candidates.find(c => (mv[c]?.size_medians?.M != null)
        || mr.must?.[c] || mr.recommend?.[c] || mr.optional?.[c]);
      if (code) out.add(code);
    }
    return out;
  }, [currentBucket, universalSpec]);
  const bucketKey = (dept && gt && gender) ? `${dept}_${gt}|${gender}` : null;
  const bucketMeta = useMemo(() => {
    if (!bucketKey || !pomRules) return null;
    return pomRules.buckets.find(b => b.bucket === bucketKey) || null;
  }, [bucketKey, pomRules]);
  useEffect(() => {
    if (!bucketMeta) { setCurrentBucket(null); return; }
    setBucketLoading(true);
    fetch(`./pom_rules/${bucketMeta.file}`)
      .then(r => r.ok ? r.json() : Promise.reject(r.status))
      .then(data => { setCurrentBucket(data); window.CURRENT_BUCKET = data; })
      .catch(err => { console.error('載入 bucket 失敗:', err); setCurrentBucket(null); })
      .finally(() => setBucketLoading(false));
  }, [bucketMeta]);
  const handleSketchUpload = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => setSketchSrc(ev.target.result);
    reader.readAsDataURL(file);
  };
  const handleSketchDrop = (e) => {
    e.preventDefault();
    const file = e.dataTransfer?.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => setSketchSrc(ev.target.result);
    reader.readAsDataURL(file);
  };

  /* ── 作工建議 tab state ── */
  const [cStep, setCStep] = useState(0);       // 0=idle, 1=analyzing, 2=done
  const [cAnalyzing, setCAnalyzing] = useState(false);
  const [cStage, setCStage] = useState(0);
  const [removed, setRemoved] = useState(new Set());
  const [openId, setOpenId] = useState(null);
  // 品牌套組（商標 Labels）AI 無法從 sketch 判定是否需要，預設不勾，由使用者自行加上
  // addonSteps = 已勾選的工段 index set；addonOn 由 size > 0 推導
  const [addonSteps, setAddonSteps] = useState(new Set());
  const [showAddonSteps, setShowAddonSteps] = useState(false);
  const addonOn = addonSteps.size > 0;
  // 手動新增部位的表單 state
  const [adding, setAdding] = useState(false);
  const [newL1, setNewL1] = useState("");
  const [newL2Idx, setNewL2Idx] = useState(0);
  const [newL3Idx, setNewL3Idx] = useState(0);
  const [newL4Idx, setNewL4Idx] = useState(0);
  const [newIsoIdx, setNewIsoIdx] = useState(0);
  // 聚陽新增表單需要抓 l2_l3_ie/<L1>.json 取得 L3 shapes / L4 methods;按需快取
  const [newIeData, setNewIeData] = useState(null);   // 目前已載入的 L1 的 ie 資料 {l1_code, knit, woven}
  const newIeCacheRef = useRef({});                   // { L1_code: ieData }
  const [hintDismissed, setHintDismissed] = useState(() => {
    try { return localStorage.getItem("stytrix.hint.card.dismissed") === "1"; } catch { return false; }
  });
  const [onboardingOpen, setOnboardingOpen] = useState(() => {
    try { return localStorage.getItem("stytrix.onboarding.done") !== "1"; } catch { return false; }
  });
  const dismissOnboarding = () => {
    try { localStorage.setItem("stytrix.onboarding.done", "1"); } catch {}
    setOnboardingOpen(false);
  };
  const [undoToast, setUndoToast] = useState(null); // { message, onUndo, expires }
  const undoTimerRef = useRef(null);
  const showUndo = (message, onUndo) => {
    if (undoTimerRef.current) clearTimeout(undoTimerRef.current);
    setUndoToast({ message, onUndo, at: Date.now() });
    undoTimerRef.current = setTimeout(() => setUndoToast(null), 5000);
  };
  const runUndo = () => {
    if (!undoToast) return;
    if (undoTimerRef.current) clearTimeout(undoTimerRef.current);
    undoToast.onUndo();
    setUndoToast(null);
  };
  const [cards, setCards] = useState([]);
  const [isoRec, setIsoRec] = useState(null);
  const [partPresence, setPartPresence] = useState(null);
  const [visualGuide, setVisualGuide] = useState(null);
  // 通用模型 Path 2 — 雙表查詢:
  //   v4.3 (primary, Department × Gender × GT × L1 → ISO,fine GT 對齊 UI,含性別,130 entries)
  //   v4   (fallback, Fabric × Department × GT × L1_code → ISO,覆蓋完整、有 iso_zh/machine)
  // v4.3 由 5 種來源合併(PPTX 中文 / PDF 英文 / JSONL iso_codes / Raw PDF / OCR callout),
  // GT 保留 fine 粒度(PANTS/LEGGINGS/SHORTS/TOP/… 直接對應 App UI 下拉選單值);
  // v4 有 38 L1 但沒 Gender,也提供 iso_zh 與 machine 中英雙語顯示用的對照。
  const [isoLookupV43, setIsoLookupV43] = useState(null);
  const [isoLookupV4, setIsoLookupV4] = useState(null);
  // v6 construction bridge(data/construction_bridge_v6.json):
  // 每 GT 的 zone → L1 → iso_distribution + method_distribution。
  // 範圍比 v4 entry 的 pptx_2025_votes 廣(跨 2024/2025/2026 三年 1,328 designs),
  // 拿來當「替代 ISO」和「常見工法」的資料源。
  const [bridgeV6, setBridgeV6] = useState(null);
  // v6 grading_patterns(data/grading_patterns.json):
  // {category|gender: {POM: {m_median, pairs:{S→M,M→L,...}, inflection, delta_sm, delta_ml}}}
  // 33 combos × 1,016 POM families,20.6% POM 有 inflection(S→M 和 M→L 的 delta 不同)。
  // 拿來取代基碼頁目前用 pom_rules.grading_rules.typical_increment(固定遞增)的線性推導。
  const [gradingPatterns, setGradingPatterns] = useState(null);
  // bodytype_variance(data/bodytype_variance.json):
  // {GENDER|GT|BODYTYPE: {m_size_comparison: {POM: {delta, n_pairs}},
  //                        grading_deltas:   {POM: {regular_grading, <bt>_grading, same_pattern}}}}
  // 絕對值 = bucket.median_values[POM].size_medians.M + delta
  //(配對母體跟全部設計的 bucket median 不同,不能存絕對值,只存 delta)
  // 43 組 key,每組覆蓋 40+ POM。提供 PETITE/TALL/PLUS 相對 MISSY 的 M 差值 +
  // 跳檔序列對比(81% POM same_pattern=false,身材下跳檔序列就是跟 regular 不同)。
  // UI:使用者切 Run(petite/tall/plus)時拿 delta 套到 M 基碼,跳檔直接用 <bt>_grading array。
  const [bodytypeVariance, setBodytypeVariance] = useState(null);
  const [analyzeErr, setAnalyzeErr] = useState(null);
  // { model, pass1: {input, output, cache_read, cache_write}, pass2: {...}, cost_est } | null
  const [analyzeUsage, setAnalyzeUsage] = useState(null);

  // 切換 appMode 時:把當前作工狀態存到舊模式的 slot,從新模式 slot 還原。
  // 新模式若沒存過,回到空白(cStep=0 / cards=[] / …),使用者需重新 Re-analyze。
  useEffect(() => {
    const prev = prevAppModeRef.current;
    if (prev === appMode) return;
    constructionStoresRef.current[prev] = {
      cStep, cStage, cards, removed, openId, addonSteps, analyzeErr, analyzeUsage,
    };
    const snap = constructionStoresRef.current[appMode];
    if (snap) {
      setCStep(snap.cStep);
      setCStage(snap.cStage);
      setCards(snap.cards);
      setRemoved(snap.removed);
      setOpenId(snap.openId);
      setAddonSteps(snap.addonSteps || new Set());
      setAnalyzeErr(snap.analyzeErr);
      setAnalyzeUsage(snap.analyzeUsage);
    } else {
      setCStep(0);
      setCStage(0);
      setCards([]);
      setRemoved(new Set());
      setOpenId(null);
      setAddonSteps(new Set());
      setAnalyzeErr(null);
      setAnalyzeUsage(null);
    }
    prevAppModeRef.current = appMode;
  }, [appMode]); // eslint-disable-line react-hooks/exhaustive-deps

  // 大 JSON 懶載：只在用戶上傳 sketch 後才抓。首屏省 ~900KB，
  // 純用尺寸表的流程完全不下載這三個檔。
  useEffect(() => {
    if (!sketchSrc) return;
    if (!isoRec) {
      fetch('./l1_iso_recommendations_v1.json')
        .then(r => r.ok ? r.json() : Promise.reject(r.status))
        .then(setIsoRec)
        .catch(err => console.error('載入 l1_iso_recommendations 失敗:', err));
    }
    if (!partPresence) {
      fetch('./l1_part_presence_v1.json')
        .then(r => r.ok ? r.json() : Promise.reject(r.status))
        .then(setPartPresence)
        .catch(err => console.error('載入 l1_part_presence 失敗:', err));
    }
    if (!visualGuide) {
      fetch('./data/l2_visual_guide.json')
        .then(r => r.ok ? r.json() : Promise.reject(r.status))
        .then(setVisualGuide)
        .catch(err => console.error('載入 l2_visual_guide 失敗:', err));
    }
    if (!isoLookupV43 && appMode === "universal") {
      fetch('./General%20Model_Path2_Construction%20Suggestion/iso_lookup_factory_v4.3.json')
        .then(r => r.ok ? r.json() : Promise.reject(r.status))
        .then(setIsoLookupV43)
        .catch(err => console.error('載入 iso_lookup_factory_v4.3 失敗:', err));
    }
    if (!isoLookupV4 && appMode === "universal") {
      fetch('./General%20Model_Path2_Construction%20Suggestion/iso_lookup_factory_v4.json')
        .then(r => r.ok ? r.json() : Promise.reject(r.status))
        .then(setIsoLookupV4)
        .catch(err => console.error('載入 iso_lookup_factory_v4 失敗:', err));
    }
    if (!bridgeV6 && appMode === "universal") {
      fetch('./data/construction_bridge_v6.json')
        .then(r => r.ok ? r.json() : Promise.reject(r.status))
        .then(setBridgeV6)
        .catch(err => console.error('載入 construction_bridge_v6 失敗:', err));
    }
  }, [sketchSrc, appMode]);

  /* ── 尺寸表 tab state ── */
  const [mStep, setMStep] = useState(0);
  const [mAnalyzing, setMAnalyzing] = useState(false);
  const [mStage, setMStage] = useState(0);
  const [sizeRun, setSizeRun] = useState("missy"); // "missy" | "plus"
  const [showPetite, setShowPetite] = useState(true);
  const [showTall, setShowTall] = useState(true);
  const [openPom, setOpenPom] = useState(null);
  const [excluded, setExcluded] = useState(new Set());
  // 使用者手動加入的 POM codes(通用模型 keep 會略過 universalBasicCodes 限制)
  const [userAddedCodes, setUserAddedCodes] = useState(() => new Set());
  // 自訂 POM(不在 bucket 中):{ code, zh, tolerance: "±1/2" 等字串 }
  const [customPoms, setCustomPoms] = useState([]);
  // 加入 POM 下拉開關
  const [addPomOpen, setAddPomOpen] = useState(false);
  // 折疊的 tier 區段
  const [collapsedTiers, setCollapsedTiers] = useState(new Set());
  // 使用者編輯的基碼（M size）覆寫值：{ code: "16 1/2" }
  const [baseOverrides, setBaseOverrides] = useState({});
  // Plus sizes 有自己的 2X 基碼(獨立於 Missy M),預設不顯示 Plus
  const [plusBaseOverrides, setPlusBaseOverrides] = useState({});
  const [showPlus, setShowPlus] = useState(false);
  // Petite / Tall 各自獨立的 M 基碼覆寫(基碼頁的並列欄位用),
  // schema 跟 plusBaseOverrides 一樣 ({ code: "value-string" })。
  const [petiteBaseOverrides, setPetiteBaseOverrides] = useState({});
  const [tallBaseOverrides, setTallBaseOverrides] = useState({});
  // 全碼頁身型 sub-tab(radio 單選):'regular' | 'petite' | 'tall'。
  // 切換時整張全碼表的 M 基碼換成 <bt>_M(來自 bodytype_variance),
  // 跳檔仍走 Missy 的 grading_patterns / typical_increment(使用者明示)。
  const [gradingBodytype, setGradingBodytype] = useState('regular');
  // 顯示單位/格式切換(只影響顯示;內部資料一律為英吋 float)
  // displayUnit: 'in' | 'cm';  displayFormat: 'fraction' | 'decimal' (僅 inch 時有效,cm 固定小數)
  const [displayUnit, setDisplayUnit] = useState('in');
  const [displayFormat, setDisplayFormat] = useState('fraction');
  const unitSuffix = displayUnit === 'cm' ? ' cm' : '"';
  const fmtDisp = (v) => {
    if (v == null) return "—";
    if (displayUnit === 'cm') {
      const cm = v * 2.54;
      const r = Math.round(cm * 10) / 10;
      return Number.isInteger(r) ? String(r) : r.toFixed(1);
    }
    if (displayFormat === 'decimal') {
      const r = Math.round(v * 1000) / 1000;
      return Number.isInteger(r) ? String(r) : String(r);
    }
    return frmt(v);
  };
  // 解析使用者輸入 → 統一轉成英吋(內部儲存一律用英吋 float)
  // cm 模式下:"25" → 25 / 2.54 inches。inch 模式下仍用 parseInch。
  const parseValAs = (s, unit) => {
    if (s == null) return null;
    if (typeof s === "number") return s;
    const t = String(s).trim();
    if (!t) return null;
    if (unit === 'cm') {
      const cleaned = t.replace(/\s*cm\s*$/i, '').trim();
      const n = Number(cleaned);
      return Number.isFinite(n) ? n / 2.54 : null;
    }
    return parseInch(t);
  };
  const parseVal = (s) => parseValAs(s, displayUnit);
  // 切換單位/格式時,把既有的 override 字串用「舊單位/格式」解析 → 用「新單位/格式」重新格式化
  const migrateOverrides = (prevUnit, prevFormat, nextUnit, nextFormat) => {
    const rebuild = (store) => {
      const out = {};
      for (const [k, v] of Object.entries(store)) {
        if (v == null || v === "") { out[k] = v; continue; }
        const parsed = parseValAs(v, prevUnit);
        if (parsed == null) { out[k] = v; continue; }
        let formatted;
        if (nextUnit === 'cm') {
          const cm = parsed * 2.54;
          const r = Math.round(cm * 10) / 10;
          formatted = Number.isInteger(r) ? String(r) : r.toFixed(1);
        } else if (nextFormat === 'decimal') {
          const r = Math.round(parsed * 1000) / 1000;
          formatted = String(r);
        } else {
          formatted = frmt(parsed);
        }
        out[k] = formatted === "—" ? v : formatted;
      }
      return out;
    };
    setBaseOverrides(prev => rebuild(prev));
    setPlusBaseOverrides(prev => rebuild(prev));
  };
  const changeUnit = (u) => {
    if (u === displayUnit) return;
    migrateOverrides(displayUnit, displayFormat, u, displayFormat);
    setDisplayUnit(u);
  };
  const changeFormat = (f) => {
    if (f === displayFormat) return;
    migrateOverrides(displayUnit, displayFormat, displayUnit, f);

  // 手機版斷點（< 720px）：表格切換為卡片 / 精簡欄位

  useEffect(() => {

    const onChange = (e) => setIsMobile(e.matches);
    mq.addEventListener ? mq.addEventListener("change", onChange) : mq.addListener(onChange);
    return () => {

  const C_STAGES = appMode === "universal" ? [

  const exportTechpack = () => {
    const snapshot = {

              const ov = baseOverrides[code];
              const ovParsed = ov != null && ov !== "" ? parseInch(ov) : null;
              const effBase = ovParsed != null ? ovParsed : baseM;
              const sizeVals = {};
              sizes.forEach(s => {
                const origM = mvRow.size_medians?.M;
                const origS = mvRow.size_medians?.[s];

              });
            });
          });

        })(),
