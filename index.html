    };
    setCards(prev => [...prev, skeleton]);
    // 骨架入列後交給 rebuildCardFromL2 填 L3/L4/L5
    rebuildCardFromL2(skeleton, newL2Idx, newL3Idx, fabric, setCards, newL4Idx);
    resetAddForm();
  };

  const runConstruction = async () => {
    setCStep(1); setCAnalyzing(true); setCStage(0);
    setRemoved(new Set()); setOpenId(null);
    setCards([]); setAnalyzeErr(null); setAnalyzeUsage(null);
    resetAddForm();
    const si = setInterval(() => setCStage(s => s < 5 ? s + 1 : s), 280);
    const analyzeStartedAt = performance.now();
    try {
      const resp = await fetch('/api/analyze', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({
          image: sketchSrc, brand, fabric, gender,
          department: dept,
          garment_type: gt,
          mode: appMode,
        })
      });
      // Read as text first — on Vercel function crash, the response is HTML,
      // not JSON, so resp.json() would throw "Unexpected token '<'" and hide
      // the real HTTP status. Parse JSON best-effort; fall back to raw text
      // so the error surfaces upstream.
      const rawText = await resp.text();
      let data = null;
      try { data = rawText ? JSON.parse(rawText) : null; } catch {}
      if (!resp.ok) {
        const err = new Error(data?.error || `HTTP ${resp.status}${resp.statusText ? " " + resp.statusText : ""}`);
        err.status = resp.status;
        err.detail = data?.detail ?? (data ? null : rawText || null);
        throw err;
      }
      if (!data) throw new Error(`HTTP ${resp.status}: response 不是 JSON`);
      // Capture Claude usage stats for display; shape per-pass:
      //   { input_tokens, output_tokens, cache_creation_input_tokens, cache_read_input_tokens }
      // Pricing table by model (USD / M tokens).
      //   Opus 4.7:   input $15 / output $75 / cache_read $1.50 / cache_write $18.75
      //   Sonnet 4.6: input $3  / output $15 / cache_read $0.30 / cache_write $3.75
      //   Haiku 4.5:  input $1  / output $5  / cache_read $0.10 / cache_write $1.25
      const PRICING = {
        "claude-opus-4-7":   { input: 15,  output: 75, cache_read: 1.50, cache_write: 18.75 },
        "claude-sonnet-4-6": { input: 3,   output: 15, cache_read: 0.30, cache_write: 3.75 },
        "claude-haiku-4-5-20251001": { input: 1, output: 5, cache_read: 0.10, cache_write: 1.25 },
      };
      const PRICE = PRICING[data.model] || PRICING["claude-sonnet-4-6"];
      const centsFor = (u) => {
        if (!u) return 0;
        const i = u.input_tokens || 0;
        const o = u.output_tokens || 0;
        const cr = u.cache_read_input_tokens || 0;
        const cw = u.cache_creation_input_tokens || 0;
        return ((i * PRICE.input + o * PRICE.output + cr * PRICE.cache_read + cw * PRICE.cache_write) / 1e6) * 100;
      };
      const usageSummary = {
        model: data.model || null,
        pass1: data.usage_l1 || null,
        pass2: data.usage_l2 || null,
        cents_est: +(centsFor(data.usage_l1) + centsFor(data.usage_l2)).toFixed(3),
        elapsed_ms: Math.round(performance.now() - analyzeStartedAt),
      };
      console.log('[analyze] usage:', usageSummary);
      setAnalyzeUsage(usageSummary);
      // Deduplicate AI detections by L1 code (front + back views collapse into one).
      const raw = Array.isArray(data.detected) ? data.detected : [];
      const byCode = new Map();
      for (const d of raw) {
        const prev = byCode.get(d.code);
        if (!prev || (Number(d.confidence) || 0) > (Number(prev.confidence) || 0)) {
          byCode.set(d.code, d);
        }
      }

      // Layer in l1_part_presence_v1: for this GT×IT, look up every part with its
      // historical presence %. Essential (≥80%) parts are added as ghost cards even
      // if the AI didn't draw a bbox, so the user sees what the data says should be
      // there and can confirm/remove. Tier info is merged into every card for UI.
      const bucketKey = gt && it ? `${gt}|${it}` : null;
      const presenceBucket = (partPresence && bucketKey && partPresence.by_gt_it?.[bucketKey])
        || (partPresence && gt && partPresence.by_gt?.[gt])
        || null;
      const presenceByCode = {};
      if (presenceBucket) {
        for (const p of presenceBucket.parts || []) presenceByCode[p.l1_code] = p;
      }
      // Add essential parts the AI missed so they still render (tier_en === 'essential').
      // Enforce the 38-L1 invariant: presence file uses a legacy schema that
      // includes old codes (BT/EL/FC/FR/FU/GS/IL/LN/YK…) not in L1_CODE_TO_NAME.
      // Skip anything outside the canonical 38 so UI never shows half-broken cards.
      for (const code of Object.keys(presenceByCode)) {
        if (!L1_CODE_TO_NAME[code]) continue;
        if (byCode.has(code)) continue;
        if (presenceByCode[code].tier_en !== "essential") continue;
        byCode.set(code, { code, confidence: null, x: 50, y: 50, side: "front", _fromPresence: true });
      }
      const detected = Array.from(byCode.values());

      // ── Path 2 通用模型 — VLM(L1) → iso_lookup_factory_v4.2 + v4 fallback ──
      // v4.2 主查:Department × Gender × GT × L1_name,zone-specific parsing,含性別差異
      // v4 次查:Fabric × Department × GT × L1_code,L1 覆蓋更廣、含 iso_zh / machine
      // 兩表透過共同的 isoOptionsFor 合併:先試 v4.2(信心高 + 性別),找不到再退 v4。
      if (appMode === "universal") {
        const filters = { fabric, dept, gender, gt, it };
        const builtAll = detected.map((d) => ({ d, opts: isoOptionsFor(isoLookupV42, isoLookupV4, filters, d.code) }));
        // opts 空陣列 = 兩表都查無該 L1,卡片略過避免顯示「ISO null」
        const builtFiltered = builtAll.filter(x => x.opts.length > 0);
        const built = builtFiltered.map(({ d, opts }, i) => {
          const primary = opts[0];
          const l1 = L1_CODE_TO_NAME[d.code] || d.code;
          const label = `ISO ${primary.iso}${primary.iso_zh ? " · " + primary.iso_zh : ""}${primary.machine ? " · " + primary.machine : ""}`;
          const alternatives = opts.slice(1).map(o => ({
            iso: o.iso, iso_zh: o.iso_zh, machine: o.machine, pct: o.pct
          }));
          return {
            id: i + 1,
            l1,
            l1_code: d.code,
            l2: label,
            l2Base: null,
            source: d._fromPresence ? "struct" : "ai",
            conf: Number.isFinite(d.confidence) ? d.confidence : null,
            matchCode: null,
            px: Number.isFinite(d.x) ? d.x : 50,
            py: Number.isFinite(d.y) ? d.y : 50,
            side: d.side === "back" ? "right" : "left",
            ie: 0,
            action: "manual",
            isoConfidence: null,
            presenceTier: presenceByCode[d.code]?.tier_en || null,
            presencePct: presenceByCode[d.code]?.presence_pct ?? null,
            // Path 2 專屬:ISO 資訊 + 來源標記(v4.2 / v4)
            universal: {
              iso: primary.iso,
              iso_zh: primary.iso_zh || null,
              machine: primary.machine || null,
              confidence: null,
              action: null,
              source: primary.source,
              alternatives,
            },
            // 留空:universal mode 不使用五階層 drill-down
            methodIdx: 0, methodVariants: [],
            l2Idx: 0, l2Variants: [],
            l3Idx: 0, l3Variants: [],
            ai_l2_code: null, ai_l2_confidence: null, ai_l2_explanation: null,
            ai_l2_needs_text: false, ai_l2_merged_candidates: [],
            l3s: [],
          };
        });
        clearInterval(si);
        setCards(built);
        setCStage(5);
        setCAnalyzing(false);
        setCStep(2);
        return;
      }

      // Build ISO lookup: prefer GT|IT bucket, fallback to GT bucket, index by Chinese L1 name.
      const isoBucket = (isoRec && bucketKey && isoRec.by_gt_it[bucketKey])
        || (isoRec && gt && isoRec.by_gt[gt])
        || null;
      const bucket = isoBucket;
      const isoByName = {};
      if (bucket) bucket.parts.forEach(p => { isoByName[p.l1] = p; });
      // Normalize xlsx Chinese names to ISO-JSON Chinese names (different character choices).
      const ISO_NAME_ALIAS = {
        "帽子":"帽", "下襬":"下擺", "商標":"標",
        "脅邊":"脇縫",
        "袖孔":"袖襱", "袖圍":"袖襱"
      };
      const findIso = (name) => isoByName[name]
        || isoByName[ISO_NAME_ALIAS[name]]
        || isoByName[name.replace(/[()（）]/g, "")] || null;

      // Lazy-load l2_l3_ie/<code>.json for each detected part in parallel.
      const fabricKey = (fabric || "Knit").toLowerCase() === "woven" ? "woven" : "knit";
      const ieByCode = {};
      await Promise.all(detected.map(async d => {
        try {
          const r = await fetch(`/l2_l3_ie/${d.code}.json`);
          if (r.ok) ieByCode[d.code] = await r.json();
        } catch {}
      }));

      const built = detected.map((d, i) => {
        const l1 = L1_CODE_TO_NAME[d.code] || d.code;
        const rec = findIso(l1);
        const opts = rec && rec.options.length
          ? rec.options.map(o => ({ n: `${o.iso} ${o.zh}`, p: Math.round(o.percentage) }))
          : [{ n: "無資料", p: 100 }];

        // L1 → L2 → L3 → L4 (pre-selected). "** … _其它" = xlsx misc/catchall
        // buckets — skip those in favour of real named L2/shape/method when
        // possible so defaults land on actual construction data, not on rows
        // that are just there to catch stragglers.
        const isReal = (s) => s && !String(s).startsWith("**");
        const firstReal = (arr, key) => arr.find(x => isReal(x?.[key])) || arr[0];
        const ie = ieByCode[d.code];
        const l2Arr = ie?.[fabricKey] || [];

        // Build L2 variants list from the visual guide registry, merging AI
        // confidence (primary rank) with xlsx frequency (secondary rank).
        // Pre-select the AI's pick when it returned one; otherwise first
        // non-'**' L2 in the xlsx data (legacy behaviour).
        const guideSection = visualGuide?.l1?.[d.code];
        const guideL2Map = guideSection?.l2 || {};
        const aiMainConfByCode = {};
        if (d.l2_code) aiMainConfByCode[d.l2_code] = Number(d.l2_confidence) || 0;
        for (const alt of d.l2_alternatives || []) {
          if (alt.l2_code) aiMainConfByCode[alt.l2_code] = Math.max(aiMainConfByCode[alt.l2_code] || 0, Number(alt.confidence) || 0);
        }
        const rawL2Variants = Object.entries(guideL2Map).map(([code, info]) => ({
          code,
          xlsx_name: info.name,
          display_name: info.display_name || info.name,
          feature: info.feature || "",
          tier: info.tier || "unknown",
          freq: info.freq || 0,
          ai_confidence: aiMainConfByCode[code] ?? null,
        }));
        const l2FreqSum = rawL2Variants.reduce((s, v) => s + (v.freq || 0), 0) || 0;
        const l2Variants = rawL2Variants.map(v => ({
          ...v,
          freq_pct: l2FreqSum > 0 && v.freq > 0 ? +(v.freq / l2FreqSum * 100).toFixed(1) : null,
        })).sort((a, b) => {
          const ac = a.ai_confidence ?? -1, bc = b.ai_confidence ?? -1;
          if (ac !== bc) return bc - ac;
          return (b.freq || 0) - (a.freq || 0);
        });

        // Pick the variant whose xlsx_name exists in l2_l3_ie for this fabric.
        const l2NameSet = new Set(l2Arr.map(x => x.l2));
        const pickedL2Variant =
          l2Variants.find(v => v.xlsx_name && l2NameSet.has(v.xlsx_name))
          || null;
        const firstL2 = pickedL2Variant
          ? l2Arr.find(x => x.l2 === pickedL2Variant.xlsx_name)
          : firstReal(l2Arr, "l2");
        const l2Idx = pickedL2Variant
          ? Math.max(0, l2Variants.findIndex(v => v === pickedL2Variant))
          : 0;

        // L3 variants: every shape under the chosen L2. Non-'**' first; same
        // pattern as L4 switcher so user can drill down shape by shape.
        const shapesAll = firstL2?.shapes || [];
        const shapeFreqs = shapesAll.map(sh =>
          (sh.methods || []).reduce((n, m) => n + (m.steps || []).length, 0));
        const shapeFreqSum = shapeFreqs.reduce((s, n) => s + n, 0);
        const l3Variants = shapesAll.map((sh, i) => ({
          l3: sh.l3,
          _methods: sh.methods || [],
          freq: shapeFreqs[i],
          freq_pct: shapeFreqSum > 0 && shapeFreqs[i] > 0
            ? +(shapeFreqs[i] / shapeFreqSum * 100).toFixed(1) : null
        }));
        const realShapeIdx = l3Variants.findIndex(s => isReal(s.l3));
        const l3Idx = realShapeIdx >= 0 ? realShapeIdx : 0;
        const firstShape = l3Variants[l3Idx] || null;
        const methodsAll = firstShape?._methods || [];
        // Methods are already pre-sorted so that ** ones sit at the end;
        // pick the first non-** if any, else fall back to whatever exists.
        const realMethods = methodsAll.filter(m => isReal(m.l4));
        const methods = realMethods.length ? realMethods : methodsAll;
        // Pre-compute every L4 variant's step list. Prefer 主 (main path) rows,
        // but if a given method only has 副 rows we still surface them instead
        // of pretending there's no 五階 data — the xlsx always has steps for
        // every L1/L2/L3/L4 combo, it's just that '主' tagging isn't always
        // present in the '_其它' misc buckets.
        const buildSteps = (rawSteps) => {
          const rows = rawSteps || [];
          const tryFilter = (mainOnly) => {
            const seen = new Set();
            const list = [];
            for (const row of rows) {
              const [name, grade, seconds, mainSub] = row;
              if (mainOnly && mainSub && mainSub !== "主") continue;
              const key = `${name}|${grade}`;
              if (seen.has(key)) continue;
              seen.add(key);
              const sec = Number(seconds) || 0;
              list.push({ name, ie: sec, auto: rec?.action === "auto_recommend", pick: 0, opts });
            }
            return list;
          };
          const main = tryFilter(true);
          return main.length ? main : tryFilter(false);
        };
        const methodFreqSum = methods.reduce((s, m) => s + (m.steps || []).length, 0);
        const methodVariants = methods.map(m => {
          const steps = buildSteps(m.steps);
          const totalSec = steps.reduce((s, x) => s + x.ie, 0);
          const raw = (m.steps || []).length;
          return {
            l4: m.l4, steps, totalSec: +totalSec.toFixed(0),
            freq: raw,
            freq_pct: methodFreqSum > 0 && raw > 0 ? +(raw / methodFreqSum * 100).toFixed(1) : null
          };
        });
        const methodIdx = 0;
        const current = methodVariants[methodIdx] || { l4: null, steps: [], totalSec: 0 };
        const stepList = current.steps;
        const totalSeconds = current.totalSec;
        const l2Base = firstL2?.l2
          ? `${firstL2.l2}${firstShape?.l3 ? " · " + firstShape.l3 : ""}`
          : null;
        // Strip _methods (runtime-only) before persisting to state
        const l3VariantsOut = l3Variants.map(({_methods, ...rest}) => rest);
        const l4Short = current.l4
          ? (current.l4.length > 40 ? current.l4.slice(0, 40) + "…" : current.l4)
          : null;

        return {
          id: i + 1,
          l1,
          l1_code: d.code,
          l2: l2Base
            ? `${l2Base}${l4Short ? " · " + l4Short : ""}`
            : (rec ? `${rec.recommended_iso} ${isoRec?.iso_reference?.[rec.recommended_iso]?.zh || ""}` : "—"),
          l2Base,
          source: d._fromPresence ? "struct" : "ai",
          conf: Number.isFinite(d.confidence) ? d.confidence : null,
          matchCode: null,
          px: Number.isFinite(d.x) ? d.x : 50,
          py: Number.isFinite(d.y) ? d.y : 50,
          side: d.side === "back" ? "right" : "left",
          ie: +totalSeconds.toFixed(0),
          action: rec?.action || "user_select",
          isoConfidence: rec?.confidence || null,
          presenceTier: presenceByCode[d.code]?.tier_en || null,
          presencePct: presenceByCode[d.code]?.presence_pct ?? null,
          methodIdx,
          methodVariants,
          l2Idx,
          l2Variants,
          l3Idx,
          l3Variants: l3VariantsOut,
          ai_l2_code: d.l2_code || null,
          ai_l2_confidence: Number.isFinite(d.l2_confidence) ? d.l2_confidence : null,
          ai_l2_explanation: typeof d.l2_explanation === "string" ? d.l2_explanation : null,
          ai_l2_needs_text: !!d.l2_needs_text,
          ai_l2_merged_candidates: Array.isArray(d.l2_merged_candidates) ? d.l2_merged_candidates : [],
          l3s: stepList
        };
      });
      clearInterval(si);
      setCards(built);
      setCStage(5);
      setCAnalyzing(false);
      setCStep(2);
    } catch (e) {
      clearInterval(si);
      setAnalyzeErr({ message: String(e?.message || e), detail: e?.detail || null });
      setCAnalyzing(false);
      setCStep(0);
    }
  };
  const runMeasurement = () => {
    setMStep(1); setMAnalyzing(true); setMStage(0);
    setExcluded(new Set()); setOpenPom(null); setSizeRun("missy");
    setShowPetite(true); setShowTall(true);
    const si = setInterval(() => setMStage(s => s < 5 ? s + 1 : s), 350);
    setTimeout(() => { clearInterval(si); setMAnalyzing(false); setMStep(2); }, 2200);
  };
  const toggle = (id) => setOpenId(prev => prev === id ? null : id);

  return (
    <div style={{ minHeight: "100vh", background: "#fafafa", color: "#1a1a1a", fontFamily: "'Outfit','Noto Sans TC',system-ui,sans-serif" }}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800&display=swap');
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:.25}50%{opacity:.8}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scanDown{from{top:0%}to{top:98%}}
*{box-sizing:border-box}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#ccc;border-radius:2px}`}</style>

      {/* ─── Header (v10: minimal, content centered in 1280px container) ─── */}
      <div style={{
        padding: isMobile ? "18px 16px" : "24px 28px",
        background: "#fff", borderBottom: "1px solid #eee",
      }}>
      <div style={{
        maxWidth: "1280px", margin: "0 auto",
        display: "flex", justifyContent: "space-between", alignItems: "center",
        gap: "16px", flexWrap: "wrap",
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: "14px" }}>
          <img src="./LOGO.png" alt="StyTrix"
            style={{
              height: isMobile ? "40px" : "56px",
              width: "auto",
              display: "block",
              userSelect: "none",
            }}
            draggable="false" />
          <span style={{ width: "1px", height: "28px", background: "#ddd" }} />
          <span style={{ fontSize: isMobile ? "14px" : "16px", color: "#767676", fontWeight: 600, letterSpacing: "0.02em" }}>Techpack</span>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: "12px", flexWrap: "wrap" }}>
          {/* ─── 模式切換（聚陽 / 通用） ─── */}
          <div role="group" aria-label="模式切換"
            title="切換模式 — 聚陽模型：作工五階層+POM tier+全碼；通用模型：AI→ISO+基礎大尺寸"
            style={{
              display: "inline-flex", alignItems: "center",
              background: "#f5f4f0", borderRadius: "999px",
              padding: "3px", border: "1px solid #e8e5e1",
              boxShadow: "0 1px 2px rgba(0,0,0,0.04)",
            }}>
            {[
              { v: "makalot",   l: "聚陽模型" },
              { v: "universal", l: "通用模型" },
            ].map(o => {
              const on = appMode === o.v;
              return (
                <button key={o.v} onClick={() => setAppMode(o.v)}
                  aria-pressed={on}
                  style={{
                    background: on ? "#1a1a1a" : "transparent",
                    color:      on ? "#fff"    : "#525252",
                    border: "none", borderRadius: "999px",
                    padding: isMobile ? "6px 12px" : "7px 18px",
                    fontSize: isMobile ? "12px" : "13px", fontWeight: 700,
                    cursor: "pointer", fontFamily: "inherit",
                    transition: "all 0.15s", letterSpacing: "0.02em",
                    boxShadow: on ? "0 1px 3px rgba(0,0,0,0.15)" : "none",
                  }}>{o.l}</button>
              );
            })}
          </div>
          {(() => {
            const rulesBucketCount = Object.keys(pomRulesOverride?.buckets || {}).length;
            const hasAnyOverride = !!(pomNamesOverride || partPresenceOverride || pomRulesOverride?.index || rulesBucketCount > 0);
            return (
              <button onClick={() => setAdminOpen(true)}
                aria-label={hasAnyOverride ? "開啟管理面板（已有覆蓋）" : "開啟管理面板"}
                title={(() => {
                  const parts = [];
                  if (pomNamesOverride) parts.push(`POM 翻譯表：${pomNamesOverride.filename}`);
                  if (pomRulesOverride?.index || rulesBucketCount > 0) {
                    const bits = [];
                    if (pomRulesOverride.index) bits.push('_index');
                    if (rulesBucketCount > 0) bits.push(`bucket×${rulesBucketCount}`);
                    parts.push(`POM Rules：${bits.join('+')}`);
                  }
                  if (partPresenceOverride) parts.push(`部位出現率表：${partPresenceOverride.filename}`);
                  return parts.length ? `已覆蓋 — ${parts.join('、')}` : "管理：上傳 POM 翻譯表 / POM Rules / 部位出現率表";
                })()}
                style={{
                  background: "#fff", border: "1px solid #e8e5e1", borderRadius: "8px",
                  padding: isMobile ? "6px 12px" : "8px 14px", fontSize: isMobile ? "12px" : "13px", fontWeight: 700,
                  color: hasAnyOverride ? "#b45309" : "#525252",
                  cursor: "pointer", fontFamily: "inherit",
                  display: "inline-flex", alignItems: "center", gap: "6px", justifyContent: "center",
                  position: "relative", transition: "border-color 0.15s",
                }}>
                {hasAnyOverride && <span style={{ width: "6px", height: "6px", borderRadius: "50%", background: "#f59e0b", display: "inline-block" }} />}
                管理
              </button>
            );
          })()}
        </div>
      </div>
      </div>

      <div style={{ maxWidth: "1280px", margin: "0 auto", padding: isMobile ? "14px 14px" : "24px 28px" }}>
        {/* ─── Filter (v10: flush underline selects) ─── */}
        {(() => {
          const selectedFilters = [
            brand && { label: "Brand", v: brand },
            fabric && { label: "Fabric", v: fabric },
            gender && { label: "Gender", v: (GENDER_OPTIONS.find(g => g.value === gender)?.label) || gender },
            dept && { label: "Dept", v: dept },
            gt && { label: "GT", v: gt },
            it && { label: "IT", v: it },
          ].filter(Boolean);
          const collapsed = isMobile && selectedFilters.length >= 2 && !filterExpanded;
          if (collapsed) {
            return (
              <div style={{
                display: "flex", alignItems: "center", gap: "8px",
                flexWrap: "wrap",
                marginBottom: "14px", paddingBottom: "12px",
                borderBottom: "1px solid #eee",
              }}>
                {selectedFilters.map((f, i) => (
                  <span key={i} style={{
                    fontSize: "12px", padding: "4px 10px",
                    background: i === 0 ? "#1a1a1a" : "#f5f5f5",
                    color: i === 0 ? "#fff" : "#525252",
                    borderRadius: "999px", fontWeight: 600,

                  }}>{f.v}</span>
                ))}
                <button onClick={() => setFilterExpanded(true)} aria-label="編輯 filter" style={{
                  marginLeft: "auto",
                  fontSize: "11px", padding: "4px 10px",
                  background: "#fff", color: "#767676",
                  border: "1px solid #e8e5e1", borderRadius: "6px",
                  cursor: "pointer", fontWeight: 600, fontFamily: "inherit",
                  display: "inline-flex", alignItems: "center", gap: "4px",
                }}>✎ 編輯</button>
              </div>

          }
          const keys = ["brand", "fabric", "gender", "dept", "gt", "it"];
          const anyLocked = keys.some(k => locks[k]);
          return (

                  style={{
                    fontSize: "11px", padding: "3px 10px",
                    background: "#fff",
                    color: anyLocked ? "#065f46" : "#767676",
                    border: `1px solid ${anyLocked ? "#a7f3d0" : "#e8e5e1"}`,
                    borderRadius: "6px",
                    cursor: "pointer", fontWeight: 600, fontFamily: "inherit",
                    display: "inline-flex", alignItems: "center", gap: "5px",
                  }}>
                  <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                    {anyLocked ? <path d="M7 11V7a5 5 0 0 1 10 0v4"/> : <path d="M7 11V7a5 5 0 0 1 9.9-1"/>}
                  </svg>
                  {anyLocked ? "全部解鎖" : "全部鎖住"}
                </button>
                {isMobile && selectedFilters.length >= 2 && (
                  <button onClick={() => setFilterExpanded(false)} aria-label="收合 filter" style={{
                    fontSize: "11px", padding: "3px 10px",
                    background: "#fff", color: "#767676",
                    border: "1px solid #e8e5e1", borderRadius: "6px",
                    cursor: "pointer", fontWeight: 600, fontFamily: "inherit",
                  }}>收合</button>
                )}
              </div>
              <div style={{
                display: "grid",
                gridTemplateColumns: isMobile ? "repeat(2, 1fr)" : "repeat(6, 1fr)",
                gap: isMobile ? "12px 14px" : "20px",
                alignItems: "start",
              }}>
              <Sel label="Brand" value={brand} onChange={setBrand}
                options={BRANDS.map(b => b.code)} badgeMap={brandBadgeMap}
                locked={!!locks.brand} onToggleLock={() => toggleLock("brand")} />
              <Sel label="Fabric" value={fabric}
                onChange={v => { setFabric(v); setIt(""); }}
                options={["Woven", "Knit"]} badgeMap={fabricBadgeMap}
                locked={!!locks.fabric} onToggleLock={() => toggleLock("fabric")} />
              <Sel label="Gender" value={gender} onChange={setGender}
                options={pomRules ? Object.keys(genderBadgeMap).filter(v => genderBadgeMap[v] > 0).sort((a,b) => GENDER_OPTIONS.findIndex(g => g.value === a) - GENDER_OPTIONS.findIndex(g => g.value === b)) : GENDER_OPTIONS.map(g => g.value)}
                labelMap={Object.fromEntries(GENDER_OPTIONS.map(g => [g.value, g.label]))}
                badgeMap={genderBadgeMap}
                locked={!!locks.gender} onToggleLock={() => toggleLock("gender")} />
              <Sel label="Department" value={dept} onChange={setDept}
                options={pomRules ? Object.keys(deptBadgeMap).filter(d => deptBadgeMap[d] > 0).sort() : DEPT_OPTIONS}
                badgeMap={deptBadgeMap}
                locked={!!locks.dept} onToggleLock={() => toggleLock("dept")} />
              <Sel label="Garment Type" value={gt}
                onChange={v => { setGt(v); setIt(""); }}
                options={pomRules ? Object.keys(gtBadgeMap).filter(g => gtBadgeMap[g] > 0).sort() : GT_OPTIONS}
                badgeMap={gtBadgeMap}

                locked={!!locks.it} onToggleLock={() => toggleLock("it")} />
              </div>
            </div>
          );
        })()}

        {/* ─── Tabs：線性步驟樣式 ① ▸ ② ▸ ③ ─── */}
        {(() => {
          const tabs = [
            { key: "construction", label: appMode === "universal" ? "作工建議 · ISO" : "作工建議", done: cDone, disabled: false },
            { key: "measurement",  label: appMode === "universal" ? "基碼確認 · 基礎" : "基碼確認",   done: mDone, disabled: false },
            { key: "grading",      label: appMode === "universal" ? "全碼 · 基礎"     : "全碼",
              done: mDone && displayIncludedCount > 0,
              disabled: !(mDone && currentBucket && displayIncludedCount > 0) },
          ];
          const onTabKey = (e, idx) => {
            if (e.key !== "ArrowLeft" && e.key !== "ArrowRight" && e.key !== "Home" && e.key !== "End") return;
            e.preventDefault();
            const enabledIdx = tabs.map((t, i) => t.disabled ? null : i).filter(i => i !== null);
            let nextIdx;
            if (e.key === "Home") nextIdx = enabledIdx[0];
            else if (e.key === "End") nextIdx = enabledIdx[enabledIdx.length - 1];
            else {
              const cur = enabledIdx.indexOf(idx);
              const dir = e.key === "ArrowRight" ? 1 : -1;
              nextIdx = enabledIdx[(cur + dir + enabledIdx.length) % enabledIdx.length];
            }
            if (nextIdx == null) return;
            setActiveTab(tabs[nextIdx].key);
            const el = document.querySelector(`[data-tab-key="${tabs[nextIdx].key}"]`);
            if (el) el.focus();
          };
          return (
            <div role="tablist" aria-label="步驟" style={{
              display: "flex", alignItems: "center", borderBottom: "1px solid #eee",
              marginBottom: isMobile ? "16px" : "24px",
              overflowX: "auto",
              WebkitOverflowScrolling: "touch",

                        included={!excluded.has(p.code)} onToggleInclude={() => setExcluded(prev => { const n = new Set(prev); n.has(p.code) ? n.delete(p.code) : n.add(p.code); return n; })} />)}

                {excluded.size > 0 && (
                  <div style={{
                    padding: "10px 14px", marginTop: "10px", borderRadius: "8px",
                    background: "#fef9f9", border: "1px solid #f5e0e0",
                    display: "flex", justifyContent: "space-between", alignItems: "center"
                  }}>
                    <span style={{ fontSize: "12px", color: "#b91c1c" }}>已排除 {excluded.size} 個 POM</span>
                    <button onClick={() => setExcluded(new Set())} style={{
                      fontSize: "11px", color: "#b91c1c", background: "#fff",
                      border: "1px solid #f5e0e0", borderRadius: "6px",
                      padding: "4px 12px", cursor: "pointer", fontWeight: 600, fontFamily: "inherit"
                    }}>復原</button>
                  </div>
                )}

                <div style={{ display: "flex", gap: "8px", marginTop: "20px" }}>
                  <button onClick={exportTechpack} style={{
                    flex: 1, padding: "12px", background: "#1a1a1a", color: "#fff",
                    border: "none", borderRadius: "8px", fontSize: "13px", fontWeight: 600,
                    cursor: "pointer", fontFamily: "inherit",
                  }}>Export JSON</button>
                </div>
              </div>
            )}
          </div>
        )}

        {/* ═══ Grading (全碼) Tab Panel ═══ */}
        {activeTab === "grading" && (
          <div style={{ animation: "fadeIn 0.2s ease" }}>
            {!(mDone && currentBucket) && (
              <div style={{
                minHeight: "200px", display: "flex", alignItems: "center", justifyContent: "center",
                flexDirection: "column", gap: "10px", color: "#999",
                border: "1px solid #eee", borderRadius: "10px", background: "#fff", padding: "24px"
              }}>
                <div style={{ fontSize: "13px" }}>請先完成「基碼 / POM 確認」</div>
                <button onClick={() => setActiveTab("measurement")} style={{
                  padding: "8px 16px", border: "1px solid #e8e5e1", borderRadius: "8px",
                  background: "#fff", color: "#666", fontSize: "12px", fontWeight: 600,
                  cursor: "pointer", fontFamily: "inherit",
                }}>← 回基碼 / POM 確認</button>
              </div>
            )}
            {mDone && currentBucket && (() => {
              const mv = currentBucket.median_values || {};
              const gr = currentBucket.grading_rules || {};
              const mr = currentBucket.measurement_rules || {};
              const tiersOrdered = ["must", "recommend", "optional"];
              // 通用模型過濾為基礎大尺寸 POM；其餘版面與聚陽 100% 共用。
              const keep = appMode === "universal" ? (c => universalBasicCodes.has(c)) : (() => true);
              const tierPoms = tier => Object.keys(mr[tier] || {}).filter(c => mr[tier][c] != null && keep(c));
              const allCodesFlat = sortPomCodes(
                tiersOrdered.flatMap(t => tierPoms(t)),
                currentBucket.pom_sort_order
              );
              const gradingCodes = allCodesFlat.filter(c => !excluded.has(c));
              const sizes = currentBucket.size_range || [];
              const tierOf = code => mr.must?.[code] ? "must" : mr.recommend?.[code] ? "recommend" : "optional";
              const tolStr = m => {
                const t = m?.tolerance;
                if (!t) return "—";
                if (typeof t === "object") return "±" + (t.display || frmt(t.standard)) + '"';
                return "±" + frmt(t) + '"';
              };
              const effectiveBaseM = code => {
                const ov = baseOverrides[code];
                if (ov != null && ov !== "") {
                  const v = parseInch(ov);
                  if (v != null) return v;
                }
                return mv[code]?.size_medians?.M;
              };
              // 全碼 size 值:
              // Missy (XXS/XS/S/M/L/XL/XXL) 用 M + 步進 × 跳碼 推導 — M 改整條跟著走。
              // Plus (1X/2X/3X/4X) 完全獨立:自己的基碼 2X,不受 Missy M 影響。
              //   2X 可獨立編輯(plusBaseOverrides),其他 Plus 以 2X + 步進 × 跳碼 推導。
              const isPlus = s => /^\d+X$/.test(s);
              const missySeq = sizes.filter(x => !isPlus(x));
              const plusSeq = sizes.filter(isPlus).slice().sort((a, b) => parseInt(a) - parseInt(b)); // 升冪:2X < 3X < 4X
              const plusAnchor = plusSeq[0] || "2X"; // Plus 基碼以最小的 (通常 2X) 為 anchor
              const mIdxMissy = missySeq.indexOf("M");
              const hasPlus = plusSeq.length > 0;
              const effectivePlusBase = (code) => {
                const ov = plusBaseOverrides[code];
                if (ov != null && ov !== "") {
                  const v = parseInch(ov);
                  if (v != null) return v;
                }
                return mv[code]?.size_medians?.[plusAnchor];
              };
              // 未選 Item Type 且 POM 屬於「會因長度而變」的 → 整列留空
              const isLengthPending = code =>
                !it && IT_LENGTH_HINTS[gt] && IT_LENGTH_DEP_POMS[gt]?.has(code);
              const sizeValueFor = (code, s) => {
                if (isLengthPending(code) && !(baseOverrides[code] && parseInch(baseOverrides[code]) != null)) {
                  return null;
                }
                const origS = mv[code]?.size_medians?.[s];
                let v;
                if (isPlus(s)) {
                  // Plus 不吃 Missy M,獨立以 plusAnchor 當 base
                  const newBase = effectivePlusBase(code);
                  const origBase = mv[code]?.size_medians?.[plusAnchor];
                  if (newBase == null) v = origS ?? null;
                  else {
                    const sIdx = plusSeq.indexOf(s);
                    const baseIdx = plusSeq.indexOf(plusAnchor);
                    const inc = gr[code]?.typical_increment;
                    if (sIdx >= 0 && baseIdx >= 0 && inc != null) v = newBase + (sIdx - baseIdx) * inc;
                    else if (origS == null || origBase == null) v = origS ?? null;
                    else v = origS + (newBase - origBase);
                  }
                } else {
                  const origM = mv[code]?.size_medians?.M;
                  const newM = effectiveBaseM(code);
                  if (newM == null) v = origS ?? null;
                  else if (mIdxMissy >= 0) {
                    const sIdx = missySeq.indexOf(s);
                    const inc = gr[code]?.typical_increment;
                    if (sIdx >= 0 && inc != null) v = newM + (sIdx - mIdxMissy) * inc;
                    else if (origS == null || origM == null) v = origS ?? null;
                    else v = origS + (newM - origM);
                  } else {
                    if (origS == null || origM == null) v = origS ?? null;
                    else v = origS + (newM - origM);
                  }
                }
                return applyRunOffset(code, v);
              };
              // 顯示哪些 sizes:預設只 missy;showPlus=true 才 append plus
              const visibleSizes = showPlus ? [...missySeq, ...plusSeq] : missySeq;
              // Size run offset:非 regular 時,每個 POM 加上 bucket 提供的 offset
              // (schema: size_run_offsets = { petite: {code: delta}, tall: {code: delta} })
              const runOffsets = currentBucket.size_run_offsets || {};
              const activeOffsets = sizeRunVariant === 'regular' ? null : (runOffsets[sizeRunVariant] || null);
              const hasRunData = !!activeOffsets && Object.keys(activeOffsets).length > 0;
              // 只顯示有實際 offset 資料的 run 選項(regular 一律顯示)
              const availableRuns = ['regular', ...['petite','tall'].filter(
                r => runOffsets[r] && Object.keys(runOffsets[r]).length > 0
              )];
              const applyRunOffset = (code, v) => {
                if (v == null || !activeOffsets) return v;
                const d = activeOffsets[code];
                return d != null ? v + d : v;
              };

              return (
                <div style={{ animation: "slideUp 0.3s ease", paddingBottom: "24px" }}>
                  {/* Header:跟基碼同一形式(title + 計數 + bucket + Size controls)*/}
                  <div style={{
                    background: "#fff", border: "1px solid #eee", borderRadius: "10px",
                    padding: isMobile ? "14px 16px" : "18px 22px",
                    marginBottom: isMobile ? "12px" : "16px",
                  }}>
                    <div style={{
                      display: "flex",
                      flexDirection: isMobile ? "column" : "row",
                      justifyContent: "space-between",
                      alignItems: isMobile ? "stretch" : "center",
                      gap: isMobile ? "12px" : "16px"
                    }}>
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ fontSize: isMobile ? "16px" : "18px", fontWeight: 700, color: "#1a1a1a" }}>全碼 / 尺寸表</div>
                        <div style={{ fontSize: isMobile ? "12px" : "13px", color: "#888", marginTop: "3px" }}>各 size 中位數 · 公差 · 跳碼 · Grading 由 Base 推導</div>
                        <div style={{ display: "flex", alignItems: "baseline", gap: "8px", marginTop: "12px", flexWrap: "wrap" }}>
                          <span style={{ fontSize: isMobile ? "24px" : "30px", fontWeight: 700, fontFamily: "'JetBrains Mono',monospace", color: "#1a1a1a", lineHeight: 1 }}>{gradingCodes.length}</span>
                          <span style={{ fontSize: isMobile ? "14px" : "16px", color: "#888" }}>POMs · {visibleSizes.length} sizes</span>
                          {hasPlus && !showPlus && (
                            <span style={{ fontSize: isMobile ? "12px" : "13px", color: "#b45309", marginLeft: "4px" }}>(+{plusSeq.length} Plus 未顯示)</span>
                          )}
                        </div>
                      </div>
                      <div style={{ textAlign: isMobile ? "left" : "right" }}>
                        <div style={{ fontSize: isMobile ? "13px" : "14px", color: "#065f46", fontWeight: 700, fontFamily: "'JetBrains Mono',monospace" }}>{currentBucket.bucket}</div>
                        <div style={{ fontSize: isMobile ? "11px" : "12px", color: "#999", marginTop: "2px" }}>
                          Base: <span style={{ fontWeight: 700, color: "#065f46" }}>M</span>
                          {showPlus && <> + <span style={{ fontWeight: 700, color: "#065f46" }}>{plusAnchor}</span></>}
                          {" · inches (fractions)"}
                        </div>
                      </div>
                    </div>
                    {/* Size 擴展控制列(Run / Plus)— 跟基碼頁共用 state,兩邊同步 */}
                    <div style={{ display: "flex", alignItems: "center", gap: "14px", flexWrap: "wrap", marginTop: "14px", paddingTop: "12px", borderTop: "1px dashed #eee" }}>
                      {availableRuns.length > 1 && (
                      <div style={{ display: "flex", alignItems: "center", gap: "6px" }}>
                        <span style={{ fontSize: "11px", color: "#888", fontWeight: 500 }}>Run</span>
                        <div style={{ display: "inline-flex", border: "1px solid #e8e5e1", borderRadius: "6px", overflow: "hidden" }}>
                          {availableRuns.map((run, i) => {
                            const active = sizeRunVariant === run;
                            return (
                              <button key={run} onClick={() => setSizeRunVariant(run)}
                                style={{
                                  padding: "5px 11px", fontSize: "12px", fontWeight: active ? 700 : 500,
                                  background: active ? "#1a1a1a" : "#fff",
                                  color: active ? "#fff" : "#555",
                                  border: "none", cursor: "pointer", fontFamily: "inherit",
                                  borderRight: i !== availableRuns.length - 1 ? "1px solid #e8e5e1" : "none",
                                }}>
                                {run === 'regular' ? 'Regular' : run === 'petite' ? 'Petite' : 'Tall'}
                              </button>
                            );
                          })}
                        </div>
                      </div>
                      )}
                      {hasPlus && (
                        <label style={{ display: "flex", alignItems: "center", gap: "6px", fontSize: "12px", color: "#555", cursor: "pointer", userSelect: "none" }}>
                          <input type="checkbox" checked={showPlus} onChange={e => setShowPlus(e.target.checked)}
                            style={{ width: "14px", height: "14px", cursor: "pointer" }} />
                          顯示 Plus sizes <span style={{ fontSize: "10px", color: "#888" }}>({plusSeq.join("/")} · 自有基碼 {plusAnchor})</span>
                        </label>
                      )}
                      <span style={{ fontSize: "10px", color: "#999", marginLeft: "auto" }}>切換會同時套用到「基碼」頁</span>
                    </div>
                  </div>

                  {gradingCodes.length === 0 ? (
                    <div style={{ background: "#fff", border: "1px dashed #e8e5e1", borderRadius: "10px", padding: "20px", textAlign: "center", fontSize: "12px", color: "#999" }}>
                      尚未勾選任何 POM — 回「基碼確認」勾選
                    </div>
                  ) : isMobile ? (
                    /* 手機版：每個 POM 一張卡片，size 值用 4 欄 grid 呈現（避免水平捲動） */
                    <div style={{ display: "flex", flexDirection: "column", gap: "8px" }}>
                      {gradingCodes.map(code => {
                        const tier = tierOf(code);
                        const tc = TIER[tier];
                        const grRow = gr[code];
                        const m = mr[tier]?.[code];
                        const pn = pomNames[code] || {};
                        const edited = baseOverrides[code] != null && baseOverrides[code] !== "" && parseInch(baseOverrides[code]) != null;
                        const incText = grRow?.typical_increment != null ? (grRow.typical_increment >= 0 ? "+" : "") + frmt(grRow.typical_increment) + '"' : "—";
                        return (
                          <div key={code} style={{
                            background: "#fff", border: "1px solid #e8e5e1", borderRadius: "10px",
                            padding: "10px 12px",
                          }}>
                            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: "8px", marginBottom: "6px" }}>
                              <div style={{ display: "flex", alignItems: "baseline", gap: "8px", flex: 1, minWidth: 0 }}>
                                <span style={{ fontFamily: "'JetBrains Mono',monospace", fontWeight: 700, color: tc.c, fontSize: "13px" }}>{code}</span>
                                <span style={{ fontSize: "12px", color: "#1a1a1a", fontWeight: 500, overflow: "hidden", textOverflow: "ellipsis" }}>{pn.en || code}</span>
                              </div>
                              {edited && <span style={{ fontSize: "9px", color: "#7e22ce", background: "#f5f3ff", padding: "2px 6px", borderRadius: "4px", fontWeight: 600, whiteSpace: "nowrap" }}>已調整</span>}
                            </div>
                            <div style={{ display: "flex", gap: "14px", fontSize: "10px", color: "#888", marginBottom: "8px", paddingBottom: "8px", borderBottom: "1px solid #f5f5f5" }}>
                              <span>公差 <span style={{ fontFamily: "'JetBrains Mono',monospace", color: "#525252", fontWeight: 600 }}>{tolStr(m)}</span></span>
                              <span>跳碼 <span style={{ fontFamily: "'JetBrains Mono',monospace", color: "#b45309", fontWeight: 600 }}>{incText}</span></span>
                            </div>
                            <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: "5px" }}>
                              {visibleSizes.map(s => {
                                const val = sizeValueFor(code, s);
                                const isBase = (s === "M") || (isPlus(s) && s === plusAnchor);
                                return (
                                  <div key={s} style={{
                                    padding: "5px 4px",
                                    background: isBase ? "#ecfdf5" : "#fafafa",
                                    border: isBase ? "1px solid #a7f3d0" : "1px solid transparent",
                                    borderRadius: "6px", textAlign: "center",
                                  }}>
                                    <div style={{ fontSize: "9px", color: isBase ? "#065f46" : "#888", fontWeight: 700, fontFamily: "'JetBrains Mono',monospace", letterSpacing: "0.02em" }}>
                                      {s}{isBase && " · BASE"}
                                    </div>
                                    <div style={{ fontSize: "12px", color: isBase ? "#065f46" : "#1a1a1a", fontWeight: isBase ? 700 : 600, fontFamily: "'JetBrains Mono',monospace", marginTop: "1px" }}>
                                      {val != null ? frmt(val) + '"' : "—"}
                                    </div>
                                  </div>
                                );
                              })}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  ) : (
                    /* 桌機：保留寬表格 */
                    <div style={{ background: "#fff", border: "1px solid #e8e5e1", borderRadius: "10px", overflow: "auto" }}>
                      <table style={{ width: "100%", borderCollapse: "collapse", fontSize: "14px" }}>
                        <thead>
                          <tr style={{ background: "#faf9f7", borderBottom: "1.5px solid #e8e5e1" }}>
                            <th style={{ padding: "10px 12px", textAlign: "left", fontWeight: 600, fontSize: "12px", color: "#888", position: "sticky", left: 0, background: "#faf9f7", width: "60px" }}>POM</th>
                            <th style={{ padding: "10px 12px", textAlign: "left", fontWeight: 600, fontSize: "12px", color: "#888", minWidth: "120px" }}>Name</th>
                            <th style={{ padding: "10px 12px", textAlign: "left", fontWeight: 600, fontSize: "12px", color: "#888", minWidth: "140px" }}>中文<span style={{ fontSize: "9px", fontWeight: 400, color: "#bbb", marginLeft: "4px" }}>(雙擊可改)</span></th>
                            <th style={{ padding: "10px 12px", textAlign: "right", fontWeight: 600, fontSize: "12px", color: "#7e22ce", width: "90px" }}>公差</th>
                            <th style={{ padding: "10px 12px", textAlign: "right", fontWeight: 600, fontSize: "12px", color: "#b45309", width: "90px" }}>跳碼<div style={{ fontSize: "10px", fontWeight: 400, color: "#b45309" }}>Grading</div></th>
                            {visibleSizes.map(s => {
                              const isBase = (s === "M") || (isPlus(s) && s === plusAnchor);
                              return (
                                <th key={s} style={{ padding: "10px 8px", textAlign: "center", fontWeight: 700, fontSize: "12px", color: isBase ? "#065f46" : "#666", fontFamily: "'JetBrains Mono',monospace", background: isBase ? "#ecfdf5" : "transparent", minWidth: isBase ? (isMobile ? "84px" : "100px") : (isMobile ? "48px" : "56px") }}>{s}{isBase && <div style={{ fontSize: "9px", color: "#065f46" }}>BASE · 可編輯</div>}</th>
                              );
                            })}
                          </tr>
                        </thead>
                        <tbody>
                          {gradingCodes.map(code => {
                            const tier = tierOf(code);
                            const tc = TIER[tier];
                            const grRow = gr[code];
                            const m = mr[tier]?.[code];
                            const pn = pomNames[code] || {};
                            const edited = baseOverrides[code] != null && baseOverrides[code] !== "" && parseInch(baseOverrides[code]) != null;
                            return (
                              <tr key={code} style={{ borderBottom: "1px solid #f0eeeb" }}>
                                <td style={{ padding: "9px 12px", fontWeight: 700, fontFamily: "'JetBrains Mono',monospace", fontSize: "14px", color: tc.c, position: "sticky", left: 0, background: "#fff" }}>{code}</td>
                                <td style={{ padding: "9px 12px", fontSize: "14px", color: "#1a1a1a" }}>
                                  {pn.en || code}
                                  {edited && <span style={{ marginLeft: "6px", fontSize: "11px", color: "#7e22ce", background: "#f5f3ff", padding: "2px 6px", borderRadius: "4px", fontWeight: 600, whiteSpace: "nowrap" }}>已調整</span>}
                                </td>
                                <td style={{ padding: "7px 12px" }}
                                  onDoubleClick={() => setEditingZhCode(code)}
                                  title={editingZhCode === code ? "" : "雙擊可修改"}
                                >
                                  {editingZhCode === code ? (
                                    <input type="text" autoFocus
                                      defaultValue={zhFor(code)}
                                      onBlur={(e) => { saveZh(code, e.target.value); setEditingZhCode(null); }}
                                      onKeyDown={(e) => {
                                        if (e.key === "Enter") { e.preventDefault(); e.currentTarget.blur(); }
                                        else if (e.key === "Escape") { setEditingZhCode(null); }
                                      }}
                                      style={{ width: "100%", padding: "5px 7px", fontSize: "13px", fontFamily: "inherit", border: "1px solid #1a1a1a", borderRadius: "5px", background: "#fff" }} />
                                  ) : (
                                    <div style={{ display: "flex", alignItems: "center", gap: "6px", cursor: "text", color: "#555", fontSize: "13px" }}>
                                      <span>{zhFor(code) || <span style={{ color: "#ccc" }}>(空)</span>}</span>
                                      {pomZhEdits[code] && <span style={{ fontSize: "9px", color: "#7e22ce", background: "#f5f3ff", padding: "1px 5px", borderRadius: "3px", fontWeight: 600 }}>自訂</span>}
                                    </div>
                                  )}
                                </td>
                                <td style={{ padding: "9px 12px", textAlign: "right", fontFamily: "'JetBrains Mono',monospace", fontSize: "14px", color: "#7e22ce", fontWeight: 600, whiteSpace: "nowrap" }}>
                                  {tolStr(m)}
                                </td>
                                <td style={{ padding: "9px 12px", textAlign: "right", fontFamily: "'JetBrains Mono',monospace", fontSize: "14px", color: "#b45309", fontWeight: 600, whiteSpace: "nowrap" }}>
                                  {grRow?.typical_increment != null ? (grRow.typical_increment >= 0 ? "+" : "") + frmt(grRow.typical_increment) + '"' : "—"}
                                </td>
                                {visibleSizes.map(s => {
                                  const val = sizeValueFor(code, s);
                                  const isMissyBase = s === "M";
                                  const isPlusBase = isPlus(s) && s === plusAnchor;
                                  if (isMissyBase || isPlusBase) {
                                    const storeMap = isMissyBase ? baseOverrides : plusBaseOverrides;
                                    const setStore = isMissyBase ? setBaseOverrides : setPlusBaseOverrides;
                                    const rawBase = mv[code]?.size_medians?.[s];
                                    const ov = storeMap[code] ?? "";
                                    const invalid = ov !== "" && parseInch(ov) == null;
                                    const displayVal = ov !== "" ? ov : (rawBase != null ? frmt(rawBase) : "");
                                    return (
                                      <td key={s} style={{ padding: "6px 8px", textAlign: "center", background: "#ecfdf5" }}>
                                        <input type="text" value={displayVal}
                                          onChange={(e) => setStore(prev => ({ ...prev, [code]: e.target.value }))}
                                          onBlur={() => {
                                            const raw = storeMap[code];
                                            if (raw == null || raw === "") return;
                                            const parsed = parseInch(raw);
                                            if (parsed == null) return;
                                            const normalized = frmt(parsed);
                                            if (normalized !== "—" && normalized !== raw) {
                                              setStore(prev => ({ ...prev, [code]: normalized }));
                                            }
                                          }}
                                          onKeyDown={(e) => { if (e.key === "Enter") { e.preventDefault(); e.currentTarget.blur(); } }}
                                          placeholder={rawBase != null ? frmt(rawBase) : "—"}
                                          inputMode="text"
                                          aria-label={`${code} Base ${s}`}
                                          style={{
                                            width: isMobile ? "84px" : "96px", textAlign: "center", padding: "7px 9px",
                                            fontFamily: "'JetBrains Mono',monospace", fontSize: "14px", fontWeight: 700,
                                            color: invalid ? "#dc2626" : "#065f46",
                                            border: `1px solid ${invalid ? "#dc2626" : "#a7f3d0"}`, borderRadius: "5px",
                                            background: "#fff",
                                          }} />
                                      </td>
                                    );
                                  }
                                  return (
                                    <td key={s} style={{ padding: "9px 8px", textAlign: "center", fontFamily: "'JetBrains Mono',monospace", fontSize: "14px", color: "#1a1a1a", fontWeight: 500 }}>
                                      {val != null ? frmt(val) + '"' : "—"}
                                    </td>
                                  );
                                })}
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>
                  )}

                </div>
              );
            })()}
          </div>
        )}
      </div>

      <AdminModal
        open={adminOpen}
        onClose={() => setAdminOpen(false)}
        pomNamesOverride={pomNamesOverride}
        onUploadPomNames={applyPomNamesOverride}
        onClearPomNames={clearPomNamesOverride}
        pomRulesOverride={pomRulesOverride}
        onUploadPomRules={applyPomRulesOverride}
        onClearPomRules={clearPomRulesOverride}
        currentBucketKey={bucketKey}
        partPresenceOverride={partPresenceOverride}
        onUploadPartPresence={applyPartPresenceOverride}
        onClearPartPresence={clearPartPresenceOverride}
        onPushToGithub={pushOverridesToGithub}
      />
      <OnboardingModal open={onboardingOpen} onDismiss={dismissOnboarding} />

      {undoToast && (
        <div role="status" aria-live="polite" style={{
          position: "fixed", left: "50%", bottom: "24px",
          transform: "translateX(-50%)",
          background: "#1a1a1a", color: "#fff",
          padding: "10px 14px 10px 16px", borderRadius: "10px",
          fontSize: "13px", fontWeight: 500,
          display: "flex", alignItems: "center", gap: "14px",
          boxShadow: "0 8px 24px rgba(0,0,0,0.22)",
          zIndex: 200, animation: "slideUp 0.2s ease",
        }}>
          <span>{undoToast.message}</span>
          <button onClick={runUndo} style={{
            background: "none", border: "none", color: "#86efac",
            fontSize: "13px", fontWeight: 700, cursor: "pointer",
            fontFamily: "inherit", padding: "2px 4px",
          }}>復原</button>
          <button onClick={() => { if (undoTimerRef.current) clearTimeout(undoTimerRef.current); setUndoToast(null); }}
            aria-label="關閉復原提示"
            style={{
              background: "none", border: "none", color: "#999",
              fontSize: "18px", cursor: "pointer", padding: "0 2px", lineHeight: 1,
              fontFamily: "inherit",
            }}>×</button>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
