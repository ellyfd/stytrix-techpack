name: Rebuild recipes_master

# 觸發:任何 push 到 main 都會評估,但 job-level if 會過濾掉沒碰相關目錄的 commit
# 觸發目錄:data/ingest/uploads/ (PDF/PPTX 上傳) 或 data/ingest/m7_pullon/ (聚陽 push)
# (避免 paths filter 在某些 GitHub 通知情境顯示成 "No jobs were run: failed")
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force:
        description: "Force re-extract all (ignore already-processed designs)"
        type: boolean
        default: false

jobs:
  rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # 只在 manual dispatch,或 push 有碰到觸發目錄時才跑
    # 其他 push 會 skip(不是 fail),不會觸發 failure 通知
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(toJSON(github.event.commits.*.modified), 'data/ingest/uploads/') ||
      contains(toJSON(github.event.commits.*.added), 'data/ingest/uploads/') ||
      contains(toJSON(github.event.commits.*.modified), 'data/ingest/m7_pullon/') ||
      contains(toJSON(github.event.commits.*.added), 'data/ingest/m7_pullon/')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Fetch full history so we can push back
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-pipeline.txt

      - name: Install pipeline dependencies
        run: pip install -r requirements-pipeline.txt

      # ── Step 1: extract raw text + callout images ──────────────────────────
      # Reads data/ingest/uploads/, writes:
      #   data/ingest/metadata/designs.jsonl   (append)
      #   data/ingest/pptx/*.txt               (new files only)
      #   data/ingest/pdf/callout_images/*.png  (new files only)
      #   data/ingest/pdf/callout_manifest.jsonl (append)
      - name: Step 1 — extract raw text & callout images
        run: |
          python star_schema/scripts/extract_raw_text.py \
            --scan-dir data/ingest/uploads \
            --output-dir data/ingest \
            --summary-file /tmp/step1_summary.json \
            --allow-empty \
            ${{ github.event.inputs.force == 'true' && '--force' || '' }}
          echo "Step 1 summary:"
          cat /tmp/step1_summary.json

      # ── Step 2b: VLM callout extraction (runs BEFORE 2a so unified can merge fresh VLM facts)
      # Auto-analyzes data/ingest/pdf/callout_images/*.png with Claude Vision API.
      # Falls back to vlm_raw_extracts.json if it exists (PoC/manual mode).
      # --allow-empty: exits 0 if no images and no pre-built extracts (first run or PPTX-only upload).
      - name: Step 2b — VLM callout extraction
        id: vlm
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python star_schema/scripts/vlm_pipeline.py \
            --map-iso \
            --out data/ingest/vlm \
            --callout-dir data/ingest/pdf/callout_images \
            --ingest-dir data/ingest \
            --allow-empty
        continue-on-error: true

      # Surface VLM failure:continue-on-error 會讓整個 job 成功,若不 flag 就會被忽略
      - name: Step 2b failure notice
        if: steps.vlm.outcome == 'failure'
        run: |
          {
            echo "## ⚠️ Step 2b (VLM callout extraction) 失敗"
            echo ""
            echo "Pipeline 後續步驟已放行(\`continue-on-error: true\`),但 VLM 沒產出 facts。"
            echo "常見原因:"
            echo "- \`ANTHROPIC_API_KEY\` secret 未設定 / 額度不足 / 網路問題"
            echo "- callout PNG 解析失敗或 schema 不符"
            echo ""
            echo "Step 3 會忽略 VLM facts 繼續重建,但 recipes_master 不會有這批新設計的 callout 貢獻。"
            echo "請查看 Step 2b 的 log 取得實際錯誤訊息。"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "VLM_FAILED=true" >> "$GITHUB_ENV"

      # ── Step 2a: unified extraction (PPTX + metadata → facts) ─────────────
      # Runs AFTER Step 2b so it can merge fresh VLM facts from data/ingest/vlm/facts.jsonl.
      # Reads data/ingest/pptx/ + data/ingest/metadata/designs.jsonl
      # Writes data/ingest/unified/dim.jsonl + facts.jsonl (full rebuild from all sources)
      - name: Step 2a — unified extraction
        run: |
          python star_schema/scripts/extract_unified.py \
            --ingest-dir data/ingest \
            --out data/ingest/unified

      # ── Pre-Step 3 sanity: validate bucket_taxonomy + pom_rules schema ────
      # Cheap (<1s) early gate. Catches schema drift before Step 3 spends time
      # on full cascade build. --strict treats warnings as errors.
      - name: Pre-Step 3 — validate buckets
        run: python scripts/core/validate_buckets.py --strict

      # ── Step 3: rebuild recipes_master ────────────────────────────────────
      # Reads data/ingest/*/facts.jsonl + 4 source handbooks
      # Writes data/runtime/recipes_master.json + data/runtime/l1_standard_38.json
      #        + data/master.jsonl + data/master.meta.json
      # --strict: exits 1 on any ingest/taxonomy violation → blocks commit
      - name: Step 3 — rebuild recipes_master
        run: python star_schema/scripts/build_recipes_master.py --strict

      # ── Step 4: derive views (Phase 2 of PHASE2_DERIVE_VIEWS_SPEC.md) ──────
      # Step 4a: View A — strip _m7_* internal fields, rewrite recipes_master.json
      # Step 4b: View B — upgrade l2_l3_ie/<L1>.json schema + attach m7 actuals
      # Step 4c: View C — split m7_pullon designs.jsonl.gz into per-EIDH files
      - name: Step 4a — derive View A (recipes_master.json strip _m7_*)
        run: python star_schema/scripts/derive_view_recipes_master.py

      - name: Step 4b — derive View B (l2_l3_ie schema upgrade + actuals)
        run: python star_schema/scripts/derive_view_l2_l3_ie.py --all --in-place

      - name: Step 4c — derive View C (designs_index per-EIDH lazy-fetch files)
        run: python star_schema/scripts/derive_view_designs_index.py

      # ── Commit derived outputs ─────────────────────────────────────────────
      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Delete processed uploads (keep .gitkeep to preserve directory)
          find data/ingest/uploads -maxdepth 1 -type f ! -name '.gitkeep' \
            -exec git rm --force {} \; 2>/dev/null || true

          # Stage derived outputs (paths fixed 2026-05-08: 5/7 restructure 漏改)
          # data/master.jsonl + master.meta.json 是 intermediate(只給 derive script 用),
          # 不進 repo (.gitignore 已禁,CI job 內 build 完直接消費完)
          git add data/runtime/recipes_master.json
          git add data/runtime/l1_standard_38.json
          git add l2_l3_ie/                                  # Phase 2.5a: Bible schema升級
          git add data/runtime/designs_index/                # Phase 2.4: per-EIDH View C
          git add data/ingest/metadata/designs.jsonl || true
          git add data/ingest/pptx/ || true
          git add data/ingest/unified/ || true
          git add data/ingest/vlm/ || true

          # Only commit if something actually changed
          if git diff --cached --quiet; then
            echo "No changes to commit — all designs already up to date."
          else
            MSG="chore(data): auto-rebuild recipes_master [skip ci]"
            if [ "$VLM_FAILED" = "true" ]; then
              MSG="$MSG

⚠ VLM (Step 2b) failed — facts from callout images not contributed this run. See Actions log."
            fi
            git commit -m "$MSG"
            git push origin HEAD
          fi
