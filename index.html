/* ─── rebuildCardFromL2: given a card + new L2 index (+ optional L3 index),
   fetches l2_l3_ie for that L1 and rebuilds l3Variants / methodVariants /
   l3s on the card. Used by onSwitchL2 and onSwitchL3. ─── */
function rebuildCardFromL2(card, newL2Idx, newL3Idx, fabric, setCards) {
  const variant = card.l2Variants?.[newL2Idx];
  if (!variant) return;
  const isReal = (s) => s && !String(s).startsWith("**");
  const fabricKey = (fabric || "Knit").toLowerCase() === "woven" ? "woven" : "knit";
  const path = `./l2_l3_ie/${card.l1_code}.json`;
  fetch(path).then(r => r.ok ? r.json() : Promise.reject(r.status)).then(ie => {
    const l2Arr = ie[fabricKey] || [];
    const chosenL2 = l2Arr.find(x => x.l2 === variant.xlsx_name)
      || l2Arr.find(x => isReal(x.l2)) || l2Arr[0];

    // L3 variants for this L2
    const shapesAll = chosenL2?.shapes || [];
    const shapeFreqs = shapesAll.map(sh =>
      (sh.methods || []).reduce((n, m) => n + (m.steps || []).length, 0));
    const shapeFreqSum = shapeFreqs.reduce((s, n) => s + n, 0);
    const l3VariantsRaw = shapesAll.map((sh, i) => ({
      l3: sh.l3,
      _methods: sh.methods || [],
      freq: shapeFreqs[i],
      freq_pct: shapeFreqSum > 0 && shapeFreqs[i] > 0
        ? +(shapeFreqs[i] / shapeFreqSum * 100).toFixed(1) : null
    }));
    const defaultL3Idx = (() => {
      const idx = l3VariantsRaw.findIndex(s => isReal(s.l3));
      return idx >= 0 ? idx : 0;
    })();
    const l3Idx = (newL3Idx != null && l3VariantsRaw[newL3Idx]) ? newL3Idx : defaultL3Idx;
    const shape = l3VariantsRaw[l3Idx] || null;

    // L4 method variants
    const methodsAll = shape?._methods || [];
    const realMethods = methodsAll.filter(m => isReal(m.l4));
    const methods = realMethods.length ? realMethods : methodsAll;
    const methodFreqSum = methods.reduce((s, m) => s + (m.steps || []).length, 0);
    const tryFilter = (rows, mainOnly) => {
      const seen = new Set(); const list = [];
      for (const row of rows || []) {
        const [nm, gr, sc, ms] = row;
        if (mainOnly && ms && ms !== "主") continue;
        const k = `${nm}|${gr}`;
        if (seen.has(k)) continue;
        seen.add(k);
        list.push({ name: nm, ie: Number(sc) || 0, auto: false, pick: 0, opts: [{n:"無資料", p:100}] });
      }
      return list;
    };
    const methodVariants = methods.map(m => {
      const mainPath = tryFilter(m.steps, true);
      const steps = mainPath.length ? mainPath : tryFilter(m.steps, false);
      const totalSec = steps.reduce((s, x) => s + x.ie, 0);
      const raw = (m.steps || []).length;
      return {
        l4: m.l4, steps, totalSec: +totalSec.toFixed(0),
        freq: raw,
        freq_pct: methodFreqSum > 0 && raw > 0 ? +(raw / methodFreqSum * 100).toFixed(1) : null
      };
    });
    const cur = methodVariants[0] || { l4: null, steps: [], totalSec: 0 };
    const l2Base = chosenL2?.l2
      ? `${chosenL2.l2}${shape?.l3 ? " · " + shape.l3 : ""}`
      : null;
    const l4Short = cur.l4 ? (cur.l4.length > 40 ? cur.l4.slice(0, 40) + "…" : cur.l4) : null;

    // Strip runtime-only _methods before persisting to state
    const l3Variants = l3VariantsRaw.map(({_methods, ...rest}) => rest);

    setCards(prev => prev.map(pc => pc.id === card.id ? {
      ...pc,
      l2Idx: newL2Idx,
      l3Idx,
      l3Variants,
      methodIdx: 0,
      methodVariants,
      l3s: cur.steps,
      ie: cur.totalSec,
      l2Base,
      l2: l2Base ? `${l2Base}${l4Short ? " · " + l4Short : ""}` : pc.l2
    } : pc));
  }).catch(err => console.error('載入 l2_l3_ie 失敗:', err));
}

/* ─── Helpers ─── */
const frmt = (v) => {
  if (v === 0) return "—";
  const neg = v < 0;
  const abs = Math.abs(v);
  const whole = Math.floor(abs);
  const frac = abs - whole;
  let f = "";
  if (frac >= 0.875) return (neg ? "-" : "") + (whole + 1);
  else if (frac >= 0.625) f = "¾";
  else if (frac >= 0.375) f = "½";
  else if (frac >= 0.125) f = "¼";
  else if (frac > 0.05) f = "⅛";
  if (f) return (neg ? "-" : "") + (whole > 0 ? whole : "") + f;
  return (neg ? "-" : "") + String(whole);
};

/* 解析使用者輸入的英吋字串：支援 "16", "16 1/2", "1/8", "16½", "16¾" 等 */
const parseInch = (s) => {
  if (s == null) return null;
  if (typeof s === "number") return s;
  let t = String(s).trim().replace(/["'\s]+$/, "").trim();
  if (!t) return null;
  t = t.replace(/⅛/g, " 1/8").replace(/¼/g, " 1/4").replace(/½/g, " 1/2").replace(/¾/g, " 3/4").replace(/⅜/g, " 3/8").replace(/⅝/g, " 5/8").replace(/⅞/g, " 7/8");
  const neg = t.startsWith("-");
  if (neg) t = t.slice(1).trim();
  const parts = t.split(/\s+/).filter(Boolean);
  let total = 0;
  for (const p of parts) {
    if (p.includes("/")) {
      const [n, d] = p.split("/").map(x => Number(x));
      if (!d || Number.isNaN(n)) return null;
      total += n / d;
    } else {
      const v = Number(p);
      if (Number.isNaN(v)) return null;
      total += v;
    }
  }
  return neg ? -total : total;
};

/* ─── POM 排序：身體部位從上到下、從前到後 ───
   優先用 bucket.pom_sort_order（若資料有）；否則 fallback 用 code 前綴字母。
   前綴對應部位：
   A 帽 → B 領 → C 肩 → D 袖籠/肩帶 → E 袖 → F 胸 → G 育克
   → H 腰 → I 下擺/側縫 → J 身長 → K 前後浪 → L 臀
   → M 襠 → N 大腿/膝/小腿/腿口 → O 內長/裙長
   → Q 繩帶 → R 省/褶 → S 鈕扣 → T 下擺/貼邊 → Z 裝飾
   → P 口袋（放最後，通常量完其他再標口袋）
*/
const POM_PREFIX_ORDER = {
  A: 1, B: 2, C: 3, D: 4, E: 5, F: 6, G: 7,
  H: 8, I: 9, J: 10, K: 11, L: 12, M: 13, N: 14, O: 15,
  Q: 16, R: 17, S: 18, T: 19, Z: 20, P: 21,
  U: 22, V: 23, W: 24, X: 25, Y: 26,
};
const sortPomCodes = (codes, bucketSortOrder) => {
  if (bucketSortOrder && bucketSortOrder.length) {
    const idx = {};
    bucketSortOrder.forEach((c, i) => { idx[c] = i; });
    return [...codes].sort((a, b) => {
      const ia = idx[a] !== undefined ? idx[a] : 9999;
      const ib = idx[b] !== undefined ? idx[b] : 9999;
      if (ia !== ib) return ia - ib;
      return a.localeCompare(b);
    });
  }
  return [...codes].sort((a, b) => {
    const pa = POM_PREFIX_ORDER[a[0]] || 99;
    const pb = POM_PREFIX_ORDER[b[0]] || 99;
    if (pa !== pb) return pa - pb;
    const na = parseInt(a.slice(1), 10) || 0;
    const nb = parseInt(b.slice(1), 10) || 0;
    return na - nb;
  });
};

/* ─── Card ─── */
function Card({ card, isOpen, onToggle, onRemove, col, onSwitchMethod, onSwitchL2, onSwitchL3 }) {
  const [editId, setEditId] = useState(null);
  const [showTip, setShowTip] = useState(false);
  const [showMethods, setShowMethods] = useState(false);
  const [showL2Alts, setShowL2Alts] = useState(false);
  const [showL3Alts, setShowL3Alts] = useState(false);
  useEffect(() => { if (!isOpen) setEditId(null); }, [isOpen]);
  const autoN = card.l3s.filter(l => l.auto).length;
  const adjN = card.l3s.length - autoN;
  const src = SRC[card.source];

  return (
    <div style={{
      background: "#fff",
      border: `1.5px solid ${isOpen ? col + "50" : "#e8e5e1"}`,
      borderRadius: "12px", marginBottom: "8px", overflow: "hidden",
      boxShadow: isOpen ? `0 4px 16px ${col}12` : "0 1px 3px rgba(0,0,0,0.04)",
      transition: "all 0.2s"
    }}>
      <div onClick={onToggle} style={{
        padding: "12px 14px", cursor: "pointer",
        display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: "10px",
        background: isOpen ? col + "06" : "transparent", transition: "background 0.2s"
      }}>
        {/* LEFT: number + L1 › L2 */}
        <div style={{ display: "flex", alignItems: "flex-start", gap: "10px", flex: 1, minWidth: 0 }}>
          <div style={{
            width: "30px", height: "30px", borderRadius: "9px",
            background: isOpen ? col : "#fff", color: isOpen ? "#fff" : col,
            border: isOpen ? "none" : `2.5px solid ${col}`,
            display: "flex", alignItems: "center", justifyContent: "center",
            fontSize: "14px", fontWeight: 800, flexShrink: 0,
            marginTop: "1px", transition: "all 0.15s"
          }}>{card.id}</div>
          <div style={{ flex: 1, minWidth: 0 }}>
            {/* Line 1: L1 › L2 (the MAIN label) */}
            <div style={{ fontSize: "15px", color: "#1a1a1a", fontWeight: 700, lineHeight: 1.3, display: "flex", alignItems: "baseline", gap: "6px", flexWrap: "wrap" }}>
              <span>{card.l1}</span>
              <span style={{ color: "#ccc", fontWeight: 400, fontSize: "13px" }}>›</span>
              <span style={{ color: col }}>{card.l2}</span>
            </div>
            {/* Line 2: source badge only — per-level confidence moves into the
                L2/L3/L4 switcher panels and is driven by historical freq, not
                AI or placeholder values. */}
            <div style={{ display: "flex", alignItems: "center", gap: "5px", marginTop: "4px", flexWrap: "wrap" }}>
              <span style={{ fontSize: "10px", color: src.c, background: src.bg, padding: "2px 7px", borderRadius: "4px", fontWeight: 600 }}>{src.icon} {src.label}</span>
              {card.matchCode && (
                <span
                  onMouseEnter={e => { e.stopPropagation(); setShowTip(true); }}
                  onMouseLeave={() => setShowTip(false)}
                  style={{
                    fontSize: "10px", color: "#aaa", fontFamily: "'JetBrains Mono',monospace",
                    cursor: "help", position: "relative"
                  }}>
                  ref: {card.matchCode}
                  {showTip && (
                    <span style={{
                      position: "absolute", bottom: "100%", left: 0, marginBottom: "6px",
                      background: "#1a1a1a", color: "#fff", padding: "6px 10px",
                      borderRadius: "6px", fontSize: "10px", whiteSpace: "nowrap",
                      fontFamily: "'Outfit',sans-serif", zIndex: 10,
                      boxShadow: "0 2px 8px rgba(0,0,0,0.15)"
                    }}>
                      五階層參考圖代號（工程用）
                    </span>
                  )}
                </span>
              )}
            </div>
            {/* Line 3: stats */}
            <div style={{ fontSize: "11px", color: "#999", marginTop: "3px" }}>
              {card.l3s.length} 工段
              {autoN > 0 && <span style={{ color: "#065f46", marginLeft: "4px" }}>· {autoN} auto</span>}
              {adjN > 0 && <span style={{ marginLeft: "4px" }}>· {adjN} 可調</span>}
            </div>
          </div>
        </div>
        {/* RIGHT: IE + controls */}
        <div style={{ display: "flex", alignItems: "flex-start", gap: "8px", flexShrink: 0, paddingTop: "2px" }}>
          <div style={{ textAlign: "right" }}>
            <div style={{ fontSize: "18px", color: "#1a1a1a", fontWeight: 800, fontFamily: "'JetBrains Mono',monospace", fontVariantNumeric: "tabular-nums", lineHeight: 1 }}>{Math.round(card.ie)}</div>
            <div style={{ fontSize: "9px", color: "#bbb", letterSpacing: "0.5px", marginTop: "2px" }}>秒</div>
          </div>
          <button onClick={(e) => { e.stopPropagation(); onRemove(card.id); }}
            style={{ background: "none", border: "none", cursor: "pointer", fontSize: "17px",
              color: "#dc2626", opacity: 0.7, padding: "4px", transition: "opacity 0.15s", marginTop: "-2px" }}
            onMouseEnter={e => e.currentTarget.style.opacity = "1"}
            onMouseLeave={e => e.currentTarget.style.opacity = "0.7"}>🗑</button>
          <div style={{ fontSize: "14px", color: "#ccc", transform: isOpen ? "rotate(180deg)" : "rotate(0deg)",
            transition: "transform 0.25s", display: "inline-block", marginTop: "2px" }}>▾</div>
        </div>
      </div>
      <div style={{ maxHeight: isOpen ? "1800px" : "0", overflow: "hidden", transition: "max-height 0.35s ease" }}>
        <div style={{ padding: "0 14px 14px" }}>
          {card.l2Variants && card.l2Variants.length > 1 && (
            <div style={{ marginTop: "10px", border: "1px solid #eee", borderRadius: "8px", background: "#f8fafc", padding: "8px 10px" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: "8px" }}>
                <div style={{ fontSize: "11px", color: "#666", fontWeight: 600 }}>
                  L2 零件 · {card.l2Variants[card.l2Idx ?? 0]?.display_name || card.l2Variants[card.l2Idx ?? 0]?.xlsx_name || "—"}
                  {card.l2Variants[card.l2Idx ?? 0]?.freq_pct != null && (
                    <span style={{ marginLeft: "6px", fontSize: "10px", color: "#666", background: "#f1f5f9", padding: "1px 6px", borderRadius: "4px", fontWeight: 600 }}>歷史 {card.l2Variants[card.l2Idx ?? 0].freq_pct}%</span>
                  )}
                </div>
                <button onClick={() => setShowL2Alts(v => !v)}
                  style={{ fontSize: "11px", color: col, background: "#fff", border: `1px solid ${col}40`, padding: "3px 10px", borderRadius: "5px", cursor: "pointer", fontWeight: 600, fontFamily: "inherit" }}>
                  {showL2Alts ? "收合" : `切換 (${card.l2Variants.length})`} ▾
                </button>
              </div>
              {showL2Alts && (
                <div style={{ marginTop: "8px", maxHeight: "280px", overflowY: "auto", display: "flex", flexDirection: "column", gap: "4px" }}>
                  {card.l2Variants.map((v, idx) => {
                    const active = idx === (card.l2Idx ?? 0);
                    return (
                      <div key={v.code} onClick={() => onSwitchL2 && onSwitchL2(card.id, idx)}
                        style={{
                          padding: "6px 10px", borderRadius: "6px", cursor: "pointer",
                          background: active ? col + "10" : "#fff",
                          border: active ? `1.5px solid ${col}` : "1px solid #eee"
                        }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: "8px" }}>
                          <span style={{ fontSize: "12px", color: active ? col : "#1a1a1a", fontWeight: active ? 700 : 600 }}>
                            {v.code} · {v.display_name}
                          </span>
                          {v.freq_pct != null && (
                            <span style={{ fontSize: "10px", color: "#666", fontFamily: "'JetBrains Mono',monospace", flexShrink: 0 }}>
                              {v.freq_pct}%
                            </span>
                          )}
                        </div>
                        {v.feature && <div style={{ fontSize: "11px", color: "#777", marginTop: "2px", lineHeight: 1.35 }}>{v.feature}</div>}
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          )}
          {card.l3Variants && card.l3Variants.length > 1 && (
            <div style={{ marginTop: "10px", border: "1px solid #eee", borderRadius: "8px", background: "#fafaf9", padding: "8px 10px" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: "8px" }}>
                <div style={{ fontSize: "11px", color: "#666", fontWeight: 600 }}>
                  L3 形狀 · {card.l3Variants[card.l3Idx ?? 0]?.l3 || "—"}
                  {card.l3Variants[card.l3Idx ?? 0]?.freq_pct != null && (
                    <span style={{ marginLeft: "6px", fontSize: "10px", color: "#666", background: "#f1f5f9", padding: "1px 6px", borderRadius: "4px", fontWeight: 600 }}>歷史 {card.l3Variants[card.l3Idx ?? 0].freq_pct}%</span>
                  )}
                </div>
                <button onClick={() => setShowL3Alts(v => !v)}
                  style={{ fontSize: "11px", color: col, background: "#fff", border: `1px solid ${col}40`, padding: "3px 10px", borderRadius: "5px", cursor: "pointer", fontWeight: 600, fontFamily: "inherit" }}>
                  {showL3Alts ? "收合" : `切換 (${card.l3Variants.length})`} ▾
                </button>
              </div>
              {showL3Alts && (
                <div style={{ marginTop: "8px", maxHeight: "280px", overflowY: "auto", display: "flex", flexDirection: "column", gap: "4px" }}>
                  {card.l3Variants.map((v, idx) => {
                    const active = idx === (card.l3Idx ?? 0);
                    return (
                      <div key={idx} onClick={() => onSwitchL3 && onSwitchL3(card.id, idx)}
                        style={{
                          padding: "6px 10px", borderRadius: "6px", cursor: "pointer",
                          background: active ? col + "10" : "#fff",
                          border: active ? `1.5px solid ${col}` : "1px solid #eee",
                          display: "flex", justifyContent: "space-between", alignItems: "center", gap: "8px"
                        }}>
                        <span style={{ fontSize: "12px", color: active ? col : "#1a1a1a", fontWeight: active ? 700 : 600 }}>
                          {v.l3 || "—"}
                        </span>
                        {v.freq_pct != null && (
                          <span style={{ fontSize: "10px", color: "#666", fontFamily: "'JetBrains Mono',monospace", flexShrink: 0 }}>
                            {v.freq_pct}%
                          </span>
                        )}
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          )}
          {card.methodVariants && card.methodVariants.length > 1 && (
            <div style={{ marginTop: "10px", border: "1px solid #eee", borderRadius: "8px", background: "#fafafa", padding: "8px 10px" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: "8px" }}>
                <div style={{ fontSize: "11px", color: "#666", fontWeight: 600 }}>
                  L4 工法 · 目前第 {(card.methodIdx ?? 0) + 1} / {card.methodVariants.length}
                  {card.methodVariants[card.methodIdx ?? 0]?.freq_pct != null && (
                    <span style={{ marginLeft: "6px", fontSize: "10px", color: "#666", background: "#f1f5f9", padding: "1px 6px", borderRadius: "4px", fontWeight: 600 }}>歷史 {card.methodVariants[card.methodIdx ?? 0].freq_pct}%</span>
                  )}
                </div>
                <button onClick={() => setShowMethods(v => !v)}
                  style={{ fontSize: "11px", color: col, background: "#fff", border: `1px solid ${col}40`, padding: "3px 10px", borderRadius: "5px", cursor: "pointer", fontWeight: 600, fontFamily: "inherit" }}>
                  {showMethods ? "收合" : "展開切換"} ▾
                </button>
              </div>
              {showMethods && (
                <div style={{ marginTop: "8px", display: "flex", flexDirection: "column", gap: "4px" }}>
                  {card.methodVariants.map((v, idx) => {
                    const active = idx === (card.methodIdx ?? 0);
                    return (
                      <div key={idx} onClick={() => onSwitchMethod && onSwitchMethod(card.id, idx)}
                        style={{
                          padding: "6px 10px", borderRadius: "6px", cursor: "pointer",
                          background: active ? col + "10" : "#fff",
                          border: active ? `1.5px solid ${col}` : "1px solid #eee",
                          display: "flex", justifyContent: "space-between", alignItems: "center", gap: "8px"
                        }}>
                        <span style={{ fontSize: "11px", color: active ? col : "#444", fontWeight: active ? 700 : 500, flex: 1, lineHeight: 1.4 }}>
                          {v.l4 || "—"}
                        </span>
                        <span style={{ display: "flex", alignItems: "center", gap: "6px", flexShrink: 0 }}>
                          {v.freq_pct != null && (
                            <span style={{ fontSize: "10px", color: "#666", fontFamily: "'JetBrains Mono',monospace" }}>{v.freq_pct}%</span>
                          )}
                          <span style={{ fontSize: "11px", color: "#888", fontFamily: "'JetBrains Mono',monospace" }}>
                            {v.totalSec}秒
                          </span>
                        </span>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          )}
          <div style={{ fontSize: "11px", color: "#aaa", padding: "8px 0 4px 10px" }}>
            工段 · 秒數
          </div>
          {card.l3s.map((l3, i) => <L3Line key={`${card.methodIdx}-${i}`} l3={l3} editId={editId} setEditId={setEditId} idx={i} col={col} />)}
          <div style={{ display: "flex", justifyContent: "flex-end", padding: "8px 0 0", gap: "8px" }}>
            <span style={{ fontSize: "13px", color: "#aaa" }}>小計</span>
            <span style={{ fontSize: "14px", color: "#1a1a1a", fontWeight: 800, fontFamily: "'JetBrains Mono',monospace" }}>{Math.round(card.ie)}<span style={{ fontSize: "11px", color: "#aaa", marginLeft: "3px", fontWeight: 500 }}>秒</span></span>
          </div>
        </div>
      </div>
    </div>
  );
}
/* ─── POM Row for MISSY ─── */
function MissyPomRow({ pom, tier, isOpen, onToggle, onToggleInclude, included, showPetite, showTall }) {
  const tc = TIER[tier];
  const sizes = MISSY_META.sizes;
  const baseIdx = sizes.indexOf(MISSY_META.base);
  const hasVariant = pom.petite || pom.tall;
  const showingPetite = showPetite && pom.petite;
  const showingTall = showTall && pom.tall;

  return (
    <div style={{
      background: "#fff", border: `1.5px solid ${isOpen ? tc.c + "40" : "#e8e5e1"}`,
      borderRadius: "10px", marginBottom: "6px", overflow: "hidden",
      opacity: included ? 1 : 0.4, transition: "all 0.2s"
    }}>
      {/* Header */}
      <div onClick={onToggle} style={{
        padding: "10px 14px", cursor: "pointer",
        display: "flex", justifyContent: "space-between", alignItems: "center",
        background: isOpen ? tc.c + "08" : "transparent", transition: "background 0.2s"
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: "8px", flex: 1, minWidth: 0 }}>
          <input type="checkbox" checked={included} onChange={e => { e.stopPropagation(); onToggleInclude(); }}
            style={{ width: "16px", height: "16px", accentColor: tc.c, cursor: "pointer", flexShrink: 0 }} />
          <span style={{ fontSize: "13px", fontWeight: 700, fontFamily: "'JetBrains Mono',monospace", color: tc.c, width: "34px", flexShrink: 0 }}>{pom.code}</span>
          <span style={{ fontSize: "14px", fontWeight: 600, color: "#1a1a1a" }}>{pom.name}</span>
          {hasVariant && <span style={{ fontSize: "9px", color: "#7e22ce", background: "#f5f3ff", padding: "2px 6px", borderRadius: "4px", fontWeight: 600 }}>P/T 差異</span>}
          {pom.subRows && <span style={{ fontSize: "9px", color: "#666", background: "#f5f4f0", padding: "2px 6px", borderRadius: "4px" }}>{pom.subRows.length} sub</span>}
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: "8px", flexShrink: 0 }}>
          <span style={{ fontSize: "10px", color: tc.c, background: tc.bg, padding: "2px 7px", borderRadius: "5px", fontWeight: 600 }}>{tc.icon} {tc.label}</span>
          <span style={{ fontSize: "15px", fontWeight: 700, fontFamily: "'JetBrains Mono',monospace", color: "#1a1a1a" }}>{frmt(pom.mVal)}"</span>
          <div style={{ fontSize: "13px", color: "#ccc", transform: isOpen ? "rotate(180deg)" : "rotate(0deg)", transition: "transform 0.25s" }}>▾</div>
        </div>
      </div>

      {/* Expanded */}
      <div style={{ maxHeight: isOpen ? "900px" : "0", overflow: "hidden", transition: "max-height 0.35s ease" }}>
        <div style={{ padding: "0 14px 14px" }}>
          {/* Tol */}
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 0", borderBottom: "1px solid #f0eeeb" }}>
            <span style={{ fontSize: "11px", color: "#999" }}>Tolerance</span>
            <span style={{ fontSize: "12px", fontFamily: "'JetBrains Mono',monospace", color: "#666" }}>−{frmt(pom.tol[0])} / +{frmt(pom.tol[1])}</span>
          </div>

          {/* MISSY size grid */}
          <div style={{ marginTop: "10px" }}>
            <div style={{ fontSize: "10px", fontWeight: 600, color: "#1a1a1a", marginBottom: "4px", letterSpacing: "0.3px" }}>MISSY</div>
            <div style={{ display: "grid", gridTemplateColumns: `72px repeat(${sizes.length}, 1fr)`, gap: "1px", fontSize: "11px" }}>
              <div style={{ padding: "5px 4px", fontWeight: 600, color: "#999", fontSize: "10px" }}>SIZE</div>
              {sizes.map((s, i) => (
                <div key={s} style={{
                  padding: "5px 2px", textAlign: "center", fontWeight: 700,
                  color: i === baseIdx ? "#065f46" : "#1a1a1a",
                  background: i === baseIdx ? "#ecfdf5" : "#faf9f7",
                  borderRadius: "4px", fontSize: "11px", fontFamily: "'JetBrains Mono',monospace"
                }}>{s}{i === baseIdx && <span style={{ display: "block", fontSize: "7px", color: "#065f46", fontWeight: 500 }}>BASE</span>}</div>
              ))}
              <div style={{ padding: "6px 4px", fontWeight: 600, color: "#1a1a1a", fontSize: "10px" }}>Value</div>
              {sizes.map((s, i) => {
                const val = pom.mVal + (pom.grading[s] || 0);
                return (
                  <div key={s} style={{ padding: "3px 1px", textAlign: "center" }}>
                    <div style={{
                      fontSize: "13px", fontWeight: 700, fontFamily: "'JetBrains Mono',monospace",
                      color: i === baseIdx ? "#065f46" : "#1a1a1a",
                      padding: "3px 1px", borderRadius: "4px",
                      border: i === baseIdx ? "2px solid #065f46" : "1.5px solid #e8e5e1",
                      background: i === baseIdx ? "#ecfdf5" : "#fff",
                    }}>{frmt(val)}"</div>
                  </div>
                );
              })}
              <div style={{ padding: "5px 4px", fontSize: "9px", color: "#aaa" }}>Grade</div>
              {sizes.map((s, i) => {
                const g = pom.grading[s] || 0;
                const prev = i > 0 ? (pom.grading[sizes[i - 1]] || 0) : null;
                const delta = prev !== null ? g - prev : null;
                return (
                  <div key={s} style={{ padding: "5px 2px", textAlign: "center", fontSize: "10px", fontFamily: "'JetBrains Mono',monospace", color: delta === 0 || delta === null ? "#ccc" : "#b45309" }}>
                    {delta !== null ? (delta >= 0 ? `+${frmt(delta)}` : frmt(delta)) : "—"}
                  </div>
                );
              })}
            </div>
          </div>

          {/* PETITE variant row */}
          {showingPetite && (
            <div style={{ marginTop: "8px", padding: "8px 10px", background: "#faf5ff", borderRadius: "8px", border: "1.5px solid #e9d5ff" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div style={{ display: "flex", alignItems: "center", gap: "6px" }}>
                  <span style={{ fontSize: "10px", fontWeight: 700, color: "#7e22ce", background: "#f3e8ff", padding: "2px 8px", borderRadius: "4px" }}>PETITE</span>
                  <span style={{ fontSize: "12px", color: "#7e22ce", fontWeight: 600 }}>{pom.petite.note}</span>
                </div>
                <div style={{ display: "flex", alignItems: "baseline", gap: "4px" }}>
                  <span style={{ fontSize: "10px", color: "#999" }}>M =</span>
                  <span style={{ fontSize: "15px", fontWeight: 800, fontFamily: "'JetBrains Mono',monospace", color: "#7e22ce" }}>{frmt(pom.petite.mVal)}"</span>
                </div>
              </div>
              {/* Petite full row */}
              <div style={{ display: "grid", gridTemplateColumns: `72px repeat(${sizes.length}, 1fr)`, gap: "1px", marginTop: "6px" }}>
                <div style={{ fontSize: "9px", color: "#999", padding: "3px 4px" }}>Value</div>
                {sizes.map((s, i) => {
                  const diff = pom.petite.mVal - pom.mVal;
                  const val = pom.petite.mVal + (pom.grading[s] || 0);
                  return (
                    <div key={s} style={{ textAlign: "center", fontSize: "12px", fontFamily: "'JetBrains Mono',monospace", color: "#7e22ce", fontWeight: 600, padding: "3px 0" }}>{frmt(val)}"</div>
                  );
                })}
              </div>
            </div>
          )}

          {/* TALL variant row */}
          {showingTall && (
            <div style={{ marginTop: "6px", padding: "8px 10px", background: "#eff6ff", borderRadius: "8px", border: "1.5px solid #bfdbfe" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div style={{ display: "flex", alignItems: "center", gap: "6px" }}>
                  <span style={{ fontSize: "10px", fontWeight: 700, color: "#1d4ed8", background: "#dbeafe", padding: "2px 8px", borderRadius: "4px" }}>TALL</span>
                  <span style={{ fontSize: "12px", color: "#1d4ed8", fontWeight: 600 }}>{pom.tall.note}</span>
                </div>
                <div style={{ display: "flex", alignItems: "baseline", gap: "4px" }}>
                  <span style={{ fontSize: "10px", color: "#999" }}>M =</span>
                  <span style={{ fontSize: "15px", fontWeight: 800, fontFamily: "'JetBrains Mono',monospace", color: "#1d4ed8" }}>{frmt(pom.tall.mVal)}"</span>
                </div>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: `72px repeat(${sizes.length}, 1fr)`, gap: "1px", marginTop: "6px" }}>
                <div style={{ fontSize: "9px", color: "#999", padding: "3px 4px" }}>Value</div>
                {sizes.map((s) => {
                  const val = pom.tall.mVal + (pom.grading[s] || 0);
                  return (
                    <div key={s} style={{ textAlign: "center", fontSize: "12px", fontFamily: "'JetBrains Mono',monospace", color: "#1d4ed8", fontWeight: 600, padding: "3px 0" }}>{frmt(val)}"</div>
                  );
                })}
              </div>
            </div>
          )}

          {/* Sub-rows */}
          {pom.subRows && (
            <div style={{ marginTop: "8px", padding: "8px 10px", background: "#faf9f7", borderRadius: "8px", border: "1px solid #f0eeeb" }}>
              <div style={{ fontSize: "9px", color: "#999", fontWeight: 600, marginBottom: "4px", letterSpacing: "0.5px" }}>SUB-ROWS</div>
              {pom.subRows.map(sr => (

/* ─── Admin override helpers ─── */
// Accepts canonical {code: {en, zh}} 或 candidate wrapper {mapping: {code: {en, zh_pptx, zh_old, matched, ...}}}
function normalizePomNames(input) {
  if (!input || typeof input !== 'object') return { error: 'JSON 必須是物件' };
  let raw;
  if (input.mapping && typeof input.mapping === 'object') {
    raw = {};
    for (const [code, val] of Object.entries(input.mapping)) {
      if (!val || typeof val !== 'object') continue;
      const zh = (val.matched && val.zh_pptx) ? val.zh_pptx : (val.zh_old || val.zh || '');
      const en = val.en || '';
      raw[code] = { en, zh };
    }
  } else {
    raw = input;
  }
  const keys = Object.keys(raw);
  if (keys.length < 50) return { error: `項目太少 (${keys.length})，預期 ≥50 個 POM 代碼` };
  let bad = 0; const sample = [];
  for (const k of keys) {
    if (!/^[A-Z]\d{1,3}$/.test(k)) { bad++; if (sample.length < 3) sample.push(k); continue; }
    const v = raw[k];
    if (!v || typeof v !== 'object' || typeof v.en !== 'string' || typeof v.zh !== 'string') {
      bad++; if (sample.length < 3) sample.push(k);
    }
  }
  if (bad > keys.length * 0.1) {
    return { error: `太多無效項目 (${bad}/${keys.length})${sample.length ? '，例：' + sample.join(', ') : ''}` };
  }
  return { data: raw, count: keys.length, invalidCount: bad };
}

function fmtTime(iso) {
  if (!iso) return '';
  try {
    const d = new Date(iso);
    return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  } catch { return iso; }
}

      Object.keys(locks).forEach(k => { if (locks[k] && values[k]) restored[k] = values[k]; });
      return { locks, values: restored };
    } catch { return { locks: {}, values: {} }; }
  };
  const _saved = loadSaved();

  const [locks, setLocks] = useState(_saved.locks);
  const toggleLock = (key) => setLocks(prev => ({ ...prev, [key]: !prev[key] }));

    localStorage.setItem("stytrix_locks", JSON.stringify(locks));

  }, [locks, brand, fabric, dept, gender, gt, it]);

  /* ── 切換 tab ── */

  /* ── Sketch 上傳 ── */

      const stored = localStorage.getItem('stytrix.override.pomNames');

      setPomNames(result.data);

      setPomNamesOverride({ filename: file.name, uploadedAt: stored.uploadedAt, count: result.count });
      resolve({ count: result.count, invalidCount: result.invalidCount });

  /* Badge = 選這個選項後，下一層 filter 會有幾個選項

  /* Search: 打 hoodie 等關鍵字搜尋所有 filter 選項，點一下自動填 */
  const searchMatches = useMemo(() => {

  const applySearchMatch = (m) => {

  const ptCount = useMemo(() => {

  const C_STAGES = [
    "① 偵測 L1 部位（bbox）...",
    "② 比對 5,203 張零件參考圖 → L2 零件...",
    "③ 歷史配方帶 L3 候選...",
    "④ 零件圖匹配確認 L3...",
    "⑤ 查 204K DB → L4 眾數推薦...",
    "✓ 完成"
  ];
  const M_STAGES = [
    "① 載入 GT×Gender POM 規則表...",
    "② 查 943 unique DNs → M 碼中位數...",
    "③ 比對 984 Grading POM families...",
    "④ 帶入 Body Type 差異（PETITE / TALL / PLUS）...",
    "⑤ Tolerance 眾數推薦...",
    "✓ 尺寸建議表生成完成"
  ];

  const runConstruction = async () => {
    setCStep(1); setCAnalyzing(true); setCStage(0);
    setRemoved(new Set()); setOpenId(null); setAddonOn(true);
    setCards([]); setAnalyzeErr(null);
    const si = setInterval(() => setCStage(s => s < 5 ? s + 1 : s), 280);
    try {
      const resp = await fetch('/api/analyze', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({
          image: sketchSrc, brand, fabric, gender,
          garment_type: gt, item_type: it
        })
      });
      const data = await resp.json();
      if (!resp.ok) throw new Error(data.error || `HTTP ${resp.status}`);
      // Deduplicate AI detections by L1 code (front + back views collapse into one).
      const raw = Array.isArray(data.detected) ? data.detected : [];
      const byCode = new Map();
      for (const d of raw) {
        const prev = byCode.get(d.code);
        if (!prev || (Number(d.confidence) || 0) > (Number(prev.confidence) || 0)) {
          byCode.set(d.code, d);
        }
      }

      // Layer in l1_part_presence_v1: for this GT×IT, look up every part with its
      // historical presence %. Essential (≥80%) parts are added as ghost cards even
      // if the AI didn't draw a bbox, so the user sees what the data says should be
      // there and can confirm/remove. Tier info is merged into every card for UI.
      const bucketKey = gt && it ? `${gt}|${it}` : null;
      const presenceBucket = (partPresence && bucketKey && partPresence.by_gt_it?.[bucketKey])
        || (partPresence && gt && partPresence.by_gt?.[gt])
        || null;
      const presenceByCode = {};
      if (presenceBucket) {
        for (const p of presenceBucket.parts || []) presenceByCode[p.l1_code] = p;
      }
      // Add essential parts the AI missed so they still render (tier_en === 'essential').
      for (const code of Object.keys(presenceByCode)) {
        if (byCode.has(code)) continue;
        if (presenceByCode[code].tier_en !== "essential") continue;
        byCode.set(code, { code, confidence: null, x: 50, y: 50, side: "front", _fromPresence: true });
      }
      const detected = Array.from(byCode.values());

      // Build ISO lookup: prefer GT|IT bucket, fallback to GT bucket, index by Chinese L1 name.
      const isoBucket = (isoRec && bucketKey && isoRec.by_gt_it[bucketKey])
        || (isoRec && gt && isoRec.by_gt[gt])
        || null;
      const bucket = isoBucket;
      const isoByName = {};
      if (bucket) bucket.parts.forEach(p => { isoByName[p.l1] = p; });
      // Normalize xlsx Chinese names to ISO-JSON Chinese names (different character choices).
      const ISO_NAME_ALIAS = {
        "帽子":"帽", "下襬":"下擺", "商標":"標",
        "脅邊":"脇縫", "行縫(固定棉)":"行縫固定棉",
        "袖孔":"袖襱", "袖圍":"袖襱"
      };
      const findIso = (name) => isoByName[name]
        || isoByName[ISO_NAME_ALIAS[name]]
        || isoByName[name.replace(/[()（）]/g, "")] || null;

      // Lazy-load l2_l3_ie/<code>.json for each detected part in parallel.
      const fabricKey = (fabric || "Knit").toLowerCase() === "woven" ? "woven" : "knit";
      const ieByCode = {};
      await Promise.all(detected.map(async d => {
        try {
          const r = await fetch(`/l2_l3_ie/${d.code}.json`);
          if (r.ok) ieByCode[d.code] = await r.json();
        } catch {}
      }));

      const built = detected.map((d, i) => {
        const l1 = L1_CODE_TO_NAME[d.code] || d.code;
        const rec = findIso(l1);
        const opts = rec && rec.options.length
          ? rec.options.map(o => ({ n: `${o.iso} ${o.zh}`, p: Math.round(o.percentage) }))
          : [{ n: "無資料", p: 100 }];

        // L1 → L2 → L3 → L4 (pre-selected). "** … _其它" = xlsx misc/catchall
        // buckets — skip those in favour of real named L2/shape/method when
        // possible so defaults land on actual construction data, not on rows
        // that are just there to catch stragglers.
        const isReal = (s) => s && !String(s).startsWith("**");
        const firstReal = (arr, key) => arr.find(x => isReal(x?.[key])) || arr[0];
        const ie = ieByCode[d.code];
        const l2Arr = ie?.[fabricKey] || [];

        // Build L2 variants list from the visual guide registry, merging AI
        // confidence (primary rank) with xlsx frequency (secondary rank).
        // Pre-select the AI's pick when it returned one; otherwise first
        // non-'**' L2 in the xlsx data (legacy behaviour).
        const guideSection = visualGuide?.l1?.[d.code];
        const guideL2Map = guideSection?.l2 || {};
        const aiMainConfByCode = {};
        if (d.l2_code) aiMainConfByCode[d.l2_code] = Number(d.l2_confidence) || 0;
        for (const alt of d.l2_alternatives || []) {
          if (alt.l2_code) aiMainConfByCode[alt.l2_code] = Math.max(aiMainConfByCode[alt.l2_code] || 0, Number(alt.confidence) || 0);
        }
        const rawL2Variants = Object.entries(guideL2Map).map(([code, info]) => ({
          code,
          xlsx_name: info.name,
          display_name: info.display_name || info.name,
          feature: info.feature || "",
          tier: info.tier || "unknown",
          freq: info.freq || 0,
          ai_confidence: aiMainConfByCode[code] ?? null,
        }));
        const l2FreqSum = rawL2Variants.reduce((s, v) => s + (v.freq || 0), 0) || 0;
        const l2Variants = rawL2Variants.map(v => ({
          ...v,
          freq_pct: l2FreqSum > 0 && v.freq > 0 ? +(v.freq / l2FreqSum * 100).toFixed(1) : null,
        })).sort((a, b) => {
          const ac = a.ai_confidence ?? -1, bc = b.ai_confidence ?? -1;
          if (ac !== bc) return bc - ac;
          return (b.freq || 0) - (a.freq || 0);
        });

        // Pick the variant whose xlsx_name exists in l2_l3_ie for this fabric.
        const l2NameSet = new Set(l2Arr.map(x => x.l2));
        const pickedL2Variant =
          l2Variants.find(v => v.xlsx_name && l2NameSet.has(v.xlsx_name))
          || null;
        const firstL2 = pickedL2Variant
          ? l2Arr.find(x => x.l2 === pickedL2Variant.xlsx_name)
          : firstReal(l2Arr, "l2");
        const l2Idx = pickedL2Variant
          ? Math.max(0, l2Variants.findIndex(v => v === pickedL2Variant))
          : 0;

        // L3 variants: every shape under the chosen L2. Non-'**' first; same
        // pattern as L4 switcher so user can drill down shape by shape.
        const shapesAll = firstL2?.shapes || [];
        const shapeFreqs = shapesAll.map(sh =>
          (sh.methods || []).reduce((n, m) => n + (m.steps || []).length, 0));
        const shapeFreqSum = shapeFreqs.reduce((s, n) => s + n, 0);
        const l3Variants = shapesAll.map((sh, i) => ({
          l3: sh.l3,
          _methods: sh.methods || [],
          freq: shapeFreqs[i],
          freq_pct: shapeFreqSum > 0 && shapeFreqs[i] > 0
            ? +(shapeFreqs[i] / shapeFreqSum * 100).toFixed(1) : null
        }));
        const realShapeIdx = l3Variants.findIndex(s => isReal(s.l3));
        const l3Idx = realShapeIdx >= 0 ? realShapeIdx : 0;
        const firstShape = l3Variants[l3Idx] || null;
        const methodsAll = firstShape?._methods || [];
        // Methods are already pre-sorted so that ** ones sit at the end;
        // pick the first non-** if any, else fall back to whatever exists.
        const realMethods = methodsAll.filter(m => isReal(m.l4));
        const methods = realMethods.length ? realMethods : methodsAll;
        // Pre-compute every L4 variant's step list. Prefer 主 (main path) rows,
        // but if a given method only has 副 rows we still surface them instead
        // of pretending there's no 五階 data — the xlsx always has steps for
        // every L1/L2/L3/L4 combo, it's just that '主' tagging isn't always
        // present in the '_其它' misc buckets.
        const buildSteps = (rawSteps) => {
          const rows = rawSteps || [];
          const tryFilter = (mainOnly) => {
            const seen = new Set();
            const list = [];
            for (const row of rows) {
              const [name, grade, seconds, mainSub] = row;
              if (mainOnly && mainSub && mainSub !== "主") continue;
              const key = `${name}|${grade}`;
              if (seen.has(key)) continue;
              seen.add(key);
              const sec = Number(seconds) || 0;
              list.push({ name, ie: sec, auto: rec?.action === "auto_recommend", pick: 0, opts });
            }
            return list;
          };
          const main = tryFilter(true);
          return main.length ? main : tryFilter(false);
        };
        const methodFreqSum = methods.reduce((s, m) => s + (m.steps || []).length, 0);
        const methodVariants = methods.map(m => {
          const steps = buildSteps(m.steps);
          const totalSec = steps.reduce((s, x) => s + x.ie, 0);
          const raw = (m.steps || []).length;
          return {
            l4: m.l4, steps, totalSec: +totalSec.toFixed(0),
            freq: raw,
            freq_pct: methodFreqSum > 0 && raw > 0 ? +(raw / methodFreqSum * 100).toFixed(1) : null
          };
        });
        const methodIdx = 0;
        const current = methodVariants[methodIdx] || { l4: null, steps: [], totalSec: 0 };
        const stepList = current.steps;
        const totalSeconds = current.totalSec;
        const l2Base = firstL2?.l2
          ? `${firstL2.l2}${firstShape?.l3 ? " · " + firstShape.l3 : ""}`
          : null;
        // Strip _methods (runtime-only) before persisting to state
        const l3VariantsOut = l3Variants.map(({_methods, ...rest}) => rest);
        const l4Short = current.l4
          ? (current.l4.length > 40 ? current.l4.slice(0, 40) + "…" : current.l4)
          : null;

        return {
          id: i + 1,
          l1,
          l1_code: d.code,
          l2: l2Base
            ? `${l2Base}${l4Short ? " · " + l4Short : ""}`
            : (rec ? `${rec.recommended_iso} ${isoRec?.iso_reference?.[rec.recommended_iso]?.zh || ""}` : "—"),
          l2Base,
          source: d._fromPresence ? "presence" : "ai",
          conf: Number.isFinite(d.confidence) ? d.confidence : null,
          matchCode: null,
          px: Number.isFinite(d.x) ? d.x : 50,
          py: Number.isFinite(d.y) ? d.y : 50,
          side: d.side === "back" ? "right" : "left",
          ie: +totalSeconds.toFixed(0),
          action: rec?.action || "user_select",
          isoConfidence: rec?.confidence || null,
          presenceTier: presenceByCode[d.code]?.tier_en || null,
          presencePct: presenceByCode[d.code]?.presence_pct ?? null,
          methodIdx,
          methodVariants,
          l2Idx,
          l2Variants,
          l3Idx,
          l3Variants: l3VariantsOut,
          ai_l2_code: d.l2_code || null,
          ai_l2_confidence: Number.isFinite(d.l2_confidence) ? d.l2_confidence : null,
          l3s: stepList
        };
      });
      clearInterval(si);
      setCards(built);
      setCStage(5);
      setCAnalyzing(false);
      setCStep(2);
    } catch (e) {
      clearInterval(si);
      setAnalyzeErr(String(e?.message || e));
      setCAnalyzing(false);
      setCStep(0);
    }
  };
  const runMeasurement = () => {
    setMStep(1); setMAnalyzing(true); setMStage(0);
    setExcluded(new Set()); setOpenPom(null); setSizeRun("missy");
    setShowPetite(true); setShowTall(true);
    const si = setInterval(() => setMStage(s => s < 5 ? s + 1 : s), 350);
    setTimeout(() => { clearInterval(si); setMAnalyzing(false); setMStep(2); }, 2200);
  };
  const toggle = (id) => setOpenId(prev => prev === id ? null : id);

  return (
    <div style={{ minHeight: "100vh", background: "#fafafa", color: "#1a1a1a", fontFamily: "'Outfit','Noto Sans TC',system-ui,sans-serif" }}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800&display=swap');
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:.25}50%{opacity:.8}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scanDown{from{top:0%}to{top:98%}}
*{box-sizing:border-box}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#ccc;border-radius:2px}`}</style>

      {/* ─── Header (v10: minimal) ─── */}
      <div style={{ padding: "12px 24px", background: "#fff", borderBottom: "1px solid #eee", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div style={{ display: "flex", alignItems: "center", gap: "8px" }}>
          <span style={{ fontSize: "15px", fontWeight: 700, color: "#1a1a1a" }}>StyTrix</span>
          <span style={{ width: "1px", height: "14px", background: "#ddd" }} />
          <span style={{ fontSize: "12px", color: "#999", fontWeight: 500 }}>Techpack</span>
        </div>
      </div>

      <div style={{ maxWidth: "1280px", margin: "0 auto", padding: isMobile ? "14px 14px" : "24px 28px" }}>
        {/* ─── Top bar：管理 ─── */}
        <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: "10px" }}>
          <button onClick={() => setAdminOpen(true)}
            aria-label={pomNamesOverride ? "開啟管理面板（已有覆蓋）" : "開啟管理面板"}
            title={pomNamesOverride ? `已覆蓋 POM 翻譯表：${pomNamesOverride.filename}` : "管理：餵入更新的尺寸翻譯表 / L2 判別"}
            style={{
              background: "#fff", border: "1px solid #e8e5e1", borderRadius: "6px",
              padding: "5px 11px", fontSize: "11px", fontWeight: 600,
              color: pomNamesOverride ? "#b45309" : "#767676",
              cursor: "pointer", fontFamily: "inherit",
              display: "inline-flex", alignItems: "center", gap: "5px",
            }}>
            {pomNamesOverride && <span style={{ width: "6px", height: "6px", borderRadius: "50%", background: "#f59e0b", display: "inline-block" }} />}
            管理
          </button>
        </div>
        {/* ─── Quick search ─── */}
        <div style={{ position: "relative", marginBottom: "16px" }}>
          <input type="text" value={searchQuery}
            onChange={e => { setSearchQuery(e.target.value); setSearchFocused(true); }}
            onFocus={() => setSearchFocused(true)}
            onBlur={() => setTimeout(() => setSearchFocused(false), 200)}
            placeholder="🔍 快速搜尋（例如打 hoodie / leggings / active / mens ... 自動填 filter）"
            style={{
              width: "100%", padding: "10px 14px", fontSize: "13px",
              border: "1.5px solid #e8e5e1", borderRadius: "8px",
              background: "#fff", fontFamily: "inherit", outline: "none",
              transition: "border-color 0.15s",
            }}
            onMouseEnter={e => e.currentTarget.style.borderColor = "#d4d4d4"}
            onMouseLeave={e => e.currentTarget.style.borderColor = "#e8e5e1"} />
          {searchFocused && searchMatches.length > 0 && (
            <div style={{
              position: "absolute", top: "100%", left: 0, right: 0, marginTop: "4px",
              background: "#fff", border: "1.5px solid #e8e5e1", borderRadius: "8px",
              boxShadow: "0 4px 12px rgba(0,0,0,0.08)", zIndex: 20, maxHeight: "320px", overflowY: "auto"
            }}>
              {searchMatches.map((m, i) => (
                <div key={i} onMouseDown={() => applySearchMatch(m)}
                  style={{
                    padding: "8px 14px", cursor: "pointer", fontSize: "13px",
                    display: "flex", justifyContent: "space-between", alignItems: "center",
                    borderBottom: i < searchMatches.length - 1 ? "1px solid #f0eeeb" : "none",
                    transition: "background 0.1s"
                  }}
                  onMouseEnter={e => e.currentTarget.style.background = "#faf9f7"}
                  onMouseLeave={e => e.currentTarget.style.background = "#fff"}>
                  <span style={{ fontWeight: 600, color: "#1a1a1a" }}>{m.label}</span>
                  <span style={{ fontSize: "11px", color: "#999" }}>{m.hint}</span>
                </div>
              ))}
            </div>
          )}
        </div>

        {/* ─── Filter (v10: flush underline selects) ─── */}
        <div style={{
          display: "grid",
          gridTemplateColumns: isMobile ? "repeat(2, 1fr)" : "repeat(6, 1fr)",
          gap: isMobile ? "12px 14px" : "20px",
          marginBottom: isMobile ? "18px" : "28px",
          paddingBottom: isMobile ? "14px" : "24px",
          borderBottom: "1px solid #eee"
        }}>
          <Sel label="Brand" value={brand} onChange={setBrand}
            options={BRANDS.map(b => b.code)} badgeMap={brandBadgeMap}
            locked={!!locks.brand} onToggleLock={() => toggleLock("brand")} />
          <Sel label="Fabric" value={fabric}
            onChange={v => { setFabric(v); setIt(""); }}
            options={["Woven", "Knit"]} badgeMap={fabricBadgeMap}
            locked={!!locks.fabric} onToggleLock={() => toggleLock("fabric")} />
          <Sel label="Gender" value={gender} onChange={setGender}
            options={pomRules ? Object.keys(genderBadgeMap).filter(v => genderBadgeMap[v] > 0).sort((a,b) => GENDER_OPTIONS.findIndex(g => g.value === a) - GENDER_OPTIONS.findIndex(g => g.value === b)) : GENDER_OPTIONS.map(g => g.value)}
            labelMap={Object.fromEntries(GENDER_OPTIONS.map(g => [g.value, g.label]))}
            badgeMap={genderBadgeMap}
            locked={!!locks.gender} onToggleLock={() => toggleLock("gender")} />
          <Sel label="Department" value={dept} onChange={setDept}
            options={pomRules ? Object.keys(deptBadgeMap).filter(d => deptBadgeMap[d] > 0).sort() : DEPT_OPTIONS}

            locked={!!locks.dept} onToggleLock={() => toggleLock("dept")} />
          <Sel label="Garment Type" value={gt}
            onChange={v => { setGt(v); setIt(""); }}
            options={pomRules ? Object.keys(gtBadgeMap).filter(g => gtBadgeMap[g] > 0).sort() : GT_OPTIONS}
            badgeMap={gtBadgeMap}
            locked={!!locks.gt} onToggleLock={() => toggleLock("gt")} />
          <Sel label="Item Type" value={it} onChange={setIt}
            options={curItOptions}
            disabled={curItOptions.length === 0}
            locked={!!locks.it} onToggleLock={() => toggleLock("it")} />
        </div>

        {/* ─── Tabs (v10: underline only) ─── */}
        <div style={{
          display: "flex", borderBottom: "1px solid #eee",
          marginBottom: isMobile ? "16px" : "24px",
          gap: isMobile ? "0" : "0",
          overflowX: "auto",
          WebkitOverflowScrolling: "touch",
        }}>
          {[
            { key: "construction", label: "作工建議", done: cDone, disabled: false,
              badge: cDone ? `${vis.length} 部位 · ${Math.round(totalIE)} 秒` : null },
            { key: "measurement", label: "基碼 / POM 確認", done: mDone, disabled: false,
              badge: mDone ? `${displayIncludedCount} POMs` : null },
            { key: "grading", label: "全碼", done: mDone && displayIncludedCount > 0,
              disabled: !(mDone && currentBucket && displayIncludedCount > 0),
              badge: (mDone && currentBucket) ? `${displayIncludedCount} POMs` : null },
          ].map(t => {
            const active = activeTab === t.key;
            const dis = !!t.disabled;
            return (
              <button key={t.key} onClick={() => !dis && setActiveTab(t.key)}
                disabled={dis}
                title={dis ? "請先於基碼 / POM 確認勾選至少一項" : ""}
                style={{
                  padding: "12px 0", marginRight: "32px", background: "none", border: "none",
                  borderBottom: active ? "2px solid #065f46" : "2px solid transparent",
                  cursor: dis ? "not-allowed" : "pointer",
                  color: active ? "#1a1a1a" : (dis ? "#ddd" : "#aaa"),
                  fontSize: "14px", fontWeight: active ? 700 : 500,
                  marginBottom: "-1px", transition: "all 0.15s", fontFamily: "inherit",
                  display: "flex", alignItems: "center", gap: "8px",
                }}>
                {t.label}
                {t.done && t.badge && (
                  <span style={{ fontSize: "11px", color: "#065f46", fontFamily: "'JetBrains Mono',monospace", fontWeight: 600 }}>{t.badge}</span>
                )}
              </button>
            );
          })}
        </div>

        {/* ═══ Construction Tab Panel ═══ */}
        {activeTab === "construction" && (
          <div style={{ animation: "fadeIn 0.2s ease" }}>
            {/* Action bar (v10: clean) */}
            <div style={{
              background: "#fff", border: "1px solid #eee", borderRadius: "10px",
              padding: isMobile ? "12px 14px" : "16px 20px",
              marginBottom: isMobile ? "12px" : "16px",
              display: "flex",
              flexDirection: isMobile ? "column" : "row",
              justifyContent: "space-between",
              alignItems: isMobile ? "stretch" : "center",
              gap: isMobile ? "10px" : "16px"
            }}>
              <div>
                <div style={{ fontSize: "15px", fontWeight: 700, marginBottom: "3px", color: "#1a1a1a" }}>作工建議</div>
                <div style={{ fontSize: "12px", color: "#999" }}>Sketch → 部位偵測 → 零件匹配 → 工段推薦 → IE</div>
              </div>
              {!cDone && (
                <button onClick={runConstruction} disabled={!canAnalyze || cAnalyzing} style={{
                  padding: "10px 24px", background: (canAnalyze && !cAnalyzing) ? "#1a1a1a" : "#eee",
                  color: (canAnalyze && !cAnalyzing) ? "#fff" : "#bbb",
                  border: "none", borderRadius: "8px",
                  fontSize: "13px", fontWeight: 600, cursor: (canAnalyze && !cAnalyzing) ? "pointer" : "not-allowed",
                  fontFamily: "inherit",
                }}>{cAnalyzing ? "分析中…" : "Analyze"}</button>
              )}
              {analyzeErr && <span style={{ fontSize: "11px", color: "#dc2626" }}>分析失敗: {analyzeErr}</span>}
              {cDone && (
                <div style={{ display: "flex", alignItems: "center", gap: "12px" }}>
                  <div style={{ textAlign: "right" }}>
                    <div style={{ fontSize: "10px", color: "#999" }}>Sewing 秒</div>
                    <div style={{ fontSize: "18px", color: "#065f46", fontWeight: 700, fontFamily: "'JetBrains Mono',monospace" }}>{Math.round(totalIE)}</div>
                  </div>
                  <button onClick={runConstruction} style={{
                    padding: "8px 14px", background: "#fff", color: "#999",
                    border: "1px solid #eee", borderRadius: "8px", fontSize: "12px", cursor: "pointer", fontFamily: "inherit"
                  }}>Re-analyze</button>
                </div>
              )}
            </div>

            {/* 2-col layout: sketch + cards (桌機 2 欄，手機 1 欄) */}
            <div style={{
              display: "grid",
              gridTemplateColumns: isMobile ? "1fr" : "minmax(480px, 540px) 1fr",
              gap: isMobile ? "12px" : "16px"
            }}>
              {/* Sketch upload + preview */}
              <div style={{ background: "#fff", borderRadius: "10px", overflow: "hidden", border: "1px solid #eee", alignSelf: "start" }}>
                {!sketchSrc ? (
                  /* ─── Dropzone ─── */
                  <label
                    onDragOver={e => e.preventDefault()}
                    onDrop={handleSketchDrop}
                    style={{
                      display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
                      minHeight: "400px", cursor: "pointer", padding: "40px",
                      color: "#bbb", textAlign: "center",
                    }}
                  >
                    <input type="file" accept="image/*" onChange={handleSketchUpload} style={{ display: "none" }} />
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#ccc" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                      <polyline points="17 8 12 3 7 8" />
                      <line x1="12" y1="3" x2="12" y2="15" />
                    </svg>
                    <div style={{ fontSize: "14px", fontWeight: 600, color: "#999", marginTop: "16px" }}>上傳設計圖</div>
                    <div style={{ fontSize: "12px", color: "#767676", marginTop: "6px" }}>拖曳或點擊上傳 · PNG / JPG</div>
                  </label>
                ) : (
                  /* ─── Preview ─── */
                  <>
                    <div style={{ padding: "10px 16px", borderBottom: "1px solid #f0f0f0", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                      <span style={{ fontSize: "12px", color: "#888", fontWeight: 500 }}>Sketch</span>
                      <div style={{ display: "flex", alignItems: "center", gap: "10px" }}>
                        <label style={{ fontSize: "11px", color: "#999", cursor: "pointer", textDecoration: "underline", textUnderlineOffset: "2px" }}>
                          <input type="file" accept="image/*" onChange={handleSketchUpload} style={{ display: "none" }} />
                          更換
                        </label>
                        <button
                          onClick={() => { setSketchSrc(null); setCStep(0); setRemoved(new Set()); setOpenId(null); }}
                          style={{ fontSize: "11px", color: "#dc2626", background: "none", border: "none", cursor: "pointer", padding: 0, textDecoration: "underline", textUnderlineOffset: "2px", fontFamily: "inherit" }}
                        >刪除</button>
                      </div>
                    </div>
                    <div style={{ padding: "8px", position: "relative" }}>
                      <Sketch src={sketchSrc} hl={openId} onClick={toggle} ok={cDone} vis={visSet} cards={cards} />
                      {cAnalyzing && <div style={{ position: "absolute", inset: "8px", background: "rgba(255,255,255,0.6)", borderRadius: "4px" }}>
                        <div style={{ position: "absolute", left: "10%", right: "10%", height: "2px", background: "#1a1a1a",
                          borderRadius: "1px", animation: "scanDown 1.5s ease-in-out infinite" }} />
                      </div>}
                    </div>
                    {cDone && <div style={{ padding: "10px 16px", borderTop: "1px solid #f0f0f0", display: "flex", gap: "5px", flexWrap: "wrap" }}>
                      {[brand, fabric, dept, gender, gt, it].filter(Boolean).map((v, i) => (
                        <span key={v} style={{ fontSize: "11px", padding: "2px 8px", background: i === 0 ? "#1a1a1a" : "#f5f5f5", borderRadius: "4px", color: i === 0 ? "#fff" : "#777", fontWeight: i === 0 ? 600 : 400 }}>{v}</span>
                      ))}
                    </div>}
                  </>
                )}
              </div>

              {/* Cards area */}
              <div style={{ alignSelf: "start" }}>
                {!cDone && !cAnalyzing && <div style={{
                  minHeight: "300px", display: "flex", alignItems: "center", justifyContent: "center",
                  flexDirection: "column", gap: "8px", color: "#bbb",
                  border: "1px solid #eee", borderRadius: "10px", background: "#fff"
                }}>
                  <div style={{ fontSize: "13px", fontWeight: 500 }}>
                    {canAnalyze ? "按上方 Analyze 開始" : (sketchSrc ? "請先完成 filter" : "請先上傳設計圖並完成 filter")}
                  </div>
                </div>}

                {cAnalyzing && <div style={{
                  minHeight: "300px", display: "flex", alignItems: "flex-start", justifyContent: "center",
                  flexDirection: "column", gap: "6px",
                  border: "1px solid #eee", borderRadius: "10px", background: "#fff",
                  padding: "28px"
                }}>
                  {C_STAGES.slice(0, cStage + 1).map((s, i) => (
                    <div key={i} style={{
                      fontSize: "12px", lineHeight: 1.6,
                      color: i === cStage ? "#1a1a1a" : "#ccc",
                      fontWeight: i === cStage ? 600 : 400,
                      fontFamily: "'JetBrains Mono',monospace",
                      animation: "fadeIn 0.3s ease"
                    }}>{s}</div>
                  ))}
                </div>}

                {cDone && <div style={{ animation: "slideUp 0.3s ease" }}>
                  {/* Summary */}
                  <div style={{
                    background: "#fff", border: "1px solid #eee", borderRadius: "10px",
                    padding: "14px 18px", marginBottom: "12px",
                    display: "flex", justifyContent: "space-between", alignItems: "center"
                  }}>
                    <div>
                      <div style={{ display: "flex", alignItems: "baseline", gap: "6px" }}>
                        <span style={{ fontSize: "20px", fontWeight: 700, fontFamily: "'JetBrains Mono',monospace" }}>{vis.length}</span>
                        <span style={{ fontSize: "12px", color: "#bbb" }}>/ {cards.length} 部位</span>
                        {addonOn && <span style={{ fontSize: "11px", color: "#888" }}>+ 套組</span>}
                      </div>
                      <div style={{ display: "flex", gap: "6px", marginTop: "4px" }}>
                        <span style={{ fontSize: "11px", color: "#888" }}>{aiCount} AI 偵測</span>
                        <span style={{ fontSize: "11px", color: "#888" }}>·</span>
                        <span style={{ fontSize: "11px", color: "#888" }}>{structCount} 結構推斷</span>
                      </div>
                    </div>
                    <span style={{ fontSize: "11px", color: "#065f46", fontWeight: 600 }}>已自動選好</span>
                  </div>

                  {removed.size > 0 && <div style={{
                    padding: "10px 14px", marginBottom: "10px", borderRadius: "8px",
                    background: "#fef9f9", border: "1px solid #f5e0e0",
                    display: "flex", justifyContent: "space-between", alignItems: "center"
                  }}>
                    <span style={{ fontSize: "12px", color: "#b91c1c" }}>已刪除 {removed.size} 個部位</span>
                    <button onClick={() => setRemoved(new Set())} style={{
                      fontSize: "11px", color: "#b91c1c", background: "#fff",
                      border: "1px solid #f5e0e0", borderRadius: "6px",
                      padding: "4px 12px", cursor: "pointer", fontWeight: 600, fontFamily: "inherit"
                    }}>復原</button>
                  </div>}

                  <div style={{ fontSize: "11px", color: "#bbb", marginBottom: "10px" }}>
                    展開卡片後點 ⓘ 可改工法
                  </div>

                  {(() => {
                    const TIER_META = {
                      essential:  { label: "必備",   hint: "歷史 ≥80%" },
                      common:     { label: "常見",   hint: "50–79%" },
                      occasional: { label: "偶見",   hint: "20–49%" },
                      rare:       { label: "少見",   hint: "<20%" },
                      other:      { label: "其他",   hint: "AI 偵測無歷史資料" },
                    };
                    const TIER_ORDER = ["essential", "common", "occasional", "rare", "other"];
                    const visWithIdx = vis.map((c, i) => ({ c, i }));
                    const groups = Object.fromEntries(
                      TIER_ORDER.map(t => [t, visWithIdx
                        .filter(x => (x.c.presenceTier || "other") === t)
                        .sort((a, b) => (b.c.presencePct ?? 0) - (a.c.presencePct ?? 0))])
                    );
                    const activeTiers = TIER_ORDER.filter(t => groups[t].length > 0);
                    const showHeaders = activeTiers.length > 1;
                    const renderCard = ({ c, i }) => (
                      <Card key={c.id} card={c} col={MC[i]} isOpen={openId === c.id}
                        onToggle={() => toggle(c.id)}
                        onRemove={id => { setRemoved(p => new Set([...p, id])); if (openId === id) setOpenId(null); }}
                        onSwitchMethod={(cardId, newIdx) => setCards(cs => cs.map(cc => {
                          if (cc.id !== cardId) return cc;
                          const v = cc.methodVariants?.[newIdx];
                          if (!v) return cc;
                          const l4Short = v.l4 ? (v.l4.length > 40 ? v.l4.slice(0, 40) + "…" : v.l4) : null;
                          return {
                            ...cc,
                            methodIdx: newIdx,
                            l3s: v.steps.length ? v.steps : cc.l3s,
                            ie: v.totalSec,
                            l2: cc.l2Base ? `${cc.l2Base}${l4Short ? " · " + l4Short : ""}` : cc.l2
                          };
                        }))}
                        onSwitchL2={(cardId, newL2Idx) => {
                          const cc = cards.find(x => x.id === cardId);
                          if (cc) rebuildCardFromL2(cc, newL2Idx, null, fabric, setCards);
                        }}
                        onSwitchL3={(cardId, newL3Idx) => {
                          const cc = cards.find(x => x.id === cardId);
                          if (cc) rebuildCardFromL2(cc, cc.l2Idx ?? 0, newL3Idx, fabric, setCards);
                        }} />
                    );
                    if (!showHeaders) return vis.map((c, i) => renderCard({ c, i }));
                    return activeTiers.map(t => (
                      <React.Fragment key={t}>
                        <div style={{
                          fontSize: "11px", fontWeight: 700, color: "#888",
                          letterSpacing: "0.05em", textTransform: "uppercase",
                          marginTop: "14px", marginBottom: "6px",
                          display: "flex", alignItems: "baseline", gap: "8px",
                        }}>
                          <span>{TIER_META[t].label}</span>
                          <span style={{ fontSize: "10px", color: "#bbb", fontWeight: 400, textTransform: "none", letterSpacing: 0 }}>
                            {TIER_META[t].hint} · {groups[t].length}
                          </span>
                        </div>
                        {groups[t].map(renderCard)}
                      </React.Fragment>
                    ));
                  })()}

                  <div style={{ fontSize: "12px", color: "#888", fontWeight: 600, marginTop: "16px", marginBottom: "6px" }}>{brand} 品牌套組</div>
                  <div style={{
