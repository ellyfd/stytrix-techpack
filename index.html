                      {MISSY_POMS.recommend.map(p => <MissyPomRow key={p.code} pom={p} tier="recommend"
                        isOpen={openPom === p.code} onToggle={() => setOpenPom(openPom === p.code ? null : p.code)}
                        included={!excluded.has(p.code)} onToggleInclude={() => setExcluded(prev => { const n = new Set(prev); n.has(p.code) ? n.delete(p.code) : n.add(p.code); return n; })}
                        showPetite={showPetite} showTall={showTall} />)}
                    </TierSection>
                    <TierSection tier="optional" count={MISSY_POMS.optional.length}>
                      {MISSY_POMS.optional.map(p => <MissyPomRow key={p.code} pom={p} tier="optional"
                        isOpen={openPom === p.code} onToggle={() => setOpenPom(openPom === p.code ? null : p.code)}
                        included={!excluded.has(p.code)} onToggleInclude={() => setExcluded(prev => { const n = new Set(prev); n.has(p.code) ? n.delete(p.code) : n.add(p.code); return n; })}
                        showPetite={showPetite} showTall={showTall} />)}
                    </TierSection>
                  </>
                ) : (
                  <>
                    <TierSection tier="must" count={PLUS_POMS.must.length}>
                      {PLUS_POMS.must.map(p => <PlusPomRow key={p.code} pom={p} tier="must"
                        isOpen={openPom === p.code} onToggle={() => setOpenPom(openPom === p.code ? null : p.code)}
                        included={!excluded.has(p.code)} onToggleInclude={() => setExcluded(prev => { const n = new Set(prev); n.has(p.code) ? n.delete(p.code) : n.add(p.code); return n; })} />)}
                    </TierSection>
                    <TierSection tier="recommend" count={PLUS_POMS.recommend.length}>
                      {PLUS_POMS.recommend.map(p => <PlusPomRow key={p.code} pom={p} tier="recommend"
                        isOpen={openPom === p.code} onToggle={() => setOpenPom(openPom === p.code ? null : p.code)}
                        included={!excluded.has(p.code)} onToggleInclude={() => setExcluded(prev => { const n = new Set(prev); n.has(p.code) ? n.delete(p.code) : n.add(p.code); return n; })} />)}
                    </TierSection>
                    <TierSection tier="optional" count={PLUS_POMS.optional.length}>
                      {PLUS_POMS.optional.map(p => <PlusPomRow key={p.code} pom={p} tier="optional"
                        isOpen={openPom === p.code} onToggle={() => setOpenPom(openPom === p.code ? null : p.code)}
                        included={!excluded.has(p.code)} onToggleInclude={() => setExcluded(prev => { const n = new Set(prev); n.has(p.code) ? n.delete(p.code) : n.add(p.code); return n; })} />)}
                    </TierSection>
                  </>
                )}

                {excluded.size > 0 && (
                  <div style={{
                    padding: "10px 14px", marginTop: "10px", borderRadius: "8px",
                    background: "#fef9f9", border: "1px solid #f5e0e0",
                    display: "flex", justifyContent: "space-between", alignItems: "center"
                  }}>
                    <span style={{ fontSize: "12px", color: "#b91c1c" }}>已排除 {excluded.size} 個 POM</span>
                    <button onClick={() => setExcluded(new Set())} style={{
                      fontSize: "11px", color: "#b91c1c", background: "#fff",
                      border: "1px solid #f5e0e0", borderRadius: "6px",
                      padding: "4px 12px", cursor: "pointer", fontWeight: 600, fontFamily: "inherit"
                    }}>復原</button>
                  </div>
                )}

                <div style={{ display: "flex", gap: "8px", marginTop: "20px" }}>
                  <button style={{
                    flex: 1, padding: "12px", background: "#1a1a1a", color: "#fff",
                    border: "none", borderRadius: "8px", fontSize: "13px", fontWeight: 600,
                    cursor: "pointer", fontFamily: "inherit",
                  }}>Export Techpack</button>
                  <button style={{
                    padding: "12px 18px", background: "#fff", color: "#999",
                    border: "1px solid #eee", borderRadius: "8px",
                    fontSize: "12px", cursor: "pointer", fontFamily: "inherit"
                  }}>Export CSV</button>
                </div>
              </div>
            )}
          </div>
        )}

        {/* ═══ Grading (全碼) Tab Panel ═══ */}
        {activeTab === "grading" && (
          <div style={{ animation: "fadeIn 0.2s ease" }}>
            {!(mDone && currentBucket) && (
              <div style={{
                minHeight: "200px", display: "flex", alignItems: "center", justifyContent: "center",
                flexDirection: "column", gap: "10px", color: "#999",
                border: "1px solid #eee", borderRadius: "10px", background: "#fff", padding: "24px"
              }}>
                <div style={{ fontSize: "13px" }}>請先完成「基碼 / POM 確認」</div>
                <button onClick={() => setActiveTab("measurement")} style={{
                  padding: "8px 16px", border: "1px solid #e8e5e1", borderRadius: "8px",
                  background: "#fff", color: "#666", fontSize: "12px", fontWeight: 600,
                  cursor: "pointer", fontFamily: "inherit",
                }}>← 回基碼 / POM 確認</button>
              </div>
            )}
            {mDone && currentBucket && (() => {
              const mv = currentBucket.median_values || {};
              const gr = currentBucket.grading_rules || {};
              const mr = currentBucket.measurement_rules || {};
              const tiersOrdered = ["must", "recommend", "optional"];
              const tierPoms = tier => Object.keys(mr[tier] || {}).filter(c => mr[tier][c] != null);
              const allCodesFlat = sortPomCodes(
                tiersOrdered.flatMap(t => tierPoms(t)),
                currentBucket.pom_sort_order
              );
              const gradingCodes = allCodesFlat.filter(c => !excluded.has(c));
              const sizes = currentBucket.size_range || [];
              const tierOf = code => mr.must?.[code] ? "must" : mr.recommend?.[code] ? "recommend" : "optional";
              const tolStr = m => {
                const t = m?.tolerance;
                if (!t) return "—";
                if (typeof t === "object") return "±" + (t.display || frmt(t.standard)) + '"';
                return "±" + frmt(t) + '"';
              };
              const effectiveBaseM = code => {
                const ov = baseOverrides[code];
                if (ov != null && ov !== "") {
                  const v = parseInch(ov);
                  if (v != null) return v;
                }
                return mv[code]?.size_medians?.M;
              };
              const sizeValueFor = (code, s) => {
                const origM = mv[code]?.size_medians?.M;
                const origS = mv[code]?.size_medians?.[s];
                if (origS == null) return null;
                const newM = effectiveBaseM(code);
                if (newM == null || origM == null) return origS;
                return origS + (newM - origM);
              };

              return (
                <div style={{ animation: "slideUp 0.3s ease", paddingBottom: "72px" }}>
                  {/* Summary bar */}
                  <div style={{ background: "#fff", border: "1px solid #eee", borderRadius: "10px", padding: isMobile ? "10px 12px" : "14px 18px", marginBottom: "12px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <div>
                      <div style={{ display: "flex", alignItems: "baseline", gap: "6px" }}>
                        <span style={{ fontSize: isMobile ? "17px" : "20px", fontWeight: 700, fontFamily: "'JetBrains Mono',monospace" }}>{gradingCodes.length}</span>
                        <span style={{ fontSize: "12px", color: "#bbb" }}>POMs · {sizes.length} sizes</span>
                      </div>
                      <div style={{ fontSize: "11px", color: "#888", marginTop: "4px" }}>
                        Base: <span style={{ fontWeight: 700, color: "#065f46" }}>M</span> · Grading 由 Base 推導
                      </div>
                    </div>
                    <div style={{ textAlign: "right" }}>
                      <div style={{ fontSize: "11px", color: "#065f46", fontWeight: 700, fontFamily: "'JetBrains Mono',monospace" }}>{currentBucket.bucket}</div>
                      <div style={{ fontSize: "10px", color: "#999" }}>inches (fractions)</div>
                    </div>
                  </div>

                  <div style={{ fontSize: "13px", fontWeight: 700, color: "#1a1a1a", marginTop: "4px", marginBottom: "8px" }}>
                    全碼 <span style={{ fontSize: "11px", color: "#999", fontWeight: 400 }}>各 size 中位數 + 公差 + 跳碼（size 與 size 間的遞增量）</span>
                  </div>

                  {gradingCodes.length === 0 ? (
                    <div style={{ background: "#fff", border: "1px dashed #e8e5e1", borderRadius: "10px", padding: "20px", textAlign: "center", fontSize: "12px", color: "#999" }}>
                      尚未勾選任何 POM — 回「基碼 / POM 確認」勾選
                    </div>
                  ) : (
                    <div style={{ background: "#fff", border: "1px solid #e8e5e1", borderRadius: "10px", overflow: "auto" }}>
                      <table style={{ width: "100%", borderCollapse: "collapse", fontSize: isMobile ? "10.5px" : "11px" }}>
                        <thead>
                          <tr style={{ background: "#faf9f7", borderBottom: "1.5px solid #e8e5e1" }}>
                            <th style={{ padding: "8px 8px", textAlign: "left", fontWeight: 600, fontSize: "10px", color: "#999", position: "sticky", left: 0, background: "#faf9f7", width: isMobile ? "50px" : "60px" }}>POM</th>
                            <th style={{ padding: "8px 8px", textAlign: "left", fontWeight: 600, fontSize: "10px", color: "#999", minWidth: isMobile ? "100px" : "120px" }}>Name</th>
                            <th style={{ padding: "8px 8px", textAlign: "right", fontWeight: 600, fontSize: "10px", color: "#7e22ce", width: isMobile ? "56px" : "70px" }}>公差</th>
                            <th style={{ padding: "8px 8px", textAlign: "right", fontWeight: 600, fontSize: "10px", color: "#b45309", width: isMobile ? "56px" : "70px" }}>跳碼<div style={{ fontSize: "8px", fontWeight: 400, color: "#b45309" }}>Grading</div></th>
                            {sizes.map(s => (
                              <th key={s} style={{ padding: "8px 6px", textAlign: "center", fontWeight: 700, fontSize: "10px", color: s === "M" ? "#065f46" : "#666", fontFamily: "'JetBrains Mono',monospace", background: s === "M" ? "#ecfdf5" : "transparent", minWidth: isMobile ? "42px" : "48px" }}>{s}{s === "M" && <div style={{ fontSize: "7px", color: "#065f46" }}>BASE</div>}</th>
                            ))}
                          </tr>
                        </thead>
                        <tbody>
                          {gradingCodes.map(code => {
                            const tier = tierOf(code);
                            const tc = TIER[tier];
                            const grRow = gr[code];
                            const m = mr[tier]?.[code];
                            const pn = pomNames[code] || {};
                            const edited = baseOverrides[code] != null && baseOverrides[code] !== "" && parseInch(baseOverrides[code]) != null;
                            return (
                              <tr key={code} style={{ borderBottom: "1px solid #f0eeeb" }}>
                                <td style={{ padding: "5px 8px", fontWeight: 700, fontFamily: "'JetBrains Mono',monospace", color: tc.c, position: "sticky", left: 0, background: "#fff" }}>{code}</td>
                                <td style={{ padding: "5px 8px", fontSize: isMobile ? "10.5px" : "11px", color: "#1a1a1a" }}>
                                  {pn.en || code}
                                  {edited && <span style={{ marginLeft: "6px", fontSize: "9px", color: "#7e22ce", background: "#f5f3ff", padding: "1px 5px", borderRadius: "3px", fontWeight: 600, whiteSpace: "nowrap" }}>已調整</span>}
                                </td>
                                <td style={{ padding: "5px 8px", textAlign: "right", fontFamily: "'JetBrains Mono',monospace", color: "#7e22ce", fontWeight: 600, whiteSpace: "nowrap" }}>
                                  {tolStr(m)}
                                </td>
                                <td style={{ padding: "5px 8px", textAlign: "right", fontFamily: "'JetBrains Mono',monospace", color: "#b45309", fontWeight: 600, whiteSpace: "nowrap" }}>
                                  {grRow?.typical_increment != null ? (grRow.typical_increment >= 0 ? "+" : "") + frmt(grRow.typical_increment) + '"' : "—"}
                                </td>
                                {sizes.map(s => {
                                  const val = sizeValueFor(code, s);
                                  return (
                                    <td key={s} style={{ padding: "5px 6px", textAlign: "center", fontFamily: "'JetBrains Mono',monospace", color: s === "M" ? "#065f46" : "#1a1a1a", fontWeight: s === "M" ? 700 : 500, background: s === "M" ? "#ecfdf5" : "transparent" }}>
                                      {val != null ? frmt(val) + '"' : "—"}
                                    </td>
                                  );
                                })}
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>
                  )}

                  {/* Sticky 底部動作列 — 全碼頁：左下「← 上一頁 · 基碼調整」 */}
                  <div style={{
                    position: "sticky", bottom: 0, zIndex: 10,
                    marginTop: "16px",
                    background: "#fff", border: "1px solid #eee", borderRadius: "10px",
                    padding: isMobile ? "8px 12px" : "10px 14px",
                    display: "flex", justifyContent: "space-between", alignItems: "center", gap: "10px",
                    boxShadow: "0 -2px 12px rgba(0,0,0,0.04)",
                  }}>
                    <button onClick={() => setActiveTab("measurement")} style={{
                      padding: isMobile ? "9px 12px" : "10px 16px", border: "1px solid #e8e5e1", borderRadius: "8px",
                      background: "#fff", color: "#666", fontSize: "12px", fontWeight: 600,
                      cursor: "pointer", fontFamily: "inherit", whiteSpace: "nowrap",
                    }}>← 上一頁 · 基碼調整</button>
                    <div style={{ fontSize: "11px", color: "#888", flex: 1, textAlign: "right", minWidth: 0 }}>
                      {gradingCodes.length} POM · {sizes.length} sizes
                    </div>
                  </div>
                </div>
              );
            })()}
          </div>
        )}
      </div>

      <AdminModal
        open={adminOpen}
        onClose={() => setAdminOpen(false)}
        pomNamesOverride={pomNamesOverride}
        onUploadPomNames={applyPomNamesOverride}
        onClearPomNames={clearPomNamesOverride}
      />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
