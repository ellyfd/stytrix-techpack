name: Rebuild l2_l3_ie from xlsx (manual)

# xlsx 太大不進 repo (見 data/source/BIBLE_UPGRADE.md),改 workflow_dispatch only。
# 維護者本機跑 build_bible_skeleton.py + push 38 JSON 是常規路徑;
# 此 workflow 留作緊急覆寫工具(若有人 ad-hoc 把 xlsx push 進 repo 跑 reproducibility 用)。
on:
  workflow_dispatch:

jobs:
  rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check xlsx availability
        id: check
        run: |
          if ls data/source/五階層展開項目_*.xlsx 2>/dev/null | grep -q .; then
            echo "found=true" >> $GITHUB_OUTPUT
            ls -la data/source/五階層展開項目_*.xlsx
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "::warning::No xlsx in data/source/. workflow_dispatch needs xlsx pushed first."
            echo "## ⚠ No xlsx found" >> $GITHUB_STEP_SUMMARY
            echo "本 workflow 假設 xlsx 已 push 進 repo (ad-hoc reproducibility 用)。" >> $GITHUB_STEP_SUMMARY
            echo "正常流程: 維護者本機跑 build_bible_skeleton.py + push 38 JSON。" >> $GITHUB_STEP_SUMMARY
            echo "見 [BIBLE_UPGRADE.md](../blob/main/data/source/BIBLE_UPGRADE.md)。" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

      - name: Rebuild l2_l3_ie/*.json
        if: steps.check.outputs.found == 'true'
        run: python scripts/core/build_bible_skeleton.py

      - name: Commit regenerated files
        if: steps.check.outputs.found == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add l2_l3_ie/

          if git diff --cached --quiet; then
            echo "No changes — l2_l3_ie already up to date."
          else
            git commit -m "chore(ie): auto-rebuild l2_l3_ie via workflow_dispatch [skip ci]"
            git push origin HEAD
          fi
